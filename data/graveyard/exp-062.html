<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Click — exp-062</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 1280;
canvas.height = 720;

const COLS = 16;
const ROWS = 9;
const CELL_W = canvas.width / COLS;
const CELL_H = canvas.height / ROWS;
const SNAP_RADIUS = 220;
const DRIFT_SPEED = 0.003;
const SNAP_SPEED = 0.12;

let mouseX = -1000, mouseY = -1000;
let totalAlignment = 0;
let reliefWave = null;

const pieces = [];
const shapes = ['circle', 'square', 'diamond', 'triangle', 'hexagon'];
const palette = [
  '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff8e53',
  '#a66cff', '#00d2d3', '#ff9ff3', '#54a0ff', '#5f27cd',
  '#01a3a4', '#f368e0', '#ff6348', '#7bed9f', '#70a1ff'
];

for (let row = 0; row < ROWS; row++) {
  for (let col = 0; col < COLS; col++) {
    const homeX = col * CELL_W + CELL_W / 2;
    const homeY = row * CELL_H + CELL_H / 2;
    const angle = Math.random() * Math.PI * 2;
    const dist = 15 + Math.random() * 35;
    pieces.push({
      homeX, homeY,
      x: homeX + Math.cos(angle) * dist,
      y: homeY + Math.sin(angle) * dist,
      rotation: (Math.random() - 0.5) * 1.2,
      homeRotation: 0,
      size: Math.min(CELL_W, CELL_H) * 0.45,
      shape: shapes[Math.floor(Math.random() * shapes.length)],
      color: palette[(row * COLS + col) % palette.length],
      alignment: 0,
      clicked: false,
      clickTime: 0,
      jitter: Math.random() * Math.PI * 2,
      jitterSpeed: 0.5 + Math.random() * 1.5,
      driftAngle: Math.random() * Math.PI * 2,
      driftSpeed: 0.3 + Math.random() * 0.7,
      ripple: 0,
    });
  }
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
  hasRealMouse = true;
});

canvas.addEventListener('mouseleave', () => {
  mouseX = -1000;
  mouseY = -1000;
  hasRealMouse = false;
});

let hasRealMouse = false;
canvas.addEventListener('mouseenter', () => { hasRealMouse = true; });

function drawShape(ctx, shape, x, y, size, rotation, color, alignment) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);

  if (alignment > 0.5) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 15 * alignment;
  }

  const alpha = 0.65 + alignment * 0.35;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(255,255,255,' + (alignment * 0.6) + ')';
  ctx.lineWidth = 1.5;

  ctx.beginPath();
  switch(shape) {
    case 'circle':
      ctx.arc(0, 0, size/2, 0, Math.PI * 2);
      break;
    case 'square':
      ctx.rect(-size/2, -size/2, size, size);
      break;
    case 'diamond':
      ctx.moveTo(0, -size/2);
      ctx.lineTo(size/2, 0);
      ctx.lineTo(0, size/2);
      ctx.lineTo(-size/2, 0);
      ctx.closePath();
      break;
    case 'triangle':
      ctx.moveTo(0, -size/2);
      ctx.lineTo(size/2, size/2);
      ctx.lineTo(-size/2, size/2);
      ctx.closePath();
      break;
    case 'hexagon':
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        const hx = Math.cos(a) * size/2;
        const hy = Math.sin(a) * size/2;
        if (i === 0) ctx.moveTo(hx, hy);
        else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      break;
  }
  ctx.fill();
  if (alignment > 0.3) ctx.stroke();

  ctx.restore();
}

function drawRipple(p) {
  if (p.ripple > 0) {
    ctx.save();
    ctx.globalAlpha = p.ripple * 0.4;
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 2;
    const r = p.size * (1 + (1 - p.ripple) * 1.5);
    ctx.beginPath();
    ctx.arc(p.homeX, p.homeY, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawGrid() {
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 0.5;
  for (let col = 0; col <= COLS; col++) {
    ctx.beginPath();
    ctx.moveTo(col * CELL_W, 0);
    ctx.lineTo(col * CELL_W, canvas.height);
    ctx.stroke();
  }
  for (let row = 0; row <= ROWS; row++) {
    ctx.beginPath();
    ctx.moveTo(0, row * CELL_H);
    ctx.lineTo(canvas.width, row * CELL_H);
    ctx.stroke();
  }
  ctx.restore();
}

function drawReliefWave() {
  if (!reliefWave) return;
  const { cx, cy, t } = reliefWave;
  const maxR = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height);
  const r = t * maxR * 1.2;
  const alpha = Math.max(0, 1 - t);

  ctx.save();
  const grad = ctx.createRadialGradient(cx, cy, Math.max(0, r - 80), cx, cy, r);
  grad.addColorStop(0, 'rgba(255,255,255,0)');
  grad.addColorStop(0.5, 'rgba(255, 215, 100, ' + (alpha * 0.15) + ')');
  grad.addColorStop(0.8, 'rgba(255, 255, 255, ' + (alpha * 0.25) + ')');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
}

let time = 0;
let prevAlignment = 0;

function update() {
  time += 1/60;

  if (!hasRealMouse) {
    const spiralT = Math.min(time * 0.3, 1);
    const radius = spiralT * canvas.width * 0.4;
    const sweepX = canvas.width / 2 + Math.cos(time * 0.7) * radius;
    const sweepY = canvas.height / 2 + Math.sin(time * 0.9) * radius * 0.6;
    mouseX = sweepX;
    mouseY = sweepY;
  }

  let alignedCount = 0;

  for (const p of pieces) {
    const dx = mouseX - p.homeX;
    const dy = mouseY - p.homeY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const inRange = dist < SNAP_RADIUS;
    const influence = inRange ? Math.pow(1 - dist / SNAP_RADIUS, 1.5) : 0;

    if (influence > 0.1) {
      p.x += (p.homeX - p.x) * SNAP_SPEED * influence;
      p.y += (p.homeY - p.y) * SNAP_SPEED * influence;
      p.rotation += (p.homeRotation - p.rotation) * SNAP_SPEED * influence;
      p.alignment = Math.min(1, p.alignment + 0.04 * influence);
    } else {
      const jit = Math.sin(time * p.jitterSpeed + p.jitter);
      p.driftAngle += (Math.random() - 0.5) * 0.02;
      p.x += Math.cos(p.driftAngle) * p.driftSpeed * DRIFT_SPEED * 60;
      p.y += Math.sin(p.driftAngle) * p.driftSpeed * DRIFT_SPEED * 60;
      p.rotation += jit * 0.003;
      p.alignment = Math.max(0, p.alignment - 0.008);

      const homeDx = p.x - p.homeX;
      const homeDy = p.y - p.homeY;
      const homeDist = Math.sqrt(homeDx * homeDx + homeDy * homeDy);
      if (homeDist > 50) {
        p.x -= homeDx * 0.01;
        p.y -= homeDy * 0.01;
      }
    }

    const snapDist = Math.sqrt((p.x - p.homeX) ** 2 + (p.y - p.homeY) ** 2);
    const wasClicked = p.clicked;
    p.clicked = snapDist < 2 && Math.abs(p.rotation) < 0.05;

    if (p.clicked && !wasClicked) {
      p.ripple = 1;
      p.clickTime = time;
    }

    if (p.clicked) {
      p.x = p.homeX;
      p.y = p.homeY;
      p.rotation = 0;
      p.alignment = 1;
      alignedCount++;
    }

    if (p.ripple > 0) p.ripple -= 0.025;
  }

  totalAlignment = alignedCount / pieces.length;

  if (totalAlignment > 0.7 && prevAlignment <= 0.7) {
    reliefWave = { cx: mouseX, cy: mouseY, t: 0 };
  }
  if (reliefWave) {
    reliefWave.t += 0.012;
    if (reliefWave.t > 1.2) reliefWave = null;
  }
  prevAlignment = totalAlignment;
}

function draw() {
  const bgR = 26 + totalAlignment * 10;
  const bgG = 26 + totalAlignment * 20;
  const bgB = 46 + totalAlignment * 40;
  ctx.fillStyle = 'rgb(' + bgR + ',' + bgG + ',' + bgB + ')';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();

  for (const p of pieces) {
    if (p.alignment < 0.9) {
      ctx.save();
      ctx.globalAlpha = 0.04 + p.alignment * 0.06;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 5]);
      ctx.beginPath();
      ctx.arc(p.homeX, p.homeY, p.size / 2 + 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  for (const p of pieces) drawRipple(p);
  for (const p of pieces) {
    drawShape(ctx, p.shape, p.x, p.y, p.size, p.rotation, p.color, p.alignment);
  }

  drawReliefWave();

  ctx.save();
  const barW = canvas.width * 0.3;
  const barH = 3;
  const barX = (canvas.width - barW) / 2;
  const barY = canvas.height - 20;
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.globalAlpha = 0.6 + totalAlignment * 0.4;
  const grad = ctx.createLinearGradient(barX, barY, barX + barW * totalAlignment, barY);
  grad.addColorStop(0, '#ff6b6b');
  grad.addColorStop(0.5, '#ffd93d');
  grad.addColorStop(1, '#6bcb77');
  ctx.fillStyle = grad;
  ctx.fillRect(barX, barY, barW * totalAlignment, barH);
  ctx.restore();

  update();
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
