<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>exp-066: Fugue Parliament</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:720px;overflow:hidden;background:#08080f;font-family:'Courier New',monospace}
canvas{display:block}
#info{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:rgba(180,180,220,0.25);font:10px/1.4 monospace;pointer-events:none;z-index:10;text-align:center}
</style>
</head>
<body>
<canvas id="c" width="1280" height="720"></canvas>
<div id="info">hover to disrupt voices — each delegate conducts at its own tempo</div>
<script>
// FUGUE PARLIAMENT
// Offspring of exp-055 (Parliament of Clocks) x exp-064 (Chromatic Fugue Engine)
//
// Hypothesis: What if a fugue were conducted by a parliament — each delegate
// a voice entering at its own timescale, their melodic opinions converging
// toward consensus but never quite arriving?
//
// Genes from exp-055: multi-agent ring of delegates at different timescales,
//   opinion convergence via circular mean, consensus orb, mouse disruption,
//   logarithmic timescale distribution
// Genes from exp-064: fugue subject/counter-subject, staggered voice entry,
//   waveform trail visualization, counterpoint connections between voices
//
// Combination: Delegates orbit in a parliament ring, each singing the fugue
// subject at wildly different tempos. Fast delegates zip through notes;
// slow ones hold single tones for ages. They converge toward a shared pitch
// consensus displayed as a central resonant orb. Mouse disrupts nearby
// delegates, pushing them off-pitch and off-rhythm.

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
const CX = W / 2, CY = H / 2;

const NUM = 24;
const RING_R = 220;
const TRAIL_LEN = 80;

// Fugue subject as intervals (semitones from root)
// D minor melody from exp-064: D A F D E F G A Bb A G F E D
const SUBJECT_INTERVALS = [0, 7, 3, 0, 2, 3, 5, 7, 8, 7, 5, 3, 2, 0];
// Counter-subject: F E D C D E F G A G F E D A(low)
const COUNTER_INTERVALS = [3, 2, 0, -2, 0, 2, 3, 5, 7, 5, 3, 2, 0, -3];

// Note durations in relative units
const SUBJECT_DURS = [1, 1, 1, 0.5, 0.5, 1, 2, 1, 1, 1, 0.5, 0.5, 2, 2];
const COUNTER_DURS = [2, 1, 1, 1, 1, 2, 1, 1, 2, 1, 1, 1, 1, 2];

let mouseX = -9999, mouseY = -9999, mouseActive = false;

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top) * (H / r.height);
  mouseActive = true;
});
canvas.addEventListener('mouseleave', () => { mouseActive = false; });

// Hue for pitch: map semitone to hue wheel
function pitchToHue(interval) {
  // Map 0-12 semitones to 0-360 hue
  return ((interval % 12 + 12) % 12) * 30;
}

function circularMean(angles) {
  let s = 0, c = 0;
  for (const a of angles) {
    const r = a * Math.PI / 180;
    s += Math.sin(r);
    c += Math.cos(r);
  }
  let m = Math.atan2(s / angles.length, c / angles.length) * 180 / Math.PI;
  if (m < 0) m += 360;
  return m;
}

function hueLerp(a, b, t) {
  let d = b - a;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  let r = a + d * t;
  if (r < 0) r += 360;
  if (r >= 360) r -= 360;
  return r;
}

function hueDist(a, b) {
  let d = Math.abs(a - b) % 360;
  return d > 180 ? 360 - d : d;
}

// Create delegates
function makeDelegate(i) {
  const t = i / (NUM - 1);
  // Speed spans 3 orders of magnitude (0.01 to 10)
  const speed = Math.pow(10, -2 + t * 3);
  const baseAngle = (i / NUM) * Math.PI * 2;
  const orbitR = RING_R + (Math.random() - 0.5) * 50;
  const eccentricity = 0.1 + Math.random() * 0.2;
  // Size: slow = large, fast = small
  const size = 3 + (1 - t) * 7;
  // Each delegate transposes the subject differently
  const transpose = Math.floor(i / 6) * 5; // groups of 6 share a transposition

  // Musical state
  const useCounter = i % 2 === 1;
  const seq = useCounter ? COUNTER_INTERVALS : SUBJECT_INTERVALS;
  const durs = useCounter ? COUNTER_DURS : SUBJECT_DURS;

  return {
    index: i,
    speed,
    baseAngle,
    phase: Math.random() * Math.PI * 2,
    orbitR,
    eccentricity,
    size,
    x: 0, y: 0,
    // Musical
    seq, durs, transpose,
    noteIdx: Math.floor(Math.random() * seq.length),
    noteTime: 0,
    currentInterval: seq[0] + transpose,
    hue: pitchToHue(seq[0] + transpose),
    targetHue: pitchToHue(seq[0] + transpose),
    // Waveform trail
    wavePhase: Math.random() * Math.PI * 2,
    trail: [],
    disrupted: 0,
    envelope: 0,
  };
}

const delegates = [];
for (let i = 0; i < NUM; i++) delegates.push(makeDelegate(i));

let consensusHue = 180;
let consensusPitch = 0;
let time = 0;

function update(dt) {
  time += dt;

  for (const d of delegates) {
    // Orbital motion (from exp-055)
    const angle = d.baseAngle + time * d.speed * 1.5;
    const rx = d.orbitR * (1 + d.eccentricity * Math.sin(angle * 1.7));
    const ry = d.orbitR * (1 + d.eccentricity * Math.cos(angle * 2.3));
    d.x = CX + Math.cos(angle) * rx;
    d.y = CY + Math.sin(angle) * ry * 0.65;

    // Musical progression — speed determines tempo
    d.noteTime += dt * d.speed * 2.0;
    const noteDur = d.durs[d.noteIdx];
    if (d.noteTime >= noteDur) {
      d.noteTime -= noteDur;
      d.noteIdx = (d.noteIdx + 1) % d.seq.length;
      d.currentInterval = d.seq[d.noteIdx] + d.transpose;
      d.targetHue = pitchToHue(d.currentInterval);
      d.envelope = 1.0; // note attack
    }

    // Envelope decay
    d.envelope *= (1.0 - dt * 3.0 * d.speed);
    d.envelope = Math.max(0, d.envelope);

    // Mouse disruption (from exp-055)
    if (mouseActive) {
      const dx = d.x - mouseX, dy = d.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        d.disrupted = Math.min(1, d.disrupted + dt * 3);
        // Push hue away from consensus
        d.hue = (d.hue + (1 - dist / 140) * 90 * dt * 2) % 360;
      } else {
        d.disrupted = Math.max(0, d.disrupted - dt * 0.5);
      }
    } else {
      d.disrupted = Math.max(0, d.disrupted - dt * 0.5);
    }

    // Converge hue toward target (pitch-based) and neighbors
    const left = delegates[(d.index - 1 + NUM) % NUM];
    const right = delegates[(d.index + 1) % NUM];
    const neighborMean = circularMean([left.hue, right.hue, d.targetHue]);
    const convRate = Math.min(d.speed * 0.4, 0.6) * (1 - d.disrupted * 0.8);
    d.hue = hueLerp(d.hue, neighborMean, convRate * dt);
    d.hue = hueLerp(d.hue, consensusHue, 0.015 * dt * (1 - d.disrupted));

    // Waveform: generate wave based on current interval
    const freq = 0.5 + d.currentInterval * 0.08;
    d.wavePhase += freq * dt * d.speed * 40;
    const waveVal = Math.sin(d.wavePhase) * (0.3 + d.envelope * 0.7);

    // Trail
    d.trail.push({ x: d.x, y: d.y, hue: d.hue, wave: waveVal, age: 0, env: d.envelope });
    const maxTrail = Math.min(TRAIL_LEN, Math.floor(d.speed * 400) + 4);
    while (d.trail.length > maxTrail) d.trail.shift();
    for (const pt of d.trail) pt.age += dt;
  }

  // Global consensus
  consensusHue = circularMean(delegates.map(d => d.hue));
  const pitches = delegates.map(d => d.currentInterval);
  consensusPitch = pitches.reduce((a, b) => a + b, 0) / pitches.length;
}

function draw() {
  // Fade
  ctx.fillStyle = 'rgba(8, 8, 15, 0.14)';
  ctx.fillRect(0, 0, W, H);

  // Connection web (from exp-055, styled like exp-064 counterpoint lines)
  ctx.lineWidth = 0.5;
  for (let i = 0; i < NUM; i++) {
    const d = delegates[i];
    const next = delegates[(i + 1) % NUM];
    const avgHue = hueLerp(d.hue, next.hue, 0.5);
    ctx.strokeStyle = `hsla(${avgHue}, 60%, 40%, 0.06)`;
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(next.x, next.y);
    ctx.stroke();
  }

  // Lines to center (counterpoint connection to consensus)
  for (const d of delegates) {
    const alpha = 0.02 + d.envelope * 0.04;
    ctx.strokeStyle = `hsla(${d.hue}, 70%, 50%, ${alpha})`;
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(CX, CY);
    ctx.stroke();
  }

  // Draw trails with waveform offset (gene from exp-064)
  for (const d of delegates) {
    if (d.trail.length < 2) continue;
    const trailAlpha = Math.min(0.55, d.speed * 8);
    for (let i = 1; i < d.trail.length; i++) {
      const pt = d.trail[i];
      const prev = d.trail[i - 1];
      const frac = i / d.trail.length;
      const alpha = frac * trailAlpha;
      // Offset perpendicular to trail direction by wave value
      const dx = pt.x - prev.x, dy = pt.y - prev.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const nx = -dy / len, ny = dx / len;
      const waveAmp = d.size * 2.5;
      const ox = nx * pt.wave * waveAmp * frac;
      const oy = ny * pt.wave * waveAmp * frac;

      ctx.strokeStyle = `hsla(${pt.hue}, 80%, 58%, ${alpha})`;
      ctx.lineWidth = d.size * frac * 0.6;
      ctx.beginPath();
      ctx.moveTo(prev.x + nx * prev.wave * waveAmp * ((i-1)/d.trail.length),
                 prev.y + ny * prev.wave * waveAmp * ((i-1)/d.trail.length));
      ctx.lineTo(pt.x + ox, pt.y + oy);
      ctx.stroke();
    }
  }

  // Draw delegates
  for (const d of delegates) {
    const sat = 75 + d.disrupted * 20;
    const light = 50 + d.envelope * 20 + d.disrupted * 15;
    const glowSize = d.size * (2.2 + d.envelope * 2 + d.disrupted * 1.5);

    // Glow
    const grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, glowSize);
    grad.addColorStop(0, `hsla(${d.hue}, ${sat}%, ${light}%, 0.55)`);
    grad.addColorStop(0.5, `hsla(${d.hue}, ${sat}%, ${light}%, 0.12)`);
    grad.addColorStop(1, `hsla(${d.hue}, ${sat}%, ${light}%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(d.x, d.y, glowSize, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = `hsl(${d.hue}, ${sat}%, ${light}%)`;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fill();

    // Bright center on note attack
    if (d.envelope > 0.2) {
      ctx.fillStyle = `hsla(${d.hue}, 30%, 92%, ${d.envelope * 0.7})`;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Consensus orb (from exp-055, pulsing with musical energy)
  const activeEnergy = delegates.reduce((a, d) => a + d.envelope, 0) / NUM;
  const orbPulse = 1 + 0.12 * Math.sin(time * 2.0) + activeEnergy * 0.3;
  const orbR = 30 * orbPulse;

  // Outer glow
  const orbGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, orbR * 3.5);
  orbGrad.addColorStop(0, `hsla(${consensusHue}, 85%, 62%, 0.45)`);
  orbGrad.addColorStop(0.3, `hsla(${consensusHue}, 75%, 48%, 0.18)`);
  orbGrad.addColorStop(0.7, `hsla(${consensusHue}, 65%, 35%, 0.04)`);
  orbGrad.addColorStop(1, `hsla(${consensusHue}, 50%, 25%, 0)`);
  ctx.fillStyle = orbGrad;
  ctx.beginPath();
  ctx.arc(CX, CY, orbR * 3.5, 0, Math.PI * 2);
  ctx.fill();

  // Inner orb
  const innerGrad = ctx.createRadialGradient(CX - orbR * 0.2, CY - orbR * 0.2, 0, CX, CY, orbR);
  innerGrad.addColorStop(0, `hsla(${consensusHue}, 45%, 92%, 0.85)`);
  innerGrad.addColorStop(0.4, `hsla(${consensusHue}, 80%, 60%, 0.7)`);
  innerGrad.addColorStop(1, `hsla(${consensusHue}, 85%, 35%, 0.5)`);
  ctx.fillStyle = innerGrad;
  ctx.beginPath();
  ctx.arc(CX, CY, orbR, 0, Math.PI * 2);
  ctx.fill();

  // Waveform ring around consensus orb
  ctx.strokeStyle = `hsla(${consensusHue}, 60%, 70%, 0.2)`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let a = 0; a < Math.PI * 2; a += 0.02) {
    const wave = Math.sin(a * 12 + time * 3) * 4 * orbPulse;
    const r = orbR * 1.5 + wave;
    const px = CX + Math.cos(a) * r;
    const py = CY + Math.sin(a) * r;
    if (a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.stroke();

  // Labels
  ctx.fillStyle = `hsla(${consensusHue}, 45%, 80%, 0.3)`;
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`consensus: ${Math.round(consensusHue)}\u00b0`, CX, CY + orbR * 1.5 + 22);

  // Agreement
  const hues = delegates.map(d => d.hue);
  let totalDist = 0;
  for (const h of hues) totalDist += hueDist(h, consensusHue);
  const agreement = Math.max(0, 1 - (totalDist / hues.length) / 180);
  ctx.fillText(`agreement: ${(agreement * 100).toFixed(1)}%`, CX, H - 32);

  // Tempo indicators
  ctx.fillStyle = 'rgba(180,180,220,0.12)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('adagio', 12, 18);
  ctx.textAlign = 'right';
  ctx.fillText('prestissimo', W - 12, 18);
}

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// Initial clear
ctx.fillStyle = '#08080f';
ctx.fillRect(0, 0, W, H);

requestAnimationFrame(loop);
</script>
</body>
</html>
