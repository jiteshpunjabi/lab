<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impossible Garden</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a0f; }
canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// --- Setup ---
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.008);

const camera = new THREE.PerspectiveCamera(60, 1280 / 720, 0.1, 200);
camera.position.set(0, 6, 16);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(1280, 720);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// --- Mouse tracking ---
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = (e.clientY / window.innerHeight) * 2 - 1;
});

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x2a2a4e, 1.2);
scene.add(ambientLight);

// Hemisphere light for richer fill
const hemiLight = new THREE.HemisphereLight(0x4444ff, 0xff4400, 0.8);
scene.add(hemiLight);

// Spectral point lights that orbit
const lights = [];
const lightColors = [0xff2266, 0x22ff88, 0x4488ff, 0xffaa22, 0xcc44ff];
for (let i = 0; i < lightColors.length; i++) {
  const light = new THREE.PointLight(lightColors[i], 6, 60);
  scene.add(light);
  lights.push({ light, phase: (i / lightColors.length) * Math.PI * 2 });
}

// --- Materials ---
function createIridescentMaterial(baseHue) {
  return new THREE.MeshPhysicalMaterial({
    color: new THREE.Color().setHSL(baseHue, 0.7, 0.5),
    metalness: 0.8,
    roughness: 0.15,
    clearcoat: 1.0,
    clearcoatRoughness: 0.1,
    emissive: new THREE.Color().setHSL(baseHue, 1.0, 0.2),
    side: THREE.DoubleSide,
  });
}

// --- Impossible Geometry: Möbius Strips ---
function createMobiusStrip(radius, tubeWidth, segments, twists) {
  const geometry = new THREE.BufferGeometry();
  const positions = [];
  const normals = [];
  const indices = [];
  const widthSegs = 8;

  for (let i = 0; i <= segments; i++) {
    const u = (i / segments) * Math.PI * 2;
    for (let j = 0; j <= widthSegs; j++) {
      const v = (j / widthSegs - 0.5) * tubeWidth;
      const halfTwist = u * twists / 2;

      const x = (radius + v * Math.cos(halfTwist)) * Math.cos(u);
      const y = (radius + v * Math.cos(halfTwist)) * Math.sin(u);
      const z = v * Math.sin(halfTwist);

      positions.push(x, y, z);

      // Approximate normal
      const nx = Math.cos(halfTwist) * Math.cos(u);
      const ny = Math.cos(halfTwist) * Math.sin(u);
      const nz = Math.sin(halfTwist);
      normals.push(nx, ny, nz);
    }
  }

  for (let i = 0; i < segments; i++) {
    for (let j = 0; j < widthSegs; j++) {
      const a = i * (widthSegs + 1) + j;
      const b = a + widthSegs + 1;
      indices.push(a, b, a + 1);
      indices.push(b, b + 1, a + 1);
    }
  }

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geometry.setIndex(indices);
  return geometry;
}

// --- Impossible Geometry: Trefoil Knot (parametric) ---
function createTrefoilKnot(scale, tubeRadius, segments, tubeSegs) {
  const path = new THREE.Curve();
  path.getPoint = function(t) {
    t *= Math.PI * 2;
    const x = Math.sin(t) + 2 * Math.sin(2 * t);
    const y = Math.cos(t) - 2 * Math.cos(2 * t);
    const z = -Math.sin(3 * t);
    return new THREE.Vector3(x, y, z).multiplyScalar(scale);
  };
  return new THREE.TubeGeometry(path, segments, tubeRadius, tubeSegs, true);
}

// --- Impossible Geometry: Klein Bottle-inspired surface ---
function createKleinInspired(scale, segments) {
  const geometry = new THREE.BufferGeometry();
  const positions = [];
  const normals = [];
  const indices = [];

  for (let i = 0; i <= segments; i++) {
    const u = (i / segments) * Math.PI * 2;
    for (let j = 0; j <= segments; j++) {
      const v = (j / segments) * Math.PI * 2;

      // Figure-8 Klein bottle immersion
      const a = 2;
      const cosU = Math.cos(u), sinU = Math.sin(u);
      const cosV = Math.cos(v), sinV = Math.sin(v);

      const x = (a + cosU * 0.5 * cosV - sinU * 0.5 * Math.sin(2*v)) * cosU * scale;
      const y = (a + cosU * 0.5 * cosV - sinU * 0.5 * Math.sin(2*v)) * sinU * scale;
      const z = (sinU * 0.5 * cosV + cosU * 0.5 * Math.sin(2*v)) * scale;

      positions.push(x, y, z);
      // Rough normal via cross product approximation
      normals.push(cosU * cosV, sinU * cosV, sinV);
    }
  }

  for (let i = 0; i < segments; i++) {
    for (let j = 0; j < segments; j++) {
      const a = i * (segments + 1) + j;
      const b = a + segments + 1;
      indices.push(a, b, a + 1);
      indices.push(b, b + 1, a + 1);
    }
  }

  geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();
  return geometry;
}

// --- Build the garden ---
const sculptures = [];

// Central trefoil knot — the garden's heart
const trefoilGeo = createTrefoilKnot(2.5, 0.5, 200, 16);
const trefoilMat = createIridescentMaterial(0.0);
const trefoilMesh = new THREE.Mesh(trefoilGeo, trefoilMat);
trefoilMesh.position.set(0, 2, 0);
scene.add(trefoilMesh);
sculptures.push({ mesh: trefoilMesh, rotSpeed: new THREE.Vector3(0.2, 0.3, 0.1), floatPhase: 0 });

// Orbiting Möbius strips — impossible loops
for (let i = 0; i < 3; i++) {
  const hue = 0.25 + i * 0.25;
  const mobiusGeo = createMobiusStrip(1.2 + i * 0.3, 0.6, 120, 1 + i * 2);
  const mobiusMat = createIridescentMaterial(hue);
  const mobiusMesh = new THREE.Mesh(mobiusGeo, mobiusMat);
  const angle = (i / 3) * Math.PI * 2;
  const orbitR = 7 + i * 2;
  mobiusMesh.position.set(Math.cos(angle) * orbitR, 1 + i * 2, Math.sin(angle) * orbitR);
  mobiusMesh.scale.setScalar(0.8);
  scene.add(mobiusMesh);
  sculptures.push({
    mesh: mobiusMesh,
    rotSpeed: new THREE.Vector3(0.4 - i * 0.1, 0.2 + i * 0.15, 0.3),
    floatPhase: i * 2.1,
    orbitRadius: orbitR,
    orbitSpeed: 0.15 + i * 0.05,
    orbitOffset: angle,
    baseY: 1 + i * 2
  });
}

// Klein-inspired surfaces — impossible bottles blooming
for (let i = 0; i < 2; i++) {
  const kleinGeo = createKleinInspired(1.0, 60);
  const kleinMat = createIridescentMaterial(0.55 + i * 0.2);
  kleinMat.transparent = true;
  kleinMat.opacity = 0.7;
  const kleinMesh = new THREE.Mesh(kleinGeo, kleinMat);
  const angle = (i / 2) * Math.PI * 2 + Math.PI / 4;
  kleinMesh.position.set(Math.cos(angle) * 12, 3, Math.sin(angle) * 12);
  kleinMesh.scale.setScalar(0.6);
  scene.add(kleinMesh);
  sculptures.push({
    mesh: kleinMesh,
    rotSpeed: new THREE.Vector3(0.15, 0.25, 0.35),
    floatPhase: i * 3.5,
    orbitRadius: 12,
    orbitSpeed: 0.08,
    orbitOffset: angle,
    baseY: 3
  });
}

// --- Floating platonic solids as garden "seeds" ---
const platonicGeos = [
  new THREE.TetrahedronGeometry(0.4),
  new THREE.OctahedronGeometry(0.35),
  new THREE.IcosahedronGeometry(0.3),
  new THREE.DodecahedronGeometry(0.25),
];

for (let i = 0; i < 30; i++) {
  const geo = platonicGeos[i % platonicGeos.length];
  const mat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color().setHSL(Math.random(), 0.9, 0.6),
    metalness: 0.9,
    roughness: 0.05,
    emissive: new THREE.Color().setHSL(Math.random(), 1.0, 0.3),
  });
  const mesh = new THREE.Mesh(geo, mat);
  const theta = Math.random() * Math.PI * 2;
  const r = 3 + Math.random() * 18;
  mesh.position.set(
    Math.cos(theta) * r,
    -1 + Math.random() * 10,
    Math.sin(theta) * r
  );
  scene.add(mesh);
  sculptures.push({
    mesh,
    rotSpeed: new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2
    ),
    floatPhase: Math.random() * 10,
    floatAmp: 0.3 + Math.random() * 0.8,
    isSeed: true
  });
}

// --- Ground plane: reflective dark mirror ---
const groundGeo = new THREE.PlaneGeometry(80, 80);
const groundMat = new THREE.MeshPhysicalMaterial({
  color: 0x080812,
  metalness: 1.0,
  roughness: 0.3,
  clearcoat: 0.5,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2;
scene.add(ground);

// --- Grid lines on ground ---
const gridHelper = new THREE.GridHelper(80, 40, 0x1a1a3e, 0x0d0d1e);
gridHelper.position.y = -1.99;
scene.add(gridHelper);

// --- Particle field (floating motes) ---
const particleCount = 500;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 60;
  particlePositions[i * 3 + 1] = Math.random() * 20 - 2;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
  const col = new THREE.Color().setHSL(Math.random(), 0.8, 0.7);
  particleColors[i * 3] = col.r;
  particleColors[i * 3 + 1] = col.g;
  particleColors[i * 3 + 2] = col.b;
}
particleGeo.setAttribute('position', new THREE.Float32BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.Float32BufferAttribute(particleColors, 3));
const particleMat = new THREE.PointsMaterial({
  size: 0.15,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// --- Animation ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = Math.min(clock.getDelta(), 0.05);

  // Camera orbits slowly, influenced by mouse
  const camAngle = t * 0.1 + mouseX * 0.5;
  const camHeight = 6 + mouseY * 3;
  const camRadius = 16 + Math.sin(t * 0.15) * 3;
  camera.position.set(
    Math.cos(camAngle) * camRadius,
    camHeight + Math.sin(t * 0.2) * 2,
    Math.sin(camAngle) * camRadius
  );
  camera.lookAt(0, 2 + Math.sin(t * 0.3), 0);

  // Animate sculptures
  for (const s of sculptures) {
    s.mesh.rotation.x += s.rotSpeed.x * 0.01;
    s.mesh.rotation.y += s.rotSpeed.y * 0.01;
    s.mesh.rotation.z += s.rotSpeed.z * 0.01;

    // Float up and down
    const floatAmp = s.floatAmp || 1.0;
    if (s.orbitRadius) {
      const angle = s.orbitOffset + t * s.orbitSpeed;
      s.mesh.position.x = Math.cos(angle) * s.orbitRadius;
      s.mesh.position.z = Math.sin(angle) * s.orbitRadius;
      s.mesh.position.y = s.baseY + Math.sin(t * 0.5 + s.floatPhase) * floatAmp;
    } else if (!s.isSeed) {
      s.mesh.position.y = 2 + Math.sin(t * 0.5 + s.floatPhase) * 1.5;
    } else {
      s.mesh.position.y += Math.sin(t * 0.7 + s.floatPhase) * 0.003;
    }

    // Morph scale for breathing effect
    if (!s.isSeed) {
      const breathe = 1.0 + Math.sin(t * 0.8 + s.floatPhase) * 0.08;
      s.mesh.scale.setScalar(s.mesh.scale.x > 0.5 ? breathe * 0.8 : breathe * 0.6);
    }

    // Shift material hue over time
    if (s.mesh.material.color) {
      const hsl = {};
      s.mesh.material.color.getHSL(hsl);
      s.mesh.material.color.setHSL((hsl.h + 0.0003) % 1, hsl.s, hsl.l);
      if (s.mesh.material.emissive) {
        s.mesh.material.emissive.setHSL((hsl.h + 0.0003) % 1, 1.0, s.isSeed ? 0.3 : 0.2);
      }
    }
  }

  // Animate lights
  for (let i = 0; i < lights.length; i++) {
    const l = lights[i];
    const angle = l.phase + t * (0.3 + i * 0.1);
    const r = 10 + Math.sin(t * 0.2 + i) * 5;
    l.light.position.set(
      Math.cos(angle) * r,
      4 + Math.sin(t * 0.5 + i * 1.5) * 6,
      Math.sin(angle) * r
    );
    // Pulse intensity
    l.light.intensity = 6 + Math.sin(t * 0.8 + i * 1.2) * 3;
  }

  // Animate particles - gentle drift
  const posArr = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    posArr[i * 3 + 1] += Math.sin(t * 0.3 + i * 0.1) * 0.002;
    posArr[i * 3] += Math.cos(t * 0.2 + i * 0.05) * 0.001;
    // Wrap around
    if (posArr[i * 3 + 1] > 20) posArr[i * 3 + 1] = -2;
    if (posArr[i * 3 + 1] < -3) posArr[i * 3 + 1] = 20;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
