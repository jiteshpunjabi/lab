<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nave</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #08080d;
    cursor: crosshair;
  }
  body {
    perspective: 1200px;
    perspective-origin: 50% 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cathedral {
    position: relative;
    width: 100vw; height: 100vh;
    transform-style: preserve-3d;
  }

  /* Floor - receding grid */
  .floor {
    position: absolute;
    width: 200vw; height: 200vh;
    left: -50vw; top: 50%;
    transform: rotateX(85deg) translateZ(-200px);
    background:
      repeating-linear-gradient(90deg, transparent, transparent 98px, rgba(180, 160, 120, 0.15) 98px, rgba(180, 160, 120, 0.15) 100px),
      repeating-linear-gradient(0deg, transparent, transparent 98px, rgba(180, 160, 120, 0.15) 98px, rgba(180, 160, 120, 0.15) 100px);
  }

  /* Columns */
  .column {
    position: absolute;
    width: 28px;
    height: 75vh;
    bottom: 12vh;
    transform-style: preserve-3d;
  }

  .column::before {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    background: linear-gradient(to top, rgba(70, 60, 45, 1), rgba(90, 80, 60, 0.75) 30%, rgba(110, 100, 75, 0.45) 70%, rgba(130, 120, 90, 0.25));
    border-left: 1px solid rgba(200, 180, 140, 0.2);
    border-right: 1px solid rgba(200, 180, 140, 0.2);
  }

  .column::after {
    content: '';
    position: absolute;
    height: 18px; top: -9px;
    width: 48px; left: -10px;
    background: rgba(90, 80, 60, 0.5);
    border: 1px solid rgba(180, 160, 120, 0.15);
    clip-path: polygon(10% 100%, 0% 0%, 100% 0%, 90% 100%);
  }

  .col-l1 { left: 15%; transform: translateZ(0px); }
  .col-l2 { left: 17.5%; transform: translateZ(-280px) scale(0.78); opacity: 0.7; }
  .col-l3 { left: 19.5%; transform: translateZ(-560px) scale(0.58); opacity: 0.5; }
  .col-l4 { left: 21%; transform: translateZ(-840px) scale(0.42); opacity: 0.35; }
  .col-l5 { left: 22%; transform: translateZ(-1100px) scale(0.3); opacity: 0.22; }

  .col-r1 { right: 15%; transform: translateZ(0px); }
  .col-r2 { right: 17.5%; transform: translateZ(-280px) scale(0.78); opacity: 0.7; }
  .col-r3 { right: 19.5%; transform: translateZ(-560px) scale(0.58); opacity: 0.5; }
  .col-r4 { right: 21%; transform: translateZ(-840px) scale(0.42); opacity: 0.35; }
  .col-r5 { right: 22%; transform: translateZ(-1100px) scale(0.3); opacity: 0.22; }

  /* Pointed arches */
  .arch {
    position: absolute;
    transform-style: preserve-3d;
  }

  .arch-shape {
    position: absolute;
    width: 38vw; height: 18vh;
    left: 31%;
    border: 1.5px solid rgba(180, 160, 120, 0.12);
    border-bottom: none;
    border-radius: 40% 40% 0 0;
  }

  .arch-bay1 { top: 12vh; transform: translateZ(0px); }
  .arch-bay1 .arch-shape { opacity: 1; }
  .arch-bay2 { top: 14.5vh; transform: translateZ(-280px) scale(0.78); }
  .arch-bay2 .arch-shape { width: 33vw; left: 33.5%; opacity: 0.7; }
  .arch-bay3 { top: 16.5vh; transform: translateZ(-560px) scale(0.58); }
  .arch-bay3 .arch-shape { width: 29vw; left: 35.5%; opacity: 0.5; }
  .arch-bay4 { top: 18vh; transform: translateZ(-840px) scale(0.42); }
  .arch-bay4 .arch-shape { width: 26vw; left: 37%; opacity: 0.35; }

  /* Rose window */
  .rose-window {
    position: absolute;
    width: 160px; height: 160px;
    left: 50%; top: 22%;
    transform: translate(-50%, -50%) translateZ(-900px);
    border-radius: 50%;
    opacity: 0.7;
  }

  .ring {
    position: absolute; border-radius: 50%;
    border: 1px solid;
    animation: rose-pulse 8s ease-in-out infinite;
  }
  .ring:nth-child(1) { width: 100%; height: 100%; inset: 0; border-color: rgba(180, 50, 50, 0.35); }
  .ring:nth-child(2) { width: 72%; height: 72%; top: 14%; left: 14%; border-color: rgba(50, 90, 180, 0.35); animation-delay: -1s; }
  .ring:nth-child(3) { width: 46%; height: 46%; top: 27%; left: 27%; border-color: rgba(180, 160, 50, 0.35); animation-delay: -2s; }
  .ring:nth-child(4) { width: 22%; height: 22%; top: 39%; left: 39%; border-color: rgba(130, 50, 180, 0.35); animation-delay: -3s; }

  .petal {
    position: absolute;
    width: 32px; height: 65px;
    left: calc(50% - 16px); top: calc(50% - 65px);
    transform-origin: 50% 100%;
    border-radius: 50% 50% 0 0;
    border: 1px solid rgba(200, 160, 100, 0.15);
    background: radial-gradient(ellipse at 50% 80%, rgba(200, 50, 50, 0.06), transparent);
  }
  .petal:nth-child(5) { transform: rotate(0deg); }
  .petal:nth-child(6) { transform: rotate(45deg); }
  .petal:nth-child(7) { transform: rotate(90deg); }
  .petal:nth-child(8) { transform: rotate(135deg); }
  .petal:nth-child(9) { transform: rotate(180deg); }
  .petal:nth-child(10) { transform: rotate(225deg); }
  .petal:nth-child(11) { transform: rotate(270deg); }
  .petal:nth-child(12) { transform: rotate(315deg); }

  @keyframes rose-pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  /* Light shafts */
  .light-shaft {
    position: absolute;
    pointer-events: none;
    mix-blend-mode: screen;
  }
  .shaft-1 {
    width: 110px; height: 70vh; left: 22%; top: 3%;
    transform: skewX(-10deg);
    background: linear-gradient(to bottom, transparent, rgba(255, 220, 150, 0.05) 15%, rgba(255, 200, 120, 0.03) 50%, transparent 85%);
    animation: shaft-flicker 12s ease-in-out infinite;
  }
  .shaft-2 {
    width: 70px; height: 55vh; right: 24%; top: 8%;
    transform: skewX(6deg);
    background: linear-gradient(to bottom, transparent, rgba(255, 210, 140, 0.04) 20%, rgba(255, 190, 110, 0.025) 55%, transparent 80%);
    animation: shaft-flicker 15s ease-in-out infinite -4s;
  }
  .shaft-3 {
    width: 180px; height: 60vh; left: 36%; top: 8%;
    transform: skewX(-2deg);
    background: linear-gradient(to bottom, transparent, rgba(255, 200, 100, 0.025) 25%, rgba(255, 180, 80, 0.015) 60%, transparent 85%);
    animation: shaft-flicker 10s ease-in-out infinite -7s;
  }

  @keyframes shaft-flicker {
    0%, 100% { opacity: 0.5; }
    30% { opacity: 1; }
    60% { opacity: 0.35; }
    80% { opacity: 0.85; }
  }

  /* Dust motes */
  .dust-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; }
  .dust {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: rgba(255, 220, 150, 0.5);
    pointer-events: none;
  }
  .dust:nth-child(1) { left: 30%; animation: drift 20s linear infinite 0s; }
  .dust:nth-child(2) { left: 45%; width: 3px; height: 3px; animation: drift 25s linear infinite -5s; }
  .dust:nth-child(3) { left: 55%; animation: drift 18s linear infinite -10s; }
  .dust:nth-child(4) { left: 35%; width: 1px; height: 1px; opacity: 0.3; animation: drift 22s linear infinite -3s; }
  .dust:nth-child(5) { left: 50%; animation: drift 28s linear infinite -14s; }
  .dust:nth-child(6) { left: 42%; width: 3px; height: 3px; opacity: 0.25; animation: drift 16s linear infinite -8s; }
  .dust:nth-child(7) { left: 58%; animation: drift 24s linear infinite -17s; }
  .dust:nth-child(8) { left: 25%; width: 1px; height: 1px; animation: drift 30s linear infinite -12s; }
  .dust:nth-child(9) { left: 48%; animation: drift 26s linear infinite -20s; }
  .dust:nth-child(10) { left: 38%; width: 2px; height: 2px; opacity: 0.35; animation: drift 19s linear infinite -6s; }

  @keyframes drift {
    0% { top: -5%; opacity: 0; transform: translateX(0); }
    10% { opacity: 0.7; }
    50% { transform: translateX(25px); }
    90% { opacity: 0.5; }
    100% { top: 105%; opacity: 0; transform: translateX(-18px); }
  }

  /* Vault ribs */
  .vault { position: absolute; width: 100%; height: 28vh; top: 0; pointer-events: none; transform-style: preserve-3d; }
  .rib {
    position: absolute; width: 55%; height: 22vh; left: 22.5%;
    border: 1px solid rgba(180, 160, 120, 0.08);
    border-bottom: none;
    border-radius: 48% 48% 0 0;
  }
  .rib:nth-child(1) { transform: translateZ(0px); opacity: 0.9; }
  .rib:nth-child(2) { transform: translateZ(-140px) scale(0.9); opacity: 0.7; }
  .rib:nth-child(3) { transform: translateZ(-280px) scale(0.8); opacity: 0.55; }
  .rib:nth-child(4) { transform: translateZ(-420px) scale(0.7); opacity: 0.4; }
  .rib:nth-child(5) { transform: translateZ(-560px) scale(0.6); opacity: 0.28; }
  .rib:nth-child(6) { transform: translateZ(-700px) scale(0.5); opacity: 0.18; }
  .rib:nth-child(7) { transform: translateZ(-840px) scale(0.4); opacity: 0.1; }

  .vault-diag {
    position: absolute; width: 1px; height: 30vh; top: 0;
    background: linear-gradient(to bottom, rgba(180, 160, 120, 0.12), transparent);
  }
  .vault-diag.vl { left: 22%; transform: skewX(22deg); }
  .vault-diag.vr { right: 22%; transform: skewX(-22deg); }

  /* Side windows */
  .window-niche {
    position: absolute;
    width: 36px; height: 90px;
    border: 1px solid rgba(180, 160, 120, 0.12);
    border-radius: 45% 45% 0 0;
    overflow: hidden;
  }
  .window-niche .glow { width: 100%; height: 100%; animation: window-glow 6s ease-in-out infinite; }
  .niche-l1 { left: 13.5%; top: 25%; }
  .niche-l1 .glow { background: radial-gradient(ellipse, rgba(80, 130, 220, 0.15), transparent); }
  .niche-l2 { left: 15.8%; top: 29%; transform: translateZ(-280px) scale(0.72); opacity: 0.55; }
  .niche-l2 .glow { background: radial-gradient(ellipse, rgba(220, 80, 80, 0.1), transparent); animation-delay: -2s; }
  .niche-r1 { right: 13.5%; top: 25%; }
  .niche-r1 .glow { background: radial-gradient(ellipse, rgba(220, 180, 80, 0.15), transparent); animation-delay: -1s; }
  .niche-r2 { right: 15.8%; top: 29%; transform: translateZ(-280px) scale(0.72); opacity: 0.55; }
  .niche-r2 .glow { background: radial-gradient(ellipse, rgba(80, 220, 130, 0.1), transparent); animation-delay: -3s; }
  .niche-l3 { left: 17.5%; top: 32%; transform: translateZ(-560px) scale(0.5); opacity: 0.35; }
  .niche-l3 .glow { background: radial-gradient(ellipse, rgba(180, 80, 220, 0.08), transparent); animation-delay: -4s; }
  .niche-r3 { right: 17.5%; top: 32%; transform: translateZ(-560px) scale(0.5); opacity: 0.35; }
  .niche-r3 .glow { background: radial-gradient(ellipse, rgba(220, 150, 80, 0.08), transparent); animation-delay: -5s; }

  @keyframes window-glow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Haze */
  .haze {
    position: absolute; width: 100%; height: 35vh; bottom: 0;
    background: linear-gradient(to top, rgba(15, 13, 20, 0.85), transparent);
    pointer-events: none;
  }

  /* Apse */
  .apse {
    position: absolute;
    width: 90px; height: 110px;
    left: 50%; top: 48%;
    transform: translate(-50%, -50%) translateZ(-1100px);
    border-radius: 45% 45% 0 0;
    border: 1px solid rgba(180, 160, 120, 0.08);
    background: radial-gradient(ellipse at 50% 65%, rgba(255, 200, 100, 0.04), transparent);
  }
  .apse::after {
    content: '';
    position: absolute;
    width: 3px; height: 24px;
    left: 50%; bottom: 18px;
    transform: translateX(-50%);
    background: rgba(255, 200, 100, 0.2);
    box-shadow: 0 0 15px rgba(255, 200, 100, 0.08), 0 -8px 20px rgba(255, 180, 80, 0.06);
    animation: candle 3s ease-in-out infinite;
  }

  @keyframes candle {
    0%, 100% { opacity: 0.6; height: 24px; }
    25% { opacity: 1; height: 26px; }
    50% { opacity: 0.4; height: 22px; }
    75% { opacity: 0.85; height: 25px; }
  }

  .shadow-line {
    position: absolute; width: 1px; height: 75vh; bottom: 12vh;
    background: linear-gradient(to top, rgba(0,0,0,0.25), transparent 55%);
  }
  .shadow-line.sl1 { left: calc(15% + 30px); }
  .shadow-line.sl2 { right: calc(15% + 30px); }
</style>
</head>
<body>
<div class="cathedral" id="cathedral">
  <div class="vault">
    <div class="rib"></div><div class="rib"></div><div class="rib"></div><div class="rib"></div>
    <div class="rib"></div><div class="rib"></div><div class="rib"></div>
    <div class="vault-diag vl"></div>
    <div class="vault-diag vr"></div>
  </div>

  <div class="arch arch-bay1"><div class="arch-shape"></div></div>
  <div class="arch arch-bay2"><div class="arch-shape"></div></div>
  <div class="arch arch-bay3"><div class="arch-shape"></div></div>
  <div class="arch arch-bay4"><div class="arch-shape"></div></div>

  <div class="column col-l1"></div><div class="column col-l2"></div>
  <div class="column col-l3"></div><div class="column col-l4"></div><div class="column col-l5"></div>
  <div class="column col-r1"></div><div class="column col-r2"></div>
  <div class="column col-r3"></div><div class="column col-r4"></div><div class="column col-r5"></div>

  <div class="shadow-line sl1"></div>
  <div class="shadow-line sl2"></div>

  <div class="window-niche niche-l1"><div class="glow"></div></div>
  <div class="window-niche niche-l2"><div class="glow"></div></div>
  <div class="window-niche niche-l3"><div class="glow"></div></div>
  <div class="window-niche niche-r1"><div class="glow"></div></div>
  <div class="window-niche niche-r2"><div class="glow"></div></div>
  <div class="window-niche niche-r3"><div class="glow"></div></div>

  <div class="rose-window">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
  </div>

  <div class="apse"></div>

  <div class="light-shaft shaft-1"></div>
  <div class="light-shaft shaft-2"></div>
  <div class="light-shaft shaft-3"></div>

  <div class="dust-layer">
    <div class="dust"></div><div class="dust"></div><div class="dust"></div><div class="dust"></div>
    <div class="dust"></div><div class="dust"></div><div class="dust"></div><div class="dust"></div>
    <div class="dust"></div><div class="dust"></div>
  </div>

  <div class="floor"></div>
  <div class="haze"></div>
</div>

<script>
  const cathedral = document.getElementById('cathedral');
  let tX = 0, tY = 0, cX = 0, cY = 0;

  document.addEventListener('mousemove', (e) => {
    const cx = (e.clientX / window.innerWidth - 0.5) * 2;
    const cy = (e.clientY / window.innerHeight - 0.5) * 2;
    tY = cx * 6;
    tX = cy * -3;
  });

  (function loop() {
    cX += (tX - cX) * 0.035;
    cY += (tY - cY) * 0.035;
    cathedral.style.transform = 'rotateX(' + cX + 'deg) rotateY(' + cY + 'deg)';
    requestAnimationFrame(loop);
  })();
</script>
</body>
</html>
