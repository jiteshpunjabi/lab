<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reduction Block</title>
<style>
  html,body{margin:0;padding:0;background:#f3ead9;font-family:Georgia,serif;color:#3a2a14;overflow:hidden}
  .stage{position:relative;width:1280px;height:720px;margin:0 auto;background:
    radial-gradient(ellipse at 50% 55%, #fbf3df 0%, #ead7b0 60%, #c6ad7c 100%)}
  canvas{position:absolute;left:140px;top:80px;
    box-shadow:
      0 2px 0 rgba(0,0,0,0.06),
      0 30px 60px -20px rgba(60,35,10,0.45),
      0 8px 20px rgba(60,35,10,0.25);
    border:12px solid #fffbec;
    background:#fffbec;
    cursor:crosshair}
  .label{position:absolute;left:140px;top:32px;font-size:13px;letter-spacing:0.3em;text-transform:uppercase;color:#6b4820}
  .title{position:absolute;right:140px;top:24px;font-size:14px;letter-spacing:0.2em;color:#6b4820;text-align:right}
  .title b{display:block;font-size:22px;letter-spacing:0.08em;color:#2b1a06;font-variant:small-caps}
  .legend{position:absolute;left:140px;bottom:34px;display:flex;gap:18px;align-items:center;font-size:11px;letter-spacing:0.15em;color:#4a3318}
  .swatch{display:flex;align-items:center;gap:6px}
  .sw{width:14px;height:14px;border:1px solid rgba(0,0,0,0.3)}
  .meta{position:absolute;right:140px;bottom:34px;font-size:11px;letter-spacing:0.15em;color:#4a3318;text-align:right}
  .meta b{color:#2b1a06}
  .grain{position:absolute;inset:0;pointer-events:none;opacity:0.1;mix-blend-mode:multiply;background-image:
    repeating-linear-gradient(27deg, rgba(40,20,0,0.6) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(117deg, rgba(40,20,0,0.4) 0 1px, transparent 1px 5px)}
</style>
</head>
<body>
<div class="stage">
  <div class="label">Plate I &mdash; Reduction Method</div>
  <div class="title"><b>REDUCTION BLOCK</b>a print that destroys its own matrix</div>
  <canvas id="c" width="1000" height="520"></canvas>
  <div class="legend" id="legend"></div>
  <div class="meta" id="meta">Pass <b><span id="pass">0</span>/6</b> &nbsp;&nbsp; Block integrity <b><span id="integ">100%</span></b></div>
  <div class="grain"></div>
</div>
<script>
/*
  Cross-discipline theft: REDUCTION PRINTMAKING (Picasso's linocut technique).
  A single linoleum "block" is progressively carved away and reprinted in
  successive color passes. Each carve destroys the block irreversibly --
  you cannot go back. The image emerges from accumulated loss.
  Lightest colors print first (on most of the block). Darker colors print
  last (on what little remains). The matrix cannot survive its own image.
*/
const c = document.getElementById('c');
const ctx = c.getContext('2d', {willReadFrequently:true});
const W = c.width, H = c.height;

const CELL = 4;
const GW = Math.floor(W/CELL), GH = Math.floor(H/CELL);
const destroyed = new Uint8Array(GW*GH);
const gidx = (x,y)=>y*GW+x;

function paperBG(){
  const grad = ctx.createRadialGradient(W*0.5,H*0.55,50,W*0.5,H*0.55,W*0.8);
  grad.addColorStop(0,'#fbf3df');
  grad.addColorStop(1,'#e1c993');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
  for(let i=0;i<1800;i++){
    ctx.fillStyle = `rgba(${80+Math.random()*60},${60+Math.random()*40},${20+Math.random()*30},${0.06+Math.random()*0.12})`;
    ctx.fillRect(Math.random()*W,Math.random()*H,1+Math.random()*2,1);
  }
}

// Hidden subject: stylized profile head with sun and rays
let subjectPhase = 0;
function subject(x,y){
  const nx = (x/GW-0.5)*2;
  const ny = (y/GH-0.5)*2;
  // Head oval, slightly off-center left
  const hx = nx+0.1, hy = ny+0.05;
  const headD = Math.hypot(hx*1.15, hy*1.05);
  const head = Math.max(0, 1 - headD/0.6);
  // Sun upper right
  const sx = nx-0.62, sy = ny+0.58;
  const sunD = Math.hypot(sx,sy);
  const sun = Math.max(0, 1 - sunD/0.18);
  // Sun rays
  let rays = 0;
  const ra = Math.atan2(sy,sx);
  if(sunD>0.18 && sunD<0.42){
    rays = Math.max(0, Math.cos(ra*8)*0.7 - (sunD-0.18)*2.5);
  }
  // Eye
  const ex = nx+0.02, ey = ny-0.05;
  const eye = Math.max(0, 0.13 - Math.hypot(ex*1.7, ey*3.2));
  // Mouth - curved
  const mx = nx+0.05, my = ny-0.3 + 0.05*Math.cos(mx*6);
  const mouth = Math.max(0, 0.09 - Math.hypot(mx*1.3, my*4));
  // Nose
  const nose = Math.max(0, 0.06 - Math.abs(nx+0.08-ny*0.1)) * Math.max(0,(0.25-Math.abs(ny-0.08)));
  // Hair waves on left side
  const haD = Math.hypot(nx+0.38, ny+0.1);
  const hair = Math.max(0, 0.45 - haD*1.2) * (0.5+0.5*Math.sin(ny*16+nx*5+subjectPhase));
  // Shoulder arc
  const shoulder = Math.max(0, 0.35 - Math.abs(ny-0.78)*2.2 - Math.abs(nx-0.05)*0.45);

  let v = head*0.85 + sun*1.0 + rays*0.65 + hair*0.8 + shoulder*0.55
        - eye*3 - mouth*2.4 + nose*2.2;
  v += Math.sin(nx*14+subjectPhase)*Math.cos(ny*17)*0.04;
  return Math.max(0, Math.min(1, v));
}

// Carve a tool stroke (destroys block cells along path)
function gouge(x0,y0,x1,y1,w){
  const steps = Math.max(1, Math.ceil(Math.hypot(x1-x0,y1-y0)));
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const px=x0+(x1-x0)*t, py=y0+(y1-y0)*t;
    const r = w*(0.75+0.25*Math.sin(t*Math.PI));
    const rr = Math.ceil(r);
    for(let dy=-rr;dy<=rr;dy++){
      for(let dx=-rr;dx<=rr;dx++){
        if(dx*dx+dy*dy<=r*r){
          const gx=Math.floor(px+dx), gy=Math.floor(py+dy);
          if(gx>=0&&gx<GW&&gy>=0&&gy<GH) destroyed[gidx(gx,gy)]=1;
        }
      }
    }
  }
}

function printPass(color, jitter){
  const img = ctx.getImageData(0,0,W,H);
  const data = img.data;
  const [r,g,b,a] = color;
  for(let y=0;y<GH;y++){
    for(let x=0;x<GW;x++){
      if(destroyed[gidx(x,y)]) continue;
      const s = subject(x,y);
      // ink density modulated by subject + slight unevenness
      const ink = 0.55 + s*0.45;
      const jx = (Math.random()-0.5)*jitter;
      const jy = (Math.random()-0.5)*jitter;
      const px = Math.floor(x*CELL+jx), py = Math.floor(y*CELL+jy);
      for(let dy=0;dy<CELL;dy++){
        for(let dx=0;dx<CELL;dx++){
          const xi = px+dx, yi = py+dy;
          if(xi<0||xi>=W||yi<0||yi>=H) continue;
          const idx = (yi*W+xi)*4;
          const cover = ink * (0.55+0.45*Math.random());
          const ar = a*cover;
          data[idx]   = data[idx]  *(1-ar) + r*ar;
          data[idx+1] = data[idx+1]*(1-ar) + g*ar;
          data[idx+2] = data[idx+2]*(1-ar) + b*ar;
        }
      }
    }
  }
  ctx.putImageData(img,0,0);
}

function carveForPass(pass, totalPasses){
  const threshold = 0.08 + (pass/(totalPasses)) * 0.72;
  const toolW = 1.8 + (totalPasses-pass)*0.5;
  const strokes = 1400;
  for(let i=0;i<strokes;i++){
    const gx = Math.floor(Math.random()*GW);
    const gy = Math.floor(Math.random()*GH);
    if(destroyed[gidx(gx,gy)]) continue;
    const s = subject(gx,gy);
    if(s>=threshold) continue;
    const eps=2;
    const dxs = subject(gx+eps,gy)-subject(gx-eps,gy);
    const dys = subject(gx,gy+eps)-subject(gx,gy-eps);
    let ang = Math.atan2(dys,dxs)+Math.PI/2;
    ang += (Math.random()-0.5)*0.8;
    const len = 6+Math.random()*18;
    gouge(gx,gy,gx+Math.cos(ang)*len,gy+Math.sin(ang)*len,toolW);
  }
}

const palette = [
  {name:'Ochre',     rgb:[224,170, 62], a:0.48},
  {name:'Sienna',    rgb:[176, 82, 32], a:0.58},
  {name:'Vermilion', rgb:[206, 48, 28], a:0.62},
  {name:'Viridian',  rgb:[ 22,108, 82], a:0.66},
  {name:'Prussian',  rgb:[ 18, 54,104], a:0.72},
  {name:'Ink',       rgb:[ 18, 14, 12], a:0.92},
];

const legendEl = document.getElementById('legend');
legendEl.innerHTML = palette.map(p=>`<div class="swatch"><div class="sw" style="background:rgb(${p.rgb.join(',')})"></div>${p.name}</div>`).join('');

const passEl = document.getElementById('pass');
const integEl = document.getElementById('integ');

function integrity(){
  let cnt=0; for(let i=0;i<destroyed.length;i++) if(!destroyed[i]) cnt++;
  return Math.round(100*cnt/destroyed.length);
}

let currentPass = 0;
const totalPasses = palette.length;

function runPass(){
  if(currentPass>=totalPasses){
    // Final: thin dark contour strokes
    ctx.save();
    ctx.strokeStyle='rgba(22,16,12,0.85)';
    ctx.lineWidth=1.1;
    for(let i=0;i<120;i++){
      const gx = Math.floor(Math.random()*GW);
      const gy = Math.floor(Math.random()*GH);
      if(destroyed[gidx(gx,gy)]) continue;
      if(subject(gx,gy)<0.55) continue;
      const eps=2;
      const dxs = subject(gx+eps,gy)-subject(gx-eps,gy);
      const dys = subject(gx,gy+eps)-subject(gx,gy-eps);
      const ang = Math.atan2(dys,dxs)+Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(gx*CELL,gy*CELL);
      ctx.lineTo(gx*CELL+Math.cos(ang)*24,gy*CELL+Math.sin(ang)*24);
      ctx.stroke();
    }
    ctx.restore();
    return;
  }
  if(currentPass>0) carveForPass(currentPass, totalPasses);
  const p = palette[currentPass];
  printPass([...p.rgb, p.a], currentPass===0?0:1.8);
  currentPass++;
  passEl.textContent = currentPass;
  integEl.textContent = integrity()+'%';
  setTimeout(runPass, 420);
}

// Prime
paperBG();
printPass([248,235,200,0.35],0);
setTimeout(runPass, 120);

// Click to restart with shifted subject
c.addEventListener('click',()=>{
  currentPass = 0;
  destroyed.fill(0);
  subjectPhase += 1.1;
  paperBG();
  printPass([248,235,200,0.35],0);
  setTimeout(runPass, 100);
});
</script>
</body>
</html>
