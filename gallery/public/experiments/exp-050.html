<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>exp-050 — Plague Symphony</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #faf3e0; overflow: hidden; width: 1280px; height: 720px; }
canvas { display: block; }
#info {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font: 13px/1.4 'Georgia', serif; color: #5a4a3a; opacity: 0.7;
  text-align: center; pointer-events: none;
}
</style>
</head>
<body>
<canvas id="c" width="1280" height="720"></canvas>
<div id="info">Click a note to introduce Patient Zero. Watch the plague spread through the score.</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;

let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

const STAFF_COUNT = 4;
const LINES_PER_STAFF = 5;
const LINE_GAP = 12;
const STAFF_GAP = 150;
const STAFF_TOP = 80;
const NOTE_COLS = 32;
const NOTE_START_X = 100;
const NOTE_SPACING = 35;

const FREQS = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.25,698.46];

const notes = [];
let noteId = 0;

for (let s = 0; s < STAFF_COUNT; s++) {
  const staffY = STAFF_TOP + s * STAFF_GAP;
  for (let col = 0; col < NOTE_COLS; col++) {
    const linePos = Math.floor(Math.sin(col * 0.7 + s * 2.1) * 4.5 + 5);
    const x = NOTE_START_X + col * NOTE_SPACING;
    const y = staffY + (10 - linePos) * (LINE_GAP / 2);
    notes.push({
      id: noteId++,
      staff: s,
      col: col,
      x: x, y: y,
      pitchIdx: linePos,
      originalPitchIdx: linePos,
      radius: 7,
      infected: false,
      infectionTime: 0,
      infectionLevel: 0,
      mutated: false,
      mutationOffset: 0,
      dead: false,
      deathTime: 0,
      color: '#2a2a2a',
      stemDir: linePos > 5 ? -1 : 1,
      neighbors: [],
      tremor: 0,
      tremorPhase: Math.random() * Math.PI * 2,
    });
  }
}

for (let i = 0; i < notes.length; i++) {
  for (let j = i + 1; j < notes.length; j++) {
    const dx = notes[i].x - notes[j].x;
    const dy = notes[i].y - notes[j].y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < NOTE_SPACING * 1.8) {
      notes[i].neighbors.push(j);
      notes[j].neighbors.push(i);
    }
  }
}

let infectedCount = 0;
let totalDead = 0;
let startTime = null;

function infectNote(note, time) {
  if (note.infected || note.dead) return;
  note.infected = true;
  note.infectionTime = time;
  infectedCount++;
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = FREQS[note.pitchIdx] || 440;
    osc.type = 'sine';
    gain.gain.value = 0.06;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

function mutateNote(note) {
  if (note.mutated) return;
  note.mutated = true;
  note.mutationOffset = (Math.random() - 0.5) * 4;
  note.pitchIdx = Math.max(0, Math.min(10, Math.round(note.originalPitchIdx + note.mutationOffset)));
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = FREQS[note.pitchIdx] * (1 + (Math.random() - 0.5) * 0.1);
    osc.type = 'sawtooth';
    gain.gain.value = 0.03;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function killNote(note, time) {
  if (note.dead) return;
  note.dead = true;
  note.deathTime = time;
  totalDead++;
  spawnDeathParticles(note);
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = 60 + Math.random() * 30;
    osc.type = 'triangle';
    gain.gain.value = 0.04;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  for (const note of notes) {
    const dx = mx - note.x;
    const dy = my - note.y;
    if (dx * dx + dy * dy < 225) {
      if (!startTime) startTime = performance.now();
      infectNote(note, performance.now());
      document.getElementById('info').style.opacity = '0';
      break;
    }
  }
});

setTimeout(() => {
  if (!startTime) {
    startTime = performance.now();
    const centerNote = notes[Math.floor(notes.length / 2) + 3];
    infectNote(centerNote, performance.now());
    document.getElementById('info').style.opacity = '0';
  }
}, 3000);

const particles = [];

function spawnDeathParticles(note) {
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 1.5;
    particles.push({
      x: note.x, y: note.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.5,
      life: 1,
      color: note.infectionLevel > 0.8 ? '#8b0000' : '#a04020',
      size: 2 + Math.random() * 3,
    });
  }
}

let lastSpreadCheck = 0;

function update(now) {
  if (!startTime) { draw(now); requestAnimationFrame(update); return; }

  if (now - lastSpreadCheck > 300) {
    lastSpreadCheck = now;
    for (const note of notes) {
      if (!note.infected || note.dead) continue;
      const timeSinceInfection = now - note.infectionTime;
      note.infectionLevel = Math.min(1, timeSinceInfection / 5000);
      note.tremor = note.infectionLevel * 3;

      if (timeSinceInfection > 800) {
        for (const ni of note.neighbors) {
          const neighbor = notes[ni];
          if (!neighbor.infected && !neighbor.dead) {
            if (Math.random() < note.infectionLevel * 0.15) {
              infectNote(neighbor, now);
            }
          }
        }
      }
      if (note.infectionLevel > 0.4 && !note.mutated && Math.random() < 0.3) {
        mutateNote(note);
      }
      if (note.infectionLevel > 0.95 && !note.dead) {
        killNote(note, now);
      }
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.02; p.life -= 0.008;
    if (p.life <= 0) particles.splice(i, 1);
  }

  draw(now);
  requestAnimationFrame(update);
}

function draw(now) {
  ctx.fillStyle = '#faf3e0';
  ctx.fillRect(0, 0, W, H);

  // Paper texture
  ctx.globalAlpha = 0.03;
  for (let i = 0; i < 200; i++) {
    ctx.fillStyle = i % 2 ? '#c0a880' : '#e8d8b8';
    ctx.fillRect((i * 137.5) % W, (i * 89.3) % H, 3 + (i % 5), 1);
  }
  ctx.globalAlpha = 1;

  const t = now / 1000;

  // Draw staves
  for (let s = 0; s < STAFF_COUNT; s++) {
    const staffY = STAFF_TOP + s * STAFF_GAP;
    ctx.font = '11px Georgia';
    ctx.fillStyle = '#9a8a7a';
    ctx.fillText(['Violin I','Violin II','Viola','Cello'][s], 25, staffY - 8);

    ctx.strokeStyle = '#bfa880';
    ctx.lineWidth = 1;
    for (let l = 0; l < LINES_PER_STAFF; l++) {
      const ly = staffY + l * LINE_GAP;
      ctx.beginPath();
      for (let x = NOTE_START_X - 20; x < W - 30; x += 2) {
        let yOff = 0;
        for (const note of notes) {
          if (note.staff !== s || !note.infected) continue;
          const dx = x - note.x;
          if (Math.abs(dx) < 40) {
            yOff += Math.sin(t * 5 + dx * 0.1) * note.infectionLevel * 3 * (1 - Math.abs(dx) / 40);
          }
        }
        if (x === NOTE_START_X - 20) ctx.moveTo(x, ly + yOff);
        else ctx.lineTo(x, ly + yOff);
      }
      ctx.stroke();
    }

    // Bar lines
    for (let b = 0; b <= NOTE_COLS / 4; b++) {
      const bx = NOTE_START_X + b * NOTE_SPACING * 4 - NOTE_SPACING / 2;
      ctx.beginPath();
      ctx.moveTo(bx, staffY);
      ctx.lineTo(bx, staffY + LINE_GAP * 4);
      ctx.stroke();
    }
  }

  // Draw notes
  for (const note of notes) {
    ctx.save();
    const nx = note.x + (note.infected ? Math.sin(t * 12 + note.tremorPhase) * note.tremor : 0);
    const ny = note.y + (note.infected ? Math.cos(t * 10 + note.tremorPhase) * note.tremor * 0.5 : 0);

    if (note.dead) {
      const timeDead = now - note.deathTime;
      const fadeOut = Math.max(0, 1 - timeDead / 8000);
      ctx.globalAlpha = fadeOut * 0.4;
      ctx.fillStyle = '#8b0000';
      for (let f = 0; f < 3; f++) {
        ctx.beginPath();
        ctx.ellipse(
          nx + Math.sin(t + f * 2) * (timeDead / 500),
          ny + Math.cos(t * 0.7 + f * 3) * (timeDead / 700),
          note.radius * 0.5, note.radius * 0.35, -0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      if (fadeOut > 0.1) {
        ctx.strokeStyle = '#8b0000';
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = fadeOut * 0.6;
        ctx.beginPath();
        ctx.moveTo(nx - 6, ny - 6); ctx.lineTo(nx + 6, ny + 6);
        ctx.moveTo(nx + 6, ny - 6); ctx.lineTo(nx - 6, ny + 6);
        ctx.stroke();
      }
    } else if (note.infected) {
      const il = note.infectionLevel;
      const r = Math.floor(42 + il * 180);
      const g = Math.floor(42 - il * 42);
      const b = Math.floor(42 - il * 42);
      const noteColor = `rgb(${r},${g},${b})`;

      // Infection aura
      if (il > 0.2) {
        const grad = ctx.createRadialGradient(nx, ny, note.radius, nx, ny, note.radius * 3);
        grad.addColorStop(0, `rgba(180, 40, 20, ${il * 0.2})`);
        grad.addColorStop(1, 'rgba(180, 40, 20, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(nx, ny, note.radius * 3, 0, Math.PI * 2);
        ctx.fill();
      }

      const pulse = 1 + Math.sin(t * 4 + note.id) * il * 0.3;
      ctx.fillStyle = noteColor;
      ctx.beginPath();
      ctx.ellipse(nx, ny, note.radius * pulse, note.radius * 0.7 * pulse, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // Wobbly stem
      ctx.strokeStyle = noteColor;
      ctx.lineWidth = 1.5;
      const stemX = nx + (note.stemDir > 0 ? note.radius - 1 : -note.radius + 1);
      ctx.beginPath();
      ctx.moveTo(stemX, ny);
      for (let sy = 0; sy < 35; sy += 3) {
        ctx.lineTo(stemX + Math.sin(t * 6 + sy * 0.2 + note.id) * il * 2, ny + note.stemDir * -sy);
      }
      ctx.stroke();

      if (note.mutated) {
        ctx.font = '14px Georgia';
        ctx.fillStyle = '#c02020';
        ctx.fillText(note.mutationOffset > 0 ? '\u266F' : '\u266D', nx - 16, ny + 4);
      }
    } else {
      // Healthy note
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath();
      ctx.ellipse(nx, ny, note.radius, note.radius * 0.7, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#2a2a2a';
      ctx.lineWidth = 1.5;
      const stemX = nx + (note.stemDir > 0 ? note.radius - 1 : -note.radius + 1);
      ctx.beginPath();
      ctx.moveTo(stemX, ny);
      ctx.lineTo(stemX, ny + note.stemDir * -35);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Epidemiological report
  if (startTime) {
    const alive = notes.filter(n => !n.dead).length;
    const infected = notes.filter(n => n.infected && !n.dead).length;
    const healthy = notes.filter(n => !n.infected && !n.dead).length;
    const mutations = notes.filter(n => n.mutated).length;
    const x = W - 220, y = 30;

    ctx.fillStyle = 'rgba(250,243,224,0.92)';
    ctx.fillRect(x - 10, y - 16, 210, 95);
    ctx.strokeStyle = '#c0a880';
    ctx.lineWidth = 1;
    ctx.strokeRect(x - 10, y - 16, 210, 95);

    ctx.font = 'bold 11px "Courier New", monospace';
    ctx.fillStyle = '#5a4a3a';
    ctx.fillText('EPIDEMIOLOGICAL REPORT', x, y);
    ctx.font = '11px "Courier New", monospace';
    ctx.fillStyle = '#2a6a2a';
    ctx.fillText('Healthy:   ' + String(healthy).padStart(3), x, y + 18);
    ctx.fillStyle = '#b04020';
    ctx.fillText('Infected:  ' + String(infected).padStart(3), x, y + 33);
    ctx.fillStyle = '#8b0000';
    ctx.fillText('Dead:      ' + String(totalDead).padStart(3), x, y + 48);
    ctx.fillStyle = '#8040a0';
    ctx.fillText('Mutations: ' + String(mutations).padStart(3), x, y + 63);

    const barY = y + 72, barW = 190;
    ctx.fillStyle = '#e0d0b0';
    ctx.fillRect(x, barY, barW, 4);
    const hPct = healthy / notes.length;
    const iPct = infected / notes.length;
    const dPct = totalDead / notes.length;
    ctx.fillStyle = '#2a6a2a';
    ctx.fillRect(x, barY, barW * hPct, 4);
    ctx.fillStyle = '#b04020';
    ctx.fillRect(x + barW * hPct, barY, barW * iPct, 4);
    ctx.fillStyle = '#8b0000';
    ctx.fillRect(x + barW * (hPct + iPct), barY, barW * dPct, 4);
  }

  // Title
  ctx.font = 'italic 18px Georgia';
  ctx.fillStyle = '#5a4a3a';
  ctx.fillText('Plague Symphony', 25, H - 20);
}

requestAnimationFrame(update);
</script>
</body>
</html>
