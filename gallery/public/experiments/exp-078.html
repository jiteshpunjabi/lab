<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>Sonar Drum Circle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #0a0a12;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace;
  cursor: crosshair;
}
canvas {
  width: 1280px; height: 720px;
}
#instructions {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(0, 255, 180, 0.5);
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
  pointer-events: none;
  text-align: center;
  transition: opacity 2s;
}
#title {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(0, 255, 180, 0.25);
  font-size: 11px;
  letter-spacing: 6px;
  text-transform: uppercase;
  pointer-events: none;
}
#depth {
  position: absolute;
  top: 24px;
  right: 30px;
  color: rgba(0, 255, 180, 0.3);
  font-size: 11px;
  letter-spacing: 2px;
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="c" width="1280" height="720"></canvas>
<div id="title">SONAR DRUM CIRCLE</div>
<div id="depth">DEPTH: 2400m</div>
<div id="instructions">Click to send a ping &mdash; phantoms will answer</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;

let audioCtx = null;
let started = false;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playPing(freq, pan, delay, duration, type, volume) {
  const ac = ensureAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  const panner = ac.createStereoPanner();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.5, ac.currentTime + delay + duration);
  gain.gain.setValueAtTime(0, ac.currentTime + delay);
  gain.gain.linearRampToValueAtTime(volume || 0.15, ac.currentTime + delay + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + duration);
  panner.pan.setValueAtTime(pan, ac.currentTime + delay);
  osc.connect(gain);
  gain.connect(panner);
  panner.connect(ac.destination);
  osc.start(ac.currentTime + delay);
  osc.stop(ac.currentTime + delay + duration);
}

function generatePattern(beats, density) {
  const pulses = Math.round(beats * density);
  let bucket = 0;
  const pattern = [];
  for (let i = 0; i < beats; i++) {
    bucket += pulses;
    if (bucket >= beats) { bucket -= beats; pattern.push(1); }
    else { pattern.push(0); }
  }
  return pattern;
}

const phantoms = [
  { x: 200, y: 180, color: '#ff3366', name: 'ECHO-1', freq: 220, pattern: generatePattern(8, 0.375), beatLen: 8, step: 0, tempo: 280, type: 'sine', lastPulse: 0, pulses: [], driftAngle: 0, driftSpeed: 0.003 },
  { x: 1050, y: 200, color: '#33aaff', name: 'ECHO-2', freq: 330, pattern: generatePattern(12, 0.333), beatLen: 12, step: 0, tempo: 210, type: 'triangle', lastPulse: 0, pulses: [], driftAngle: Math.PI * 0.7, driftSpeed: 0.002 },
  { x: 640, y: 550, color: '#ffaa00', name: 'ECHO-3', freq: 165, pattern: generatePattern(16, 0.25), beatLen: 16, step: 0, tempo: 350, type: 'sawtooth', lastPulse: 0, pulses: [], driftAngle: Math.PI * 1.3, driftSpeed: 0.004 },
  { x: 350, y: 480, color: '#aa44ff', name: 'ECHO-4', freq: 440, pattern: generatePattern(7, 0.428), beatLen: 7, step: 0, tempo: 320, type: 'sine', lastPulse: 0, pulses: [], driftAngle: Math.PI * 0.2, driftSpeed: 0.0025 },
  { x: 900, y: 500, color: '#00ffaa', name: 'ECHO-5', freq: 277, pattern: generatePattern(5, 0.6), beatLen: 5, step: 0, tempo: 250, type: 'triangle', lastPulse: 0, pulses: [], driftAngle: Math.PI, driftSpeed: 0.0035 }
];

const rings = [];
const userPings = [];

function userPing(x, y) {
  if (!started) { started = true; document.getElementById('instructions').style.opacity = '0.2'; }
  rings.push({ x, y, radius: 0, maxRadius: 800, speed: 2.5, alpha: 1, color: '#00ffb4', lineWidth: 2 });
  const pan = (x / W) * 2 - 1;
  playPing(880, pan, 0, 0.6, 'sine', 0.2);
  playPing(1760, pan, 0, 0.3, 'sine', 0.08);

  phantoms.forEach(p => {
    const dist = Math.hypot(p.x - x, p.y - y);
    const delay = dist / 300;
    setTimeout(() => {
      if (audioCtx) {
        const pPan = (p.x / W) * 2 - 1;
        const beatTime = p.tempo / 1000;
        for (let i = 0; i < p.pattern.length; i++) {
          if (p.pattern[i]) {
            const vol = 0.12 * (1 - dist / 1200);
            if (vol > 0.01) {
              playPing(p.freq * (1 + Math.random() * 0.02), pPan, i * beatTime, beatTime * 0.8, p.type, vol);
              setTimeout(() => { p.pulses.push({ radius: 0, alpha: 1 }); }, i * beatTime * 1000);
            }
          }
        }
      }
    }, delay * 1000);
  });
  userPings.push({ x, y, time: performance.now() });
}

function updateAutoRhythm(now) {
  if (!started || !audioCtx) return;
  phantoms.forEach(p => {
    if (now - p.lastPulse > p.tempo) {
      p.lastPulse = now;
      p.step = (p.step + 1) % p.beatLen;
      if (p.pattern[p.step]) {
        const pan = (p.x / W) * 2 - 1;
        playPing(p.freq, pan, 0, p.tempo / 1500, p.type, 0.06);
        p.pulses.push({ radius: 0, alpha: 0.6 });
      }
    }
  });
}

function driftPhantoms() {
  phantoms.forEach(p => {
    p.driftAngle += p.driftSpeed;
    p.x += Math.cos(p.driftAngle) * 0.3;
    p.y += Math.sin(p.driftAngle * 0.7) * 0.2;
    p.x = Math.max(50, Math.min(W - 50, p.x));
    p.y = Math.max(50, Math.min(H - 50, p.y));
  });
}

let scanY = 0;

function draw(now) {
  ctx.fillStyle = 'rgba(10, 10, 18, 0.15)';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(0, 255, 180, 0.06)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 80) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  ctx.strokeStyle = 'rgba(0, 255, 180, 0.08)';
  for (let r = 100; r < 600; r += 100) { ctx.beginPath(); ctx.arc(W/2, H/2, r, 0, Math.PI*2); ctx.stroke(); }

  for (let i = rings.length - 1; i >= 0; i--) {
    const ring = rings[i];
    ring.radius += ring.speed;
    ring.alpha = 1 - ring.radius / ring.maxRadius;
    if (ring.alpha <= 0) { rings.splice(i, 1); continue; }
    const hex = ring.color;
    const cr = parseInt(hex.slice(1,3),16), cg = parseInt(hex.slice(3,5),16), cb = parseInt(hex.slice(5,7),16);
    ctx.strokeStyle = 'rgba('+cr+','+cg+','+cb+','+ring.alpha*0.7+')';
    ctx.lineWidth = ring.lineWidth * ring.alpha;
    ctx.beginPath(); ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI*2); ctx.stroke();
  }

  phantoms.forEach(p => {
    const hex = p.color;
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const blipAlpha = 0.3 + 0.2 * Math.sin(now * 0.003);

    ctx.fillStyle = 'rgba('+r+','+g+','+b+','+blipAlpha+')';
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();

    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 50);
    grad.addColorStop(0, 'rgba('+r+','+g+','+b+','+blipAlpha*0.5+')');
    grad.addColorStop(0.4, 'rgba('+r+','+g+','+b+','+blipAlpha*0.15+')');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(p.x-50, p.y-50, 100, 100);

    ctx.fillStyle = 'rgba('+r+','+g+','+b+','+blipAlpha*0.5+')';
    ctx.font = '9px Courier New';
    ctx.fillText(p.name, p.x+8, p.y-8);

    const dotSpacing = 8;
    const startX = p.x - p.beatLen * dotSpacing / 2;
    for (let i = 0; i < p.beatLen; i++) {
      const dx = startX + i * dotSpacing, dy = p.y + 18;
      if (p.pattern[i]) {
        ctx.fillStyle = 'rgba('+r+','+g+','+b+','+(i===p.step?0.9:0.3)+')';
        ctx.beginPath(); ctx.arc(dx, dy, i===p.step?3:1.8, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = 'rgba('+r+','+g+','+b+','+(i===p.step?0.4:0.08)+')';
        ctx.beginPath(); ctx.arc(dx, dy, 1.5, 0, Math.PI*2); ctx.fill();
      }
    }

    for (let i = p.pulses.length - 1; i >= 0; i--) {
      const pulse = p.pulses[i];
      pulse.radius += 1.5; pulse.alpha -= 0.012;
      if (pulse.alpha <= 0) { p.pulses.splice(i, 1); continue; }
      ctx.beginPath(); ctx.arc(p.x, p.y, pulse.radius, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba('+r+','+g+','+b+','+pulse.alpha*0.5+')';
      ctx.lineWidth = 1; ctx.stroke();
    }
  });

  for (let i = userPings.length - 1; i >= 0; i--) {
    const ping = userPings[i];
    const age = (now - ping.time) / 1000;
    if (age > 5) { userPings.splice(i, 1); continue; }
    const alpha = 1 - age / 5;
    ctx.fillStyle = 'rgba(0,255,180,'+alpha*0.6+')';
    ctx.beginPath(); ctx.arc(ping.x, ping.y, 3+age*2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,255,180,'+alpha*0.3+')';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(ping.x-10, ping.y); ctx.lineTo(ping.x+10, ping.y);
    ctx.moveTo(ping.x, ping.y-10); ctx.lineTo(ping.x, ping.y+10);
    ctx.stroke();
  }

  scanY = (scanY + 1) % H;
  ctx.fillStyle = 'rgba(0,255,180,0.02)';
  ctx.fillRect(0, scanY, W, 2);

  updateAutoRhythm(now);
  driftPhantoms();
  requestAnimationFrame(draw);
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  const y = (e.clientY - rect.top) * (H / rect.height);
  userPing(x, y);
});

setTimeout(() => {
  phantoms.forEach(p => {
    for (let i = 0; i < 3; i++) setTimeout(() => { p.pulses.push({ radius: 0, alpha: 0.5 }); }, i * 400);
  });
  rings.push({ x: 640, y: 360, radius: 20, maxRadius: 700, speed: 1.8, alpha: 0.9, color: '#00ffb4', lineWidth: 2 });
  rings.push({ x: 640, y: 360, radius: 80, maxRadius: 700, speed: 1.8, alpha: 0.7, color: '#00ffb4', lineWidth: 1.5 });
  rings.push({ x: 640, y: 360, radius: 140, maxRadius: 700, speed: 1.8, alpha: 0.6, color: '#00ffb4', lineWidth: 1.2 });
  rings.push({ x: 640, y: 360, radius: 200, maxRadius: 700, speed: 1.8, alpha: 0.45, color: '#00ffb4', lineWidth: 1 });
  rings.push({ x: 640, y: 360, radius: 280, maxRadius: 700, speed: 1.8, alpha: 0.3, color: '#00ffb4', lineWidth: 0.8 });
  setTimeout(() => { rings.push({ x: 200, y: 180, radius: 0, maxRadius: 400, speed: 2, alpha: 0.8, color: '#ff3366', lineWidth: 1 }); }, 300);
  setTimeout(() => { rings.push({ x: 1050, y: 200, radius: 0, maxRadius: 400, speed: 2, alpha: 0.8, color: '#33aaff', lineWidth: 1 }); }, 600);
  setTimeout(() => { rings.push({ x: 640, y: 550, radius: 0, maxRadius: 400, speed: 2, alpha: 0.8, color: '#ffaa00', lineWidth: 1 }); }, 900);
  setTimeout(() => { rings.push({ x: 350, y: 480, radius: 0, maxRadius: 400, speed: 2, alpha: 0.8, color: '#aa44ff', lineWidth: 1 }); }, 1200);
  setTimeout(() => { rings.push({ x: 900, y: 500, radius: 0, maxRadius: 400, speed: 2, alpha: 0.8, color: '#00ffaa', lineWidth: 1 }); }, 1500);
}, 100);

requestAnimationFrame(draw);
</script>
</body>
</html>
