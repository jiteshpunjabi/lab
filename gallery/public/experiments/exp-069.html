<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>Kintsugi Triptych</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; width: 1280px; height: 720px; }
canvas { display: block; }
#act-label {
  position: fixed; top: 32px; left: 0; right: 0; text-align: center;
  font-family: 'Georgia', serif; color: rgba(212, 175, 55, 0);
  font-size: 18px; letter-spacing: 6px; text-transform: uppercase;
  transition: color 2s ease; pointer-events: none; z-index: 10;
}
#act-label.visible { color: rgba(212, 175, 55, 0.7); }
#act-label.fade { color: rgba(212, 175, 55, 0); }
</style>
</head>
<body>
<div id="act-label"></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
canvas.width = W; canvas.height = H;
const label = document.getElementById('act-label');

let act = 0, actTimer = 0;
let mouseX = W/2, mouseY = H/2, mouseActive = false;
let lastInteraction = 0, totalTime = 0;

const CX = W/2, CY = H/2, VESSEL_R = 155;
const SHARD_COUNT = 130;

class Shard {
  constructor(i, total) {
    const angle = (i / total) * Math.PI * 2;
    const ring = i % 5;
    const r = VESSEL_R * 0.18 + ring * (VESSEL_R * 0.82 / 5);
    this.homeX = CX + Math.cos(angle) * r;
    this.homeY = CY + Math.sin(angle) * r * 0.88;
    this.x = this.homeX; this.y = this.homeY;
    this.vx = 0; this.vy = 0;
    this.angle = angle;
    this.rotation = angle * 0.3;
    this.rotVel = 0;
    this.size = 9 + ring * 2.5 + Math.sin(i * 1.7) * 3;
    this.ring = ring;
    const fa = Math.random() * Math.PI * 2;
    const fd = 450 + Math.random() * 550;
    this.formX = CX + Math.cos(fa) * fd;
    this.formY = CY + Math.sin(fa) * fd;
    this.formRot = Math.random() * Math.PI * 6;
    this.shape = [];
    const sides = 5 + Math.floor(Math.random() * 3);
    for (let j = 0; j < sides; j++) {
      const a = (j / sides) * Math.PI * 2;
      this.shape.push({ x: Math.cos(a) * (0.4 + Math.random() * 0.6), y: Math.sin(a) * (0.4 + Math.random() * 0.6) });
    }
    this.cracked = false; this.crackAmount = 0; this.goldAmount = 0; this.totalGold = 0;
    this.crackSeeds = [];
    for (let j = 0; j < 5; j++) {
      this.crackSeeds.push({ a: Math.random() * Math.PI * 2, len: 0.3 + Math.random() * 0.5, br: Math.random() * 0.5 - 0.25 });
    }
    this.hue = 18 + Math.sin(i * 0.5) * 12;
    this.sat = 35 + ring * 5;
    this.lit = 42 + ring * 7 + Math.sin(i * 2.3) * 5;
    this.dissolveDelay = 0.5 + Math.random() * 3.5;
    this.dissolved = 0;
    this.dust = [];
  }
  tracePath(ctx, ox, oy, sz, rot) {
    ctx.save(); ctx.translate(ox, oy); ctx.rotate(rot); ctx.beginPath();
    this.shape.forEach((p, i) => { i === 0 ? ctx.moveTo(p.x * sz, p.y * sz) : ctx.lineTo(p.x * sz, p.y * sz); });
    ctx.closePath(); ctx.restore();
  }
}

const shards = Array.from({length: SHARD_COUNT}, (_, i) => new Shard(i, SHARD_COUNT));

const goldMotes = Array.from({length: 70}, () => ({
  x: Math.random() * W, y: Math.random() * H, sz: 0.5 + Math.random() * 1.8,
  sp: 0.12 + Math.random() * 0.35, ph: Math.random() * Math.PI * 2
}));

function showLabel(text) {
  label.textContent = text; label.className = 'visible';
  setTimeout(() => label.className = 'visible fade', 3000);
}
function startAct(n) {
  act = n; actTimer = 0;
  if (n === 0) showLabel('Act I \u2014 Formation');
  if (n === 1) showLabel('Act II \u2014 Life');
  if (n === 2) showLabel('Act III \u2014 Dissolution');
}
startAct(0);

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top) * (H / r.height);
  mouseActive = true; if (act === 1) lastInteraction = totalTime;
});
canvas.addEventListener('mousedown', () => { mouseActive = true; if (act === 1) lastInteraction = totalTime; });
canvas.addEventListener('mouseup', () => mouseActive = false);
canvas.addEventListener('mouseleave', () => mouseActive = false);

// Auto-play for screenshot (aggressive early to show kintsugi effect in 5s screenshot window)
let autoT = 0, realUser = false;
canvas.addEventListener('mousemove', () => { realUser = true; });
function autoPlay(dt) {
  if (realUser || act !== 1) return;
  autoT += dt;
  // Quick break-heal-break cycle for visible gold
  const cyc = autoT % 5;
  if (cyc < 1.2) {
    mouseX = CX - 40 + Math.sin(autoT * 4) * 50; mouseY = CY + Math.cos(autoT * 3) * 40;
    mouseActive = true; lastInteraction = totalTime;
  } else if (cyc < 2.5) {
    mouseActive = false; mouseX = -200; mouseY = -200;
  } else if (cyc < 3.7) {
    mouseX = CX + 35 + Math.cos(autoT * 3) * 45; mouseY = CY - 20 + Math.sin(autoT * 2.5) * 35;
    mouseActive = true; lastInteraction = totalTime;
  } else {
    mouseActive = false; mouseX = W + 200; mouseY = H + 200;
  }
}

function update(dt) {
  totalTime += dt; actTimer += dt;
  autoPlay(dt);

  if (act === 0) {
    const p = Math.min(actTimer / 3, 1), e = 1 - Math.pow(1 - p, 4);
    shards.forEach(s => {
      s.x = s.formX + (s.homeX - s.formX) * e;
      s.y = s.formY + (s.homeY - s.formY) * e;
      s.rotation = s.formRot + (s.angle * 0.3 - s.formRot) * e;
    });
    if (actTimer > 3.2) { startAct(1); lastInteraction = totalTime; }
  }
  else if (act === 1) {
    const idle = totalTime - lastInteraction, healing = idle > 1.0;
    shards.forEach(s => {
      const dx = s.x - mouseX, dy = s.y - mouseY, dist = Math.sqrt(dx*dx + dy*dy);
      if (mouseActive && dist < 95) {
        const f = dist < 35 ? 14 : 6, pd = Math.max(dist, 12);
        s.vx += (dx/pd) * f * dt * 50; s.vy += (dy/pd) * f * dt * 50;
        s.rotVel += (Math.random() - 0.5) * 0.6;
        s.cracked = true; s.crackAmount = Math.min(s.crackAmount + dt * 3.5, 1);
      }
      if (healing) {
        s.vx += (s.homeX - s.x) * 0.018; s.vy += (s.homeY - s.y) * 0.018;
        if (s.cracked && s.crackAmount > 0) {
          s.goldAmount = Math.min(s.goldAmount + dt * 0.7, s.crackAmount);
          if (s.goldAmount >= s.crackAmount - 0.02) {
            s.totalGold = Math.min(s.totalGold + s.crackAmount * 0.06, 1);
            s.crackAmount *= 0.96; s.goldAmount *= 0.96;
            if (s.crackAmount < 0.03) { s.cracked = false; s.crackAmount = 0; s.goldAmount = 0; }
          }
        }
        s.rotVel *= 0.92; s.rotVel += (s.angle * 0.3 - s.rotation) * 0.01;
      }
      s.x += s.vx; s.y += s.vy; s.vx *= 0.91; s.vy *= 0.91;
      s.rotation += s.rotVel; s.rotVel *= 0.95;
      s.x = Math.max(5, Math.min(W-5, s.x)); s.y = Math.max(5, Math.min(H-5, s.y));
    });
    const gs = shards.reduce((a, s) => a + s.totalGold, 0);
    if ((gs > SHARD_COUNT * 0.07 && actTimer > 18) || actTimer > 38) startAct(2);
  }
  else if (act === 2) {
    shards.forEach(s => {
      if (actTimer > s.dissolveDelay) {
        s.dissolved = Math.min((actTimer - s.dissolveDelay) / 4.5, 1);
        if (s.dissolved < 0.85 && Math.random() < 0.22) {
          const g = s.totalGold > 0.02 && Math.random() < 0.6;
          s.dust.push({ x: s.x + (Math.random()-.5)*s.size, y: s.y + (Math.random()-.5)*s.size,
            vx: (Math.random()-.5)*1.5, vy: -Math.random()*2.5 - 0.3, life: 1,
            sz: 1 + Math.random()*(g?4:2.5), gold: g });
        }
        s.vy -= 0.018; s.vx += (Math.random()-.5)*0.07; s.rotVel += (Math.random()-.5)*0.004;
      }
      s.x += s.vx; s.y += s.vy; s.rotation += s.rotVel;
      s.dust.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy -= 0.012; p.vx *= 0.99; p.life -= 0.005; });
      s.dust = s.dust.filter(p => p.life > 0);
    });
  }
  goldMotes.forEach(g => { g.y -= g.sp; g.x += Math.sin(totalTime*0.8+g.ph)*0.25; if(g.y < -10){g.y=H+10;g.x=Math.random()*W;} });
}

function draw() {
  ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,W,H);
  // center glow
  const grd = ctx.createRadialGradient(CX,CY,0,CX,CY,350);
  grd.addColorStop(0,'rgba(40,25,10,0.3)'); grd.addColorStop(0.5,'rgba(20,15,8,0.12)'); grd.addColorStop(1,'rgba(10,10,15,0)');
  ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

  // motes
  goldMotes.forEach(g => {
    ctx.fillStyle = `rgba(212,175,55,${0.15+Math.sin(totalTime*1.5+g.ph)*0.1})`;
    ctx.beginPath(); ctx.arc(g.x,g.y,g.sz,0,Math.PI*2); ctx.fill();
  });

  // shards sorted by ring
  [...shards].sort((a,b) => a.ring - b.ring).forEach(s => {
    if (act === 2 && s.dissolved >= 1) { drawDust(s); return; }
    const alpha = act === 2 ? Math.max(0, 1-s.dissolved) : 1;
    const fAlpha = act === 0 ? Math.min(actTimer/1.5, 1) : 1;
    ctx.save(); ctx.globalAlpha = alpha * fAlpha;

    // body
    s.tracePath(ctx, s.x, s.y, s.size, s.rotation);
    const gt = s.totalGold * 30;
    ctx.fillStyle = `hsl(${s.hue+gt},${s.sat}%,${s.lit+s.totalGold*10}%)`; ctx.fill();
    s.tracePath(ctx, s.x, s.y, s.size, s.rotation);
    ctx.strokeStyle = 'rgba(255,240,220,0.1)'; ctx.lineWidth = 0.5; ctx.stroke();

    // cracks
    if (s.crackAmount > 0.05) {
      ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rotation);
      s.crackSeeds.forEach((c, ci) => {
        if (ci > s.crackAmount * 5) return;
        const len = s.size * c.len * s.crackAmount;
        ctx.beginPath(); ctx.moveTo(0,0);
        const ex = Math.cos(c.a)*len, ey = Math.sin(c.a)*len;
        ctx.lineTo(ex, ey); ctx.lineTo(ex+Math.cos(c.a+c.br)*len*0.4, ey+Math.sin(c.a+c.br)*len*0.4);
        ctx.strokeStyle = `rgba(20,10,5,${s.crackAmount*0.7})`; ctx.lineWidth = 1.5*s.crackAmount; ctx.stroke();
      });
      ctx.restore();
    }

    // gold seams
    const gv = Math.max(s.goldAmount, s.totalGold * 0.8);
    if (gv > 0.03) {
      ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.rotation);
      s.crackSeeds.forEach((c, ci) => {
        if (ci > gv * 5 + 1) return;
        const len = s.size * c.len * gv;
        const ex = Math.cos(c.a)*len, ey = Math.sin(c.a)*len;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ex,ey);
        ctx.lineTo(ex+Math.cos(c.a+c.br)*len*0.4, ey+Math.sin(c.a+c.br)*len*0.4);
        ctx.shadowColor = 'rgba(255,200,50,0.6)'; ctx.shadowBlur = 6*gv;
        ctx.strokeStyle = `rgba(212,175,55,${gv*0.85})`; ctx.lineWidth = 1+gv*2.5; ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ex,ey);
        ctx.strokeStyle = `rgba(255,230,120,${gv*0.5})`; ctx.lineWidth = 0.5+gv; ctx.stroke();
      });
      // gold outline
      s.tracePath(ctx, 0, 0, s.size*0.97, 0);
      ctx.shadowColor = 'rgba(255,200,50,0.4)'; ctx.shadowBlur = 4*gv;
      ctx.strokeStyle = `rgba(212,175,55,${gv*0.35})`; ctx.lineWidth = 0.8+gv; ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    }
    drawDust(s);
    ctx.restore();
  });

  // healing aura
  if (act === 1 && totalTime - lastInteraction > 1.0) {
    const pulse = Math.sin(totalTime*1.5)*0.08+0.12;
    const hg = ctx.createRadialGradient(CX,CY,30,CX,CY,VESSEL_R*1.8);
    hg.addColorStop(0,`rgba(212,175,55,${pulse})`); hg.addColorStop(0.5,`rgba(200,160,40,${pulse*0.3})`); hg.addColorStop(1,'rgba(180,140,30,0)');
    ctx.fillStyle = hg; ctx.fillRect(0,0,W,H);
  }
  // cursor glow
  if (act === 1 && mouseActive) {
    const cg = ctx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,80);
    cg.addColorStop(0,'rgba(255,80,30,0.07)'); cg.addColorStop(1,'rgba(255,50,20,0)');
    ctx.fillStyle = cg; ctx.fillRect(mouseX-100,mouseY-100,200,200);
  }

  // final text
  if (act === 2 && actTimer > 8) {
    const fi = Math.min((actTimer-8)/3, 1);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '16px Georgia'; ctx.fillStyle = `rgba(212,175,55,${fi*0.55})`;
    ctx.fillText('What breaks becomes more precious.', CX, CY-10);
    ctx.font = '13px Georgia'; ctx.fillStyle = `rgba(212,175,55,${fi*0.35})`;
    ctx.fillText('The gold remembers every wound.', CX, CY+18);
  }

  // act dots
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.arc(W*0.485+i*22, H-14, 3, 0, Math.PI*2);
    ctx.fillStyle = i===act ? 'rgba(212,175,55,0.6)' : 'rgba(212,175,55,0.15)'; ctx.fill();
  }
}

function drawDust(s) {
  s.dust.forEach(p => {
    if (p.gold) { ctx.shadowColor='rgba(255,200,50,0.5)'; ctx.shadowBlur=3; ctx.fillStyle=`rgba(255,210,60,${p.life*0.8})`; }
    else { ctx.fillStyle=`rgba(180,140,90,${p.life*0.45})`; }
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  });
}

let lastT = performance.now();
function loop(now) {
  const dt = Math.min((now - lastT)/1000, 0.05); lastT = now;
  update(dt); draw(); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
