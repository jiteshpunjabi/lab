<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exp-043 — Tideline</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');
if (!gl) document.body.innerHTML = '<p style="color:white;padding:2em">WebGL 2 required</p>';

let W, H, mouse = { x: 0.5, y: 0.3 }, time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  gl.viewport(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX / W;
  mouse.y = 1.0 - e.clientY / H;
});

const vs = `#version 300 es
in vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0, 1); }
`;

const fs = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;

vec2 hash22(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * vec3(.1031, .1030, .0973));
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.xx + p3.yz) * p3.zy);
}

float hash21(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * .1031);
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash21(i), hash21(i + vec2(1, 0)), f.x),
             mix(hash21(i + vec2(0, 1)), hash21(i + vec2(1, 1)), f.x), f.y);
}

float fbm(vec2 p, int oct) {
  float v = 0.0, a = 0.5;
  mat2 r = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 8; i++) {
    if (i >= oct) break;
    v += a * noise(p);
    p = r * p * 2.0;
    a *= 0.5;
  }
  return v;
}

float terrain(vec2 p) {
  vec2 q = vec2(fbm(p, 6), fbm(p + vec2(5.2, 1.3), 6));
  vec2 r2 = vec2(fbm(p + 4.0 * q + vec2(1.7, 9.2), 6),
                fbm(p + 4.0 * q + vec2(8.3, 2.8), 6));
  return fbm(p + 4.0 * r2, 6);
}

float waterWaves(vec2 p, float t) {
  float w = 0.0;
  w += 0.35 * sin(p.x * 1.2 + t * 0.7 + sin(p.y * 0.3 + t * 0.2) * 2.0);
  w += 0.15 * sin(p.x * 3.5 - t * 1.3 + p.y * 0.8);
  w += 0.1 * sin(p.x * 2.1 + t * 0.9 + p.y * 1.5);
  w += 0.06 * sin(p.x * 8.0 + t * 2.5 + sin(p.y * 3.0) * 1.5);
  w += 0.04 * sin(p.y * 7.0 - t * 1.8 + p.x * 2.0);
  w += 0.07 * noise(p * 4.0 + t * vec2(0.6, 0.3));
  return w;
}

float foam(vec2 p, float t, float sd) {
  float f = 0.0;
  float wl = sin(p.x * 1.5 + t * 0.8) * 0.3 + sin(p.x * 3.0 - t * 1.2) * 0.15;
  float fd = sd - wl * 0.15;
  f += smoothstep(0.08, 0.0, abs(fd)) * 0.8;
  f += smoothstep(0.15, 0.0, abs(fd - 0.05)) * 0.4;
  float bub = noise(p * 30.0 + t * vec2(1.0, 0.5));
  f += bub * smoothstep(0.2, 0.0, sd) * 0.5;
  return clamp(f, 0.0, 1.0);
}

vec3 sky(vec2 uv, float t) {
  float dp = u_mouse.x * 6.28318;
  float sh = sin(dp);
  vec2 sp = vec2(cos(dp) * 0.5 + 0.5, sh * 0.3 + 0.3);

  vec3 zen, hor, sc;
  if (sh > 0.0) {
    zen = mix(vec3(0.15, 0.15, 0.4), vec3(0.2, 0.4, 0.8), sh);
    hor = mix(vec3(0.8, 0.5, 0.3), vec3(0.6, 0.8, 0.95), sh);
    sc = mix(vec3(1.0, 0.4, 0.15), vec3(1.0, 0.95, 0.8), sh);
  } else {
    float nd = clamp(-sh, 0.0, 1.0);
    zen = mix(vec3(0.15, 0.1, 0.25), vec3(0.02, 0.02, 0.08), nd);
    hor = mix(vec3(0.4, 0.2, 0.2), vec3(0.05, 0.03, 0.1), nd);
    sc = vec3(0.8, 0.3, 0.1) * max(0.0, 1.0 + sh * 3.0);
  }

  vec3 col = mix(hor, zen, pow(uv.y, 0.7));

  float sd2 = length(uv - sp);
  col += sc * exp(-sd2 * 8.0) * 1.5;
  col += sc * exp(-sd2 * 2.0) * 0.3;
  if (sd2 < 0.03) col += sc * 2.0;

  if (sh < 0.0) {
    vec2 mp = vec2(1.0 - sp.x, 0.6 + sh * 0.1);
    float md = length(uv - mp);
    col += vec3(0.9, 0.92, 1.0) * smoothstep(0.025, 0.02, md) * 0.8;
    col += vec3(0.4, 0.45, 0.6) * exp(-md * 5.0) * 0.3;
    vec2 su = floor(uv * 80.0);
    float st = step(0.98, hash21(su));
    float tw = sin(t * 2.0 + hash21(su) * 6.28) * 0.5 + 0.5;
    col += vec3(0.8, 0.85, 1.0) * st * tw * 0.5 * clamp(-sh * 3.0, 0.0, 1.0);
  }

  vec2 cuv = uv * vec2(3.0, 5.0) + vec2(t * 0.03, 0.0);
  float cl = smoothstep(0.4, 0.7, fbm(cuv, 5) * smoothstep(0.3, 0.7, uv.y));
  vec3 cc = mix(hor * 1.2, vec3(1.0), 0.5);
  if (sh < 0.1) cc *= 0.3;
  col = mix(col, cc, cl * 0.6);

  return col;
}

float rain(vec2 uv, float t) {
  float intensity = smoothstep(0.7, 1.0, u_mouse.y);
  if (intensity < 0.01) return 0.0;
  float r = 0.0;
  for (float i = 0.0; i < 3.0; i++) {
    vec2 ruv = uv * vec2(20.0 + i * 10.0, 2.0 + i);
    ruv.y += t * (8.0 + i * 3.0);
    vec2 id = floor(ruv);
    vec2 f = fract(ruv);
    float dr = step(0.97 - intensity * 0.05, hash21(id));
    float sh = smoothstep(0.0, 0.1, f.x) * smoothstep(1.0, 0.5, f.x);
    sh *= smoothstep(0.0, 0.2, f.y) * smoothstep(1.0, 0.3, f.y);
    r += dr * sh * (0.3 - i * 0.08);
  }
  return r * intensity;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  float t = u_time;
  float horizonY = 0.40 + sin(uv.x * 3.14159) * 0.02;
  vec3 col;

  if (uv.y > horizonY) {
    vec2 skyUV = vec2(uv.x, (uv.y - horizonY) / (1.0 - horizonY));
    col = sky(skyUV, t);
    col += vec3(0.6, 0.65, 0.7) * rain(uv, t);
  } else {
    float depth = 1.0 - uv.y / horizonY;
    depth = pow(depth, 0.7);
    float wx = (uv.x - 0.5) * (1.0 + depth * 3.0);
    float wy = depth * 8.0;

    float coastLine = 0.25 + fbm(vec2(wy * 0.5, t * 0.015), 4) * 0.35;
    coastLine += sin(wy * 0.8 + t * 0.04) * 0.06;
    float dist2shore = wx - coastLine;

    if (dist2shore > 0.03) {
      // LAND
      float lt = terrain(vec2(wx * 2.0, wy * 2.0));
      float beachF = smoothstep(0.3, 0.0, dist2shore - 0.03);

      vec3 sand = vec3(0.76, 0.70, 0.50) + noise(vec2(wx, wy) * 20.0) * 0.08;
      sand += vec3(0.05, 0.03, 0.0) * noise(vec2(wx, wy) * 50.0);

      vec3 grass = mix(vec3(0.12, 0.28, 0.08), vec3(0.18, 0.38, 0.10), lt);
      grass += vec3(0.0, 0.05, 0.0) * noise(vec2(wx, wy) * 15.0);

      vec3 rock = vec3(0.35, 0.32, 0.28) + noise(vec2(wx, wy) * 8.0) * 0.1;
      float rockF = smoothstep(0.55, 0.7, lt);

      col = mix(mix(grass, rock, rockF), sand, beachF);

      // Wet sand
      float wetF = smoothstep(0.12, 0.0, dist2shore - 0.03);
      wetF *= sin(wy * 2.0 + t * 0.5) * 0.5 + 0.5;
      col *= mix(1.0, 0.65, wetF);
      col = mix(col, col * vec3(0.8, 0.85, 1.0), wetF * 0.3);
      col *= mix(0.6, 1.0, smoothstep(0.0, 0.15, dist2shore - 0.03));

      // Small tidal pools
      float poolNoise = fbm(vec2(wx * 8.0, wy * 8.0), 4);
      float pool = smoothstep(0.58, 0.62, poolNoise) * beachF;
      vec3 poolCol = vec3(0.15, 0.4, 0.45) + noise(vec2(wx, wy) * 40.0 + t) * 0.05;
      col = mix(col, poolCol, pool * 0.7);

    } else {
      // WATER
      float wd = max(0.0, -dist2shore);
      vec3 shallow = vec3(0.12, 0.50, 0.50);
      vec3 deep = vec3(0.02, 0.07, 0.18);
      vec3 wc = mix(shallow, deep, smoothstep(0.0, 1.5, wd));

      float wh = waterWaves(vec2(wx * 3.0, wy * 2.0), t);

      float sunP = u_mouse.x * 6.28318;
      float sunH = sin(sunP);
      vec3 sunD = normalize(vec3(cos(sunP), sunH, -0.5));
      vec3 wn = normalize(vec3(
        waterWaves(vec2(wx * 3.0 + 0.01, wy * 2.0), t) - wh,
        0.2,
        waterWaves(vec2(wx * 3.0, wy * 2.0 + 0.01), t) - wh
      ));
      float spec = pow(max(0.0, dot(reflect(-sunD, wn), vec3(0, 1, 0))), 32.0);
      vec3 sCol = sunH > 0.0 ? mix(vec3(1.0, 0.5, 0.2), vec3(1.0, 0.95, 0.85), sunH) : vec3(0.0);
      wc += sCol * spec * 0.5;

      if (sunH < 0.0) {
        float mr = exp(-abs(wx - (0.5 - cos(sunP) * 0.5)) * 5.0);
        mr *= (0.5 + wh * 0.3);
        wc += vec3(0.2, 0.22, 0.3) * mr * clamp(-sunH, 0.0, 1.0) * 0.4;
      }

      wc = mix(wc, vec3(0.85, 0.9, 0.95), foam(vec2(wx, wy), t, max(0.0, dist2shore + 0.05)));
      wc += vec3(0.02) * wh;
      col = wc;
    }

    // Atmospheric perspective
    float farness = 1.0 - depth;
    vec3 fog = sky(vec2(uv.x, 0.01), t) * 0.8;
    col = mix(col, fog, farness * farness * 0.7);

    // Rain ripples on water
    float rainAmt = smoothstep(0.7, 1.0, u_mouse.y);
    if (rainAmt > 0.01 && dist2shore < 0.05) {
      float rip = 0.0;
      for (float i = 0.0; i < 5.0; i++) {
        vec2 rp = vec2(wx, wy) * (10.0 + i * 5.0);
        vec2 rid = floor(rp);
        vec2 rf = fract(rp) - 0.5;
        float rt = fract(t * 0.5 + hash21(rid + i * 100.0));
        float ring = smoothstep(0.05, 0.0, abs(length(rf) - rt * 0.5)) * (1.0 - rt);
        rip += ring * step(0.85, hash21(rid + i * 37.0));
      }
      col += vec3(0.15) * rip * rainAmt;
    }
    col += vec3(0.6, 0.65, 0.7) * rain(uv, t) * 0.5;
  }

  // Horizon glow
  col += sky(vec2(uv.x, 0.01), t) * exp(-abs(uv.y - horizonY) * 30.0) * 0.15;

  // Seabirds — small V shapes in the sky
  if (uv.y > horizonY + 0.05) {
    for (float i = 0.0; i < 5.0; i++) {
      float bx = fract(hash21(vec2(i, 7.0)) + t * (0.01 + hash21(vec2(i, 3.0)) * 0.01));
      float by = horizonY + 0.1 + hash21(vec2(i, 13.0)) * 0.3;
      by += sin(t * 1.5 + i * 2.0) * 0.008;
      vec2 bp = vec2(bx, by);
      vec2 d = (uv - bp) * vec2(u_res.x / u_res.y, 1.0);
      float wing = smoothstep(0.012, 0.0, abs(d.y - abs(d.x) * 1.5)) * smoothstep(0.03, 0.0, abs(d.x));
      col = mix(col, vec3(0.05), wing * 0.7);
    }
  }

  // Vignette
  col *= smoothstep(0.0, 0.5, 1.0 - dot((uv - 0.5) * 1.2, (uv - 0.5) * 1.2));

  // Tone mapping
  col = col / (1.0 + col);
  col = pow(col, vec3(0.9));

  fragColor = vec4(col, 1.0);
}
`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vShader = createShader(gl.VERTEX_SHADER, vs);
const fShader = createShader(gl.FRAGMENT_SHADER, fs);
const prog = gl.createProgram();
gl.attachShader(prog, vShader);
gl.attachShader(prog, fShader);
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');

function render() {
  time += 0.016;
  gl.uniform2f(uRes, W, H);
  gl.uniform1f(uTime, time);
  gl.uniform2f(uMouse, mouse.x, mouse.y);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
