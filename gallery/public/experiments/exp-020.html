<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM Decay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: #06060c;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
  }

  .cell {
    position: absolute;
    border: none;
    outline: none;
    font-family: 'Courier New', monospace;
    pointer-events: none;
    -webkit-appearance: none;
    appearance: none;
  }

  #glow {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
    mix-blend-mode: screen;
    background: radial-gradient(circle 250px at var(--mx, 640px) var(--my, 360px),
      rgba(255, 120, 255, 0.2), transparent);
  }

  /* Afterimage trails */
  #trails {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: -1;
    background: rgba(6, 6, 12, 0.03);
  }
</style>
</head>
<body>
<div id="glow"></div>
<script>
(function() {
  const W = 1280, H = 720;
  const COLS = 40, ROWS = 22;
  const CELL_W = W / COLS, CELL_H = H / ROWS;
  const TOTAL = COLS * ROWS; // 880 elements

  let mx = W / 2, my = H / 2;
  let time = 0;
  let phase = 0;

  const elTypes = ['button', 'input', 'div', 'span', 'select', 'textarea', 'label', 'progress', 'meter'];
  const inputTypes = ['text', 'range', 'checkbox', 'radio', 'color', 'number'];
  const glyphs = [
    '\u2588', '\u2593', '\u2592', '\u2591',  // block chars
    '\u25CF', '\u25CB', '\u25A0', '\u25A1',  // shapes
    '\u2665', '\u2660', '\u2663', '\u2666',  // suits
    '\u2605', '\u2606', '\u2737', '\u273B',  // stars/flowers
    '\u25B2', '\u25BC', '\u25C0', '\u25B6',  // triangles
    '\u2302', '\u2318', '\u2620', '\u263A',  // symbols
  ];

  const cells = [];
  const frag = document.createDocumentFragment();

  for (let i = 0; i < TOTAL; i++) {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const typeIdx = (col * 7 + row * 13 + i * 3) % elTypes.length;
    const tag = elTypes[typeIdx];

    const el = document.createElement(tag);
    el.className = 'cell';

    if (tag === 'input') {
      el.type = inputTypes[(col + row) % inputTypes.length];
      if (el.type === 'range') { el.value = Math.random() * 100; }
      if (el.type === 'color') { el.value = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'); }
    }
    if (tag === 'button' || tag === 'span' || tag === 'label' || tag === 'div') {
      el.textContent = glyphs[i % glyphs.length];
    }
    if (tag === 'progress') { el.max = 100; el.value = (i * 7) % 100; }
    if (tag === 'meter') { el.min = 0; el.max = 100; el.value = (i * 11) % 100; }
    if (tag === 'select') {
      const opt = document.createElement('option');
      opt.textContent = glyphs[(i + 4) % glyphs.length];
      el.appendChild(opt);
    }
    if (tag === 'textarea') {
      el.value = glyphs[i % glyphs.length].repeat(2);
      el.readOnly = true;
    }

    const homeX = col * CELL_W;
    const homeY = row * CELL_H;

    cells.push({
      el, homeX, homeY,
      x: homeX, y: homeY,
      vx: 0, vy: 0,
      angle: 0, angVel: 0,
      scale: 1,
      hue: 0, sat: 90, light: 55,
      opacity: 0,
      col, row, idx: i, tag,
      w: CELL_W - 1, h: CELL_H - 1,
      // Unique per-element personality
      freq: 0.5 + Math.random() * 2,
      phaseOff: Math.random() * Math.PI * 2,
      orbit: 80 + Math.random() * 200,
    });

    frag.appendChild(el);
  }
  document.body.appendChild(frag);

  document.addEventListener('mousemove', (e) => {
    mx = e.clientX; my = e.clientY;
    document.body.style.setProperty('--mx', mx + 'px');
    document.body.style.setProperty('--my', my + 'px');
  });

  // Cycle: breathe(3s) -> ripple(3s) -> decay(4s) -> swarm(5s) -> reform(3s)
  const PHASES = [
    { name: 'breathe', dur: 3 },
    { name: 'ripple', dur: 3 },
    { name: 'decay', dur: 4 },
    { name: 'swarm', dur: 5 },
    { name: 'reform', dur: 3 },
  ];
  let phaseTime = 0;

  function ease(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }

  function noise(x, y, t) {
    return Math.sin(x * 0.031 + t) * Math.cos(y * 0.037 - t * 0.7) +
           Math.sin((x + y) * 0.019 + t * 1.3) * 0.5;
  }

  // Start fully visible so screenshot catches the action
  let started = false;

  function animate() {
    const dt = 1 / 60;
    time += dt;
    phaseTime += dt;

    const ph = PHASES[phase];
    const p = Math.min(phaseTime / ph.dur, 1);
    const ep = ease(p);

    if (p >= 1) {
      phase = (phase + 1) % PHASES.length;
      phaseTime = 0;
    }

    // Quick fade-in on first frame
    if (!started && time > 0.05) {
      started = true;
      for (let i = 0; i < TOTAL; i++) cells[i].opacity = 1;
    }

    for (let i = 0; i < TOTAL; i++) {
      const c = cells[i];
      const dx = mx - c.x;
      const dy = my - c.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const mf = Math.max(0, 1 - dist / 220); // mouse force
      const n1 = noise(c.x, c.y, time);
      const n2 = noise(c.x + 200, c.y + 200, time * 0.6);

      // Base hue: rainbow diagonal + time rotation
      const baseHue = (c.col / COLS * 300 + c.row / ROWS * 60 + time * 25) % 360;

      if (ph.name === 'breathe') {
        c.opacity = 1;
        const wave = Math.sin(time * c.freq + c.phaseOff + c.col * 0.2 + c.row * 0.2);
        c.x = c.homeX + wave * 4;
        c.y = c.homeY + Math.cos(time * c.freq * 0.7 + c.phaseOff) * 4;
        c.angle = wave * 12 + mf * n1 * 30;
        c.scale = 0.85 + wave * 0.2 + mf * 0.4;
        c.w = CELL_W - 1;
        c.h = CELL_H - 1;
        c.hue = baseHue + mf * 80;
        c.sat = 85 + mf * 15;
        c.light = 50 + wave * 10 + mf * 20;
      }
      else if (ph.name === 'ripple') {
        c.opacity = 1;
        // Concentric ripples from mouse
        const ripple = Math.sin(dist * 0.04 - time * 4) * (1 - dist / 800);
        const push = ripple * 15;
        c.x = c.homeX + (dx / (dist + 1)) * push;
        c.y = c.homeY + (dy / (dist + 1)) * push;
        c.angle = ripple * 25;
        c.scale = 1 + ripple * 0.3;
        c.w = (CELL_W - 1) * (1 + ripple * 0.4);
        c.h = (CELL_H - 1) * (1 + ripple * 0.4);
        c.hue = baseHue + ripple * 60;
        c.sat = 90;
        c.light = 50 + ripple * 20 + mf * 15;
      }
      else if (ph.name === 'decay') {
        c.opacity = 1;
        const freedom = ep;
        const hold = 1 - freedom;

        // Turbulence
        c.vx += n1 * freedom * 3 + (Math.random() - 0.5) * freedom * 2;
        c.vy += n2 * freedom * 3 + freedom * 0.5 + (Math.random() - 0.5) * freedom * 2;
        // Mouse repels during decay
        if (mf > 0) {
          c.vx -= dx * 0.008 * mf;
          c.vy -= dy * 0.008 * mf;
        }
        c.vx *= 0.96;
        c.vy *= 0.96;

        c.x = c.homeX * hold + (c.x + c.vx) * freedom;
        c.y = c.homeY * hold + (c.y + c.vy) * freedom;

        c.angVel += (n1 * 5 - c.angVel * 0.08) * freedom;
        c.angle += c.angVel;

        // Elements grow/shrink chaotically
        c.w = (CELL_W - 1) * (0.5 + freedom * Math.abs(n1) * 1.5);
        c.h = (CELL_H - 1) * (0.5 + freedom * Math.abs(n2) * 1.5);
        c.scale = 0.8 + freedom * n2 * 0.6;

        c.hue = (baseHue + freedom * 120) % 360;
        c.sat = 85 + freedom * 15;
        c.light = 50 + freedom * 15;
      }
      else if (ph.name === 'swarm') {
        c.opacity = 1;

        // Spiral orbit around mouse
        const angle = Math.atan2(dy, dx);
        const orbitR = c.orbit + Math.sin(time * c.freq + c.phaseOff) * 40;
        const spiralAngle = angle + Math.PI * 0.6;
        const targetX = mx - Math.cos(angle) * orbitR;
        const targetY = my - Math.sin(angle) * orbitR;

        c.vx += (targetX - c.x) * 0.025 + Math.cos(spiralAngle) * 2;
        c.vy += (targetY - c.y) * 0.025 + Math.sin(spiralAngle) * 2;
        c.vx *= 0.93;
        c.vy *= 0.93;
        c.x += c.vx;
        c.y += c.vy;

        c.angle = Math.atan2(c.vy, c.vx) * 180 / Math.PI;
        c.scale = 0.4 + mf * 1.8 + Math.sin(time * 3 + c.idx * 0.05) * 0.15;

        c.w = (CELL_W - 1) * (0.4 + Math.abs(Math.sin(time * c.freq + c.phaseOff)) * 0.8);
        c.h = (CELL_H - 1) * (0.4 + Math.abs(Math.cos(time * c.freq + c.phaseOff)) * 0.8);

        c.hue = (angle * 180 / Math.PI + 180 + time * 50 + c.idx * 2) % 360;
        c.sat = 95;
        c.light = 45 + mf * 25;
      }
      else if (ph.name === 'reform') {
        c.vx *= 0.88;
        c.vy *= 0.88;
        const pull = 0.06 * ep;
        c.x += (c.homeX - c.x) * pull;
        c.y += (c.homeY - c.y) * pull;
        c.angle *= (1 - pull);
        c.scale += (1 - c.scale) * pull;
        c.w += ((CELL_W - 1) - c.w) * pull;
        c.h += ((CELL_H - 1) - c.h) * pull;
        c.hue = baseHue;
        c.sat = 90;
        c.light = 50 + mf * 20;
        c.opacity = 1;
      }

      // Wrap around edges
      if (c.x < -80) c.x += W + 160;
      if (c.x > W + 80) c.x -= W + 160;
      if (c.y < -80) c.y += H + 160;
      if (c.y > H + 80) c.y -= H + 160;

      // Render — direct style assignment for performance
      const bRadius = (c.tag === 'button' || c.tag === 'span') ? (3 + mf * 12) :
                       (c.tag === 'input' || c.tag === 'select') ? (2 + mf * 6) : (1 + mf * 4);
      const glow = 3 + mf * 15;
      const borderAlpha = 0.25 + mf * 0.55;

      c.el.style.cssText =
        `position:absolute;` +
        `left:${c.x|0}px;top:${c.y|0}px;` +
        `width:${Math.max(3, c.w)|0}px;height:${Math.max(3, c.h)|0}px;` +
        `transform:rotate(${c.angle.toFixed(1)}deg) scale(${c.scale.toFixed(3)});` +
        `background:hsl(${c.hue|0},${c.sat|0}%,${c.light|0}%);` +
        `color:hsl(${((c.hue + 180) % 360)|0},90%,85%);` +
        `opacity:${c.opacity};` +
        `border:1px solid hsla(${((c.hue + 50) % 360)|0},100%,75%,${borderAlpha.toFixed(2)});` +
        `border-radius:${bRadius|0}px;` +
        `box-shadow:0 0 ${glow|0}px hsla(${c.hue|0},100%,65%,${(0.15 + mf * 0.4).toFixed(2)});` +
        `font-size:${(9 + mf * 5)|0}px;` +
        `text-align:center;line-height:${Math.max(3, c.h)|0}px;` +
        `overflow:hidden;pointer-events:none;-webkit-appearance:none;appearance:none;`;
    }

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
