<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exp-008 — Mitosis</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0a0014;
  }

  .world {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Base hue rotation on the whole world */
  .world {
    animation: worldHue 30s linear infinite;
  }
  @keyframes worldHue {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }

  /* Pulsing background gradient */
  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%,
      #1a0030 0%,
      #0a0014 60%,
      #000005 100%
    );
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0%   { background: radial-gradient(ellipse at 50% 50%, #1a0030 0%, #0a0014 60%, #000005 100%); }
    100% { background: radial-gradient(ellipse at 50% 50%, #2a0050 0%, #150028 60%, #050010 100%); }
  }

  /* The cell — a central organism */
  .cell {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    animation: cellBreathe 6s ease-in-out infinite alternate;
  }
  @keyframes cellBreathe {
    0%   { transform: scale(1) rotate(0deg); }
    50%  { transform: scale(1.15) rotate(5deg); }
    100% { transform: scale(1.05) rotate(-3deg); }
  }

  /* Membrane — outer glow ring */
  .membrane {
    position: absolute;
    width: 340px;
    height: 340px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 3px solid rgba(255, 100, 255, 0.4);
    box-shadow:
      0 0 40px rgba(255, 50, 200, 0.3),
      0 0 80px rgba(200, 50, 255, 0.15),
      inset 0 0 40px rgba(255, 100, 255, 0.1);
    animation: membranePulse 4s ease-in-out infinite alternate, membraneWobble 7s ease-in-out infinite;
  }
  @keyframes membranePulse {
    0%   { border-color: rgba(255, 100, 255, 0.4); box-shadow: 0 0 40px rgba(255, 50, 200, 0.3), 0 0 80px rgba(200, 50, 255, 0.15), inset 0 0 40px rgba(255, 100, 255, 0.1); }
    100% { border-color: rgba(100, 200, 255, 0.6); box-shadow: 0 0 60px rgba(100, 200, 255, 0.4), 0 0 120px rgba(50, 100, 255, 0.2), inset 0 0 60px rgba(100, 200, 255, 0.15); }
  }
  @keyframes membraneWobble {
    0%   { border-radius: 50%; }
    25%  { border-radius: 48% 52% 50% 50%; }
    50%  { border-radius: 50% 48% 52% 50%; }
    75%  { border-radius: 52% 50% 48% 52%; }
    100% { border-radius: 50%; }
  }

  /* Nucleus layers — stacked radial gradients with blend modes */
  .nucleus {
    position: absolute;
    width: 300px;
    height: 300px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%,
      #ff3090 0%,
      #cc20dd 25%,
      #6610cc 50%,
      #220066 75%,
      transparent 100%
    );
    animation: nucleusSpin 20s linear infinite;
  }
  @keyframes nucleusSpin {
    0%   { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .nucleus-inner {
    position: absolute;
    width: 300px;
    height: 300px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 60% 60%,
      #00ffcc 0%,
      #0088ff 20%,
      #4400cc 45%,
      transparent 70%
    );
    mix-blend-mode: screen;
    animation: nucleusInnerSpin 15s linear infinite reverse;
  }
  @keyframes nucleusInnerSpin {
    0%   { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .nucleus-hot {
    position: absolute;
    width: 160px;
    height: 160px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle,
      #ffffff 0%,
      #ffcc00 15%,
      #ff4400 35%,
      transparent 65%
    );
    mix-blend-mode: screen;
    animation: hotPulse 3s ease-in-out infinite alternate;
  }
  @keyframes hotPulse {
    0%   { transform: translate(-50%, -50%) scale(0.8); opacity: 0.7; }
    100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  }

  /* Organelles — small orbiting bodies */
  .organelle {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: screen;
  }

  .organelle-1 {
    width: 40px; height: 40px;
    background: radial-gradient(circle, #ff6600 0%, #ff0066 50%, transparent 100%);
    top: 50%; left: 50%;
    animation: orbit1 8s linear infinite;
  }
  @keyframes orbit1 {
    0%   { transform: translate(-50%, -50%) rotate(0deg) translateX(130px) rotate(0deg) scale(1); }
    50%  { transform: translate(-50%, -50%) rotate(180deg) translateX(130px) rotate(-180deg) scale(1.3); }
    100% { transform: translate(-50%, -50%) rotate(360deg) translateX(130px) rotate(-360deg) scale(1); }
  }

  .organelle-2 {
    width: 30px; height: 30px;
    background: radial-gradient(circle, #00ff88 0%, #0088ff 50%, transparent 100%);
    top: 50%; left: 50%;
    animation: orbit2 11s linear infinite;
  }
  @keyframes orbit2 {
    0%   { transform: translate(-50%, -50%) rotate(120deg) translateX(150px) rotate(-120deg); }
    100% { transform: translate(-50%, -50%) rotate(480deg) translateX(150px) rotate(-480deg); }
  }

  .organelle-3 {
    width: 25px; height: 25px;
    background: radial-gradient(circle, #ffff00 0%, #ff00ff 50%, transparent 100%);
    top: 50%; left: 50%;
    animation: orbit3 6s linear infinite reverse;
  }
  @keyframes orbit3 {
    0%   { transform: translate(-50%, -50%) rotate(240deg) translateX(120px) rotate(-240deg); }
    100% { transform: translate(-50%, -50%) rotate(600deg) translateX(120px) rotate(-600deg); }
  }

  .organelle-4 {
    width: 20px; height: 20px;
    background: radial-gradient(circle, #00ccff 0%, #cc00ff 50%, transparent 100%);
    top: 50%; left: 50%;
    animation: orbit4 14s linear infinite;
  }
  @keyframes orbit4 {
    0%   { transform: translate(-50%, -50%) rotate(60deg) translateX(160px) rotate(-60deg); }
    100% { transform: translate(-50%, -50%) rotate(420deg) translateX(160px) rotate(-420deg); }
  }

  /* Mitosis effect — the cell is splitting */
  .daughter {
    position: absolute;
    width: 120px;
    height: 120px;
    top: 50%; left: 50%;
    border-radius: 50%;
    opacity: 0;
    animation: mitosis 12s ease-in-out infinite;
  }

  .daughter-1 {
    background: radial-gradient(circle, #ff44aa 0%, #aa00ff 40%, transparent 70%);
    box-shadow: 0 0 30px rgba(255, 68, 170, 0.4);
  }
  @keyframes mitosis {
    0%   { transform: translate(-50%, -50%) translateX(0); opacity: 0; }
    30%  { transform: translate(-50%, -50%) translateX(0); opacity: 0; }
    50%  { transform: translate(-50%, -50%) translateX(-180px); opacity: 0.8; }
    65%  { transform: translate(-50%, -50%) translateX(-200px) scale(0.9); opacity: 0.6; }
    80%  { transform: translate(-50%, -50%) translateX(-100px) scale(0.7); opacity: 0.3; }
    90%  { transform: translate(-50%, -50%) translateX(0); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateX(0); opacity: 0; }
  }

  .daughter-2 {
    background: radial-gradient(circle, #44aaff 0%, #0044ff 40%, transparent 70%);
    box-shadow: 0 0 30px rgba(68, 170, 255, 0.4);
    animation-name: mitosis2;
  }
  @keyframes mitosis2 {
    0%   { transform: translate(-50%, -50%) translateX(0); opacity: 0; }
    30%  { transform: translate(-50%, -50%) translateX(0); opacity: 0; }
    50%  { transform: translate(-50%, -50%) translateX(180px); opacity: 0.8; }
    65%  { transform: translate(-50%, -50%) translateX(200px) scale(0.9); opacity: 0.6; }
    80%  { transform: translate(-50%, -50%) translateX(100px) scale(0.7); opacity: 0.3; }
    90%  { transform: translate(-50%, -50%) translateX(0); opacity: 0; }
    100% { transform: translate(-50%, -50%) translateX(0); opacity: 0; }
  }

  /* Chromatin bridge during mitosis */
  .bridge {
    position: absolute;
    width: 200px;
    height: 6px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255, 100, 255, 0.5) 20%,
      rgba(255, 200, 100, 0.8) 50%,
      rgba(100, 150, 255, 0.5) 80%,
      transparent 100%
    );
    border-radius: 3px;
    opacity: 0;
    animation: bridgeStretch 12s ease-in-out infinite;
    filter: blur(2px);
  }
  @keyframes bridgeStretch {
    0%   { width: 0; opacity: 0; }
    30%  { width: 0; opacity: 0; }
    45%  { width: 100px; opacity: 0.8; }
    55%  { width: 300px; opacity: 0.6; }
    70%  { width: 350px; opacity: 0.2; }
    80%  { width: 0; opacity: 0; }
    100% { width: 0; opacity: 0; }
  }

  /* Floating particles — ambient spores */
  .spore {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: screen;
  }

  .spore-1 { width: 6px; height: 6px; background: #ff6699; top: 20%; left: 15%; animation: float1 9s ease-in-out infinite; }
  .spore-2 { width: 4px; height: 4px; background: #66ffcc; top: 75%; left: 80%; animation: float2 11s ease-in-out infinite; }
  .spore-3 { width: 8px; height: 8px; background: #ffcc33; top: 30%; left: 85%; animation: float3 7s ease-in-out infinite; }
  .spore-4 { width: 5px; height: 5px; background: #9966ff; top: 80%; left: 25%; animation: float4 13s ease-in-out infinite; }
  .spore-5 { width: 7px; height: 7px; background: #ff3366; top: 10%; left: 60%; animation: float5 10s ease-in-out infinite; }
  .spore-6 { width: 3px; height: 3px; background: #33ccff; top: 60%; left: 10%; animation: float6 8s ease-in-out infinite; }
  .spore-7 { width: 5px; height: 5px; background: #ff9900; top: 45%; left: 90%; animation: float7 12s ease-in-out infinite; }
  .spore-8 { width: 6px; height: 6px; background: #cc33ff; top: 90%; left: 50%; animation: float8 9s ease-in-out infinite; }

  @keyframes float1 { 0%,100% { transform: translate(0,0); opacity: 0.4; } 50% { transform: translate(30px, -40px); opacity: 1; } }
  @keyframes float2 { 0%,100% { transform: translate(0,0); opacity: 0.3; } 50% { transform: translate(-40px, 20px); opacity: 0.9; } }
  @keyframes float3 { 0%,100% { transform: translate(0,0); opacity: 0.5; } 50% { transform: translate(-20px, -30px); opacity: 1; } }
  @keyframes float4 { 0%,100% { transform: translate(0,0); opacity: 0.3; } 50% { transform: translate(35px, -25px); opacity: 0.8; } }
  @keyframes float5 { 0%,100% { transform: translate(0,0); opacity: 0.4; } 50% { transform: translate(-25px, 35px); opacity: 1; } }
  @keyframes float6 { 0%,100% { transform: translate(0,0); opacity: 0.5; } 50% { transform: translate(20px, -15px); opacity: 0.9; } }
  @keyframes float7 { 0%,100% { transform: translate(0,0); opacity: 0.3; } 50% { transform: translate(-30px, 20px); opacity: 0.7; } }
  @keyframes float8 { 0%,100% { transform: translate(0,0); opacity: 0.4; } 50% { transform: translate(25px, -30px); opacity: 1; } }

  /* Cilia — hair-like projections around the membrane */
  .cilium {
    position: absolute;
    top: 50%; left: 50%;
    width: 2px;
    height: 30px;
    background: linear-gradient(to top, rgba(255,100,255,0.5), transparent);
    transform-origin: bottom center;
    border-radius: 1px;
  }

  .cilium-1  { animation: wave 2s ease-in-out 0s infinite alternate; transform: translate(-50%, -50%) rotate(0deg)   translateY(-170px); }
  .cilium-2  { animation: wave 2s ease-in-out 0.15s infinite alternate; transform: translate(-50%, -50%) rotate(30deg)  translateY(-170px); }
  .cilium-3  { animation: wave 2s ease-in-out 0.3s infinite alternate; transform: translate(-50%, -50%) rotate(60deg)  translateY(-170px); }
  .cilium-4  { animation: wave 2s ease-in-out 0.45s infinite alternate; transform: translate(-50%, -50%) rotate(90deg)  translateY(-170px); }
  .cilium-5  { animation: wave 2s ease-in-out 0.6s infinite alternate; transform: translate(-50%, -50%) rotate(120deg) translateY(-170px); }
  .cilium-6  { animation: wave 2s ease-in-out 0.75s infinite alternate; transform: translate(-50%, -50%) rotate(150deg) translateY(-170px); }
  .cilium-7  { animation: wave 2s ease-in-out 0.9s infinite alternate; transform: translate(-50%, -50%) rotate(180deg) translateY(-170px); }
  .cilium-8  { animation: wave 2s ease-in-out 1.05s infinite alternate; transform: translate(-50%, -50%) rotate(210deg) translateY(-170px); }
  .cilium-9  { animation: wave 2s ease-in-out 1.2s infinite alternate; transform: translate(-50%, -50%) rotate(240deg) translateY(-170px); }
  .cilium-10 { animation: wave 2s ease-in-out 1.35s infinite alternate; transform: translate(-50%, -50%) rotate(270deg) translateY(-170px); }
  .cilium-11 { animation: wave 2s ease-in-out 1.5s infinite alternate; transform: translate(-50%, -50%) rotate(300deg) translateY(-170px); }
  .cilium-12 { animation: wave 2s ease-in-out 1.65s infinite alternate; transform: translate(-50%, -50%) rotate(330deg) translateY(-170px); }

  @keyframes wave {
    0%   { height: 30px; opacity: 0.5; }
    100% { height: 45px; opacity: 0.9; }
  }
</style>
</head>
<body>
  <div class="world">
    <div class="bg"></div>

    <!-- Ambient spores -->
    <div class="spore spore-1"></div>
    <div class="spore spore-2"></div>
    <div class="spore spore-3"></div>
    <div class="spore spore-4"></div>
    <div class="spore spore-5"></div>
    <div class="spore spore-6"></div>
    <div class="spore spore-7"></div>
    <div class="spore spore-8"></div>

    <!-- The cell -->
    <div class="cell">
      <!-- Cilia -->
      <div class="cilium cilium-1"></div>
      <div class="cilium cilium-2"></div>
      <div class="cilium cilium-3"></div>
      <div class="cilium cilium-4"></div>
      <div class="cilium cilium-5"></div>
      <div class="cilium cilium-6"></div>
      <div class="cilium cilium-7"></div>
      <div class="cilium cilium-8"></div>
      <div class="cilium cilium-9"></div>
      <div class="cilium cilium-10"></div>
      <div class="cilium cilium-11"></div>
      <div class="cilium cilium-12"></div>

      <!-- Membrane -->
      <div class="membrane"></div>

      <!-- Nucleus -->
      <div class="nucleus"></div>
      <div class="nucleus-inner"></div>
      <div class="nucleus-hot"></div>

      <!-- Organelles -->
      <div class="organelle organelle-1"></div>
      <div class="organelle organelle-2"></div>
      <div class="organelle organelle-3"></div>
      <div class="organelle organelle-4"></div>

      <!-- Mitosis -->
      <div class="bridge"></div>
      <div class="daughter daughter-1"></div>
      <div class="daughter daughter-2"></div>
    </div>
  </div>
</body>
</html>
