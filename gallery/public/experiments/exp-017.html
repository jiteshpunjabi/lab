<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exp-017 — Dissolution Mirror</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
  video { display: none; }
  #prompt {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font: 14px/1 monospace;
    letter-spacing: 0.1em;
    pointer-events: none;
    transition: opacity 2s;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<video id="v" playsinline autoplay muted></video>
<div id="prompt">click to allow camera</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const video = document.getElementById('v');
const promptEl = document.getElementById('prompt');

let W, H;
let hasCamera = false;
let cameraReady = false;
let time = 0;
let sortBuffer = null;
let prevFrame = null;
let noiseField = null;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  sortBuffer = ctx.createImageData(W, H);
  prevFrame = null;
}
window.addEventListener('resize', resize);
resize();

// Simplex-style noise (simple hash-based)
function noise2D(x, y) {
  const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return n - Math.floor(n);
}

function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx);
  const sy = fy * fy * (3 - 2 * fy);
  const a = noise2D(ix, iy);
  const b = noise2D(ix + 1, iy);
  const c = noise2D(ix, iy + 1);
  const d = noise2D(ix + 1, iy + 1);
  return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
}

function fbm(x, y, octaves) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * smoothNoise(x * freq, y * freq);
    amp *= 0.5;
    freq *= 2.1;
  }
  return val;
}

// Generate fallback frame — flowing organic curtain of light
function generateFallbackFrame() {
  const img = ctx.createImageData(W, H);
  const d = img.data;
  const t = time * 0.3;

  for (let x = 0; x < W; x++) {
    const nx = x / W * 4;
    // Each column has its own flowing character
    const columnPhase = fbm(nx, t * 0.5, 4);
    const columnHue = (nx * 0.15 + t * 0.08 + columnPhase * 0.3) % 1;
    const columnDrift = Math.sin(t * 0.7 + nx * 3) * 0.15;

    for (let y = 0; y < H; y++) {
      const ny = y / H;
      const idx = (y * W + x) * 4;

      // Distance from center — creates radial structure like a dissolving portrait
      const cx = (x / W - 0.5) * 2;
      const cy = (y / H - 0.5) * 2;
      const dist = Math.sqrt(cx * cx + cy * cy);
      const angle = Math.atan2(cy, cx);

      // Flowing noise pattern with radial influence
      const n1 = fbm(nx * 1.5 + columnDrift, ny * 3 + t * 0.8, 5);
      const n2 = fbm(nx * 2.3 - t * 0.2 + Math.sin(angle) * 0.3, ny * 2 + t * 0.5 + n1 * 0.5, 4);
      const n3 = fbm(nx * 0.8 + n2 * 0.7, ny * 4 - t * 1.2, 3);

      // Create bright flowing streams with radial falloff
      const radialBoost = Math.max(0, 1 - dist * 0.6);
      const stream = Math.pow(Math.abs(Math.sin(n1 * 6 + n2 * 4 + ny * 8 + t + angle * 2)), 3);
      const brightness = (stream * 0.6 + n3 * 0.25 + radialBoost * 0.35);

      // HSL to RGB with shifting hues — warmer near center
      const hue = (columnHue + n2 * 0.2 + n3 * 0.1 + radialBoost * 0.05) % 1;
      const sat = 0.6 + n1 * 0.3 + radialBoost * 0.1;
      const lum = Math.min(1, brightness * 0.95);

      // HSL conversion
      const h6 = hue * 6;
      const c = (1 - Math.abs(2 * lum - 1)) * sat;
      const xc = c * (1 - Math.abs(h6 % 2 - 1));
      const m = lum - c / 2;
      let r, g, b;
      if (h6 < 1) { r = c; g = xc; b = 0; }
      else if (h6 < 2) { r = xc; g = c; b = 0; }
      else if (h6 < 3) { r = 0; g = c; b = xc; }
      else if (h6 < 4) { r = 0; g = xc; b = c; }
      else if (h6 < 5) { r = xc; g = 0; b = c; }
      else { r = c; g = 0; b = xc; }

      d[idx] = (r + m) * 255;
      d[idx + 1] = (g + m) * 255;
      d[idx + 2] = (b + m) * 255;
      d[idx + 3] = 255;
    }
  }
  return img;
}

// Pixel sort a column segment by luminance
function pixelSortColumn(srcData, dstData, x, w, h, threshold, direction) {
  for (let y = 0; y < h; y++) {
    const idx = (y * w + x) * 4;
    dstData[idx] = srcData[idx];
    dstData[idx + 1] = srcData[idx + 1];
    dstData[idx + 2] = srcData[idx + 2];
    dstData[idx + 3] = srcData[idx + 3];
  }

  // Find runs of pixels above threshold and sort them
  let runStart = -1;
  for (let y = 0; y <= h; y++) {
    const idx = (y * w + x) * 4;
    const lum = y < h ? (srcData[idx] * 0.299 + srcData[idx + 1] * 0.587 + srcData[idx + 2] * 0.114) / 255 : 0;

    if (lum > threshold && y < h) {
      if (runStart === -1) runStart = y;
    } else {
      if (runStart !== -1) {
        // Sort this run
        const run = [];
        for (let ry = runStart; ry < y; ry++) {
          const ri = (ry * w + x) * 4;
          run.push({
            r: srcData[ri], g: srcData[ri + 1], b: srcData[ri + 2], a: srcData[ri + 3],
            lum: srcData[ri] * 0.299 + srcData[ri + 1] * 0.587 + srcData[ri + 2] * 0.114
          });
        }
        run.sort((a, b) => direction > 0 ? a.lum - b.lum : b.lum - a.lum);
        for (let ri = 0; ri < run.length; ri++) {
          const di = ((runStart + ri) * w + x) * 4;
          dstData[di] = run[ri].r;
          dstData[di + 1] = run[ri].g;
          dstData[di + 2] = run[ri].b;
          dstData[di + 3] = run[ri].a;
        }
        runStart = -1;
      }
    }
  }
}

// Camera setup
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
    });
    video.srcObject = stream;
    await video.play();
    hasCamera = true;
    cameraReady = true;
    promptEl.style.opacity = '0';
  } catch (e) {
    hasCamera = false;
    promptEl.textContent = 'no camera — generating patterns';
    setTimeout(() => { promptEl.style.opacity = '0'; }, 3000);
  }
}

// Get current frame from camera or generate fallback
function getCurrentFrame() {
  if (hasCamera && cameraReady && video.readyState >= 2) {
    // Draw video to canvas scaled to fill
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const scale = Math.max(W / vw, H / vh);
    const sw = vw * scale;
    const sh = vh * scale;
    const sx = (W - sw) / 2;
    const sy = (H - sh) / 2;

    ctx.save();
    // Mirror the camera
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, sw, sh);
    ctx.restore();

    return ctx.getImageData(0, 0, W, H);
  }
  return generateFallbackFrame();
}

// Main render loop
let frameCount = 0;

function render() {
  time += 0.016;
  frameCount++;

  const frame = getCurrentFrame();
  const src = frame.data;
  const dst = sortBuffer.data;

  // Animated threshold — oscillates to create waves of dissolution
  const baseThreshold = 0.15 + 0.25 * Math.sin(time * 0.4);

  // Process every Nth column for performance (skip every other on wide screens)
  const step = W > 1000 ? 1 : 1;

  for (let x = 0; x < W; x += step) {
    // Per-column threshold variation creates organic wave
    const colNoise = smoothNoise(x * 0.01, time * 0.3);
    const threshold = baseThreshold + colNoise * 0.3;

    // Alternating sort direction per column group creates visual texture
    const direction = Math.sin(x * 0.02 + time * 0.5) > 0 ? 1 : -1;

    pixelSortColumn(src, dst, x, W, H, threshold, direction);
  }

  // Apply color enhancement
  for (let i = 0; i < dst.length; i += 4) {
    // Boost saturation slightly
    const r = dst[i], g = dst[i + 1], b = dst[i + 2];
    const avg = (r + g + b) / 3;
    const boost = 1.3;
    dst[i] = Math.min(255, avg + (r - avg) * boost);
    dst[i + 1] = Math.min(255, avg + (g - avg) * boost);
    dst[i + 2] = Math.min(255, avg + (b - avg) * boost);
  }

  // Draw with slight trail for motion blur
  ctx.globalAlpha = 0.05;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.globalAlpha = 0.92;
  ctx.putImageData(sortBuffer, 0, 0);

  // Subtle vignette overlay
  ctx.globalAlpha = 1;
  const vignette = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.7);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(render);
}

// Start with camera request on click, or fallback immediately
document.addEventListener('click', () => {
  if (!hasCamera && !cameraReady) {
    initCamera();
  }
});

// Try camera automatically on load
initCamera();
render();
</script>
</body>
</html>
