<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exp-038 — Resonant Nave</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08070c; overflow: hidden; cursor: crosshair; }
  svg { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<svg id="scene" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
(() => {
  const svg = document.getElementById('scene');
  const ns = 'http://www.w3.org/2000/svg';
  let W = window.innerWidth, H = window.innerHeight;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Audio context
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  // Architectural frequencies — based on harmonic series
  const SCALE = [130.81, 164.81, 196.00, 220.00, 261.63, 329.63, 392.00, 440.00, 523.25, 659.25];

  // Standing wave sources
  const sources = [];
  const MAX_SOURCES = 12;
  let time = 0;
  let frameCount = 0;

  // SVG element pools
  const archPaths = [];
  const pillarRects = [];
  const wavePaths = [];
  const glowCircles = [];

  // Create defs for gradients and filters
  const defs = document.createElementNS(ns, 'defs');

  // Glow filter
  const filter = document.createElementNS(ns, 'filter');
  filter.id = 'glow';
  filter.setAttribute('x', '-50%');
  filter.setAttribute('y', '-50%');
  filter.setAttribute('width', '200%');
  filter.setAttribute('height', '200%');
  const blur = document.createElementNS(ns, 'feGaussianBlur');
  blur.setAttribute('stdDeviation', '4');
  blur.setAttribute('result', 'blur');
  const merge = document.createElementNS(ns, 'feMerge');
  const mn1 = document.createElementNS(ns, 'feMergeNode');
  mn1.setAttribute('in', 'blur');
  const mn2 = document.createElementNS(ns, 'feMergeNode');
  mn2.setAttribute('in', 'SourceGraphic');
  merge.appendChild(mn1);
  merge.appendChild(mn2);
  filter.appendChild(blur);
  filter.appendChild(merge);
  defs.appendChild(filter);

  // Soft glow filter
  const filter2 = document.createElementNS(ns, 'filter');
  filter2.id = 'softglow';
  filter2.setAttribute('x', '-100%');
  filter2.setAttribute('y', '-100%');
  filter2.setAttribute('width', '300%');
  filter2.setAttribute('height', '300%');
  const blur2 = document.createElementNS(ns, 'feGaussianBlur');
  blur2.setAttribute('stdDeviation', '12');
  filter2.appendChild(blur2);
  defs.appendChild(filter2);

  svg.appendChild(defs);

  // Background group
  const bgGroup = document.createElementNS(ns, 'g');
  svg.appendChild(bgGroup);

  // Architecture group (behind waves)
  const archGroup = document.createElementNS(ns, 'g');
  svg.appendChild(archGroup);

  // Wave group
  const waveGroup = document.createElementNS(ns, 'g');
  svg.appendChild(waveGroup);

  // Foreground group (pillars, details)
  const fgGroup = document.createElementNS(ns, 'g');
  svg.appendChild(fgGroup);

  // Glow group
  const glowGroup = document.createElementNS(ns, 'g');
  svg.appendChild(glowGroup);

  // Create background — stone floor and distant ceiling
  function drawBackground() {
    // Floor gradient
    const floorGrad = document.createElementNS(ns, 'linearGradient');
    floorGrad.id = 'floorGrad';
    floorGrad.setAttribute('x1', '0');
    floorGrad.setAttribute('y1', '0.6');
    floorGrad.setAttribute('x2', '0');
    floorGrad.setAttribute('y2', '1');
    const fs1 = document.createElementNS(ns, 'stop');
    fs1.setAttribute('offset', '0');
    fs1.setAttribute('stop-color', '#0c0b10');
    const fs2 = document.createElementNS(ns, 'stop');
    fs2.setAttribute('offset', '1');
    fs2.setAttribute('stop-color', '#141218');
    floorGrad.appendChild(fs1);
    floorGrad.appendChild(fs2);
    defs.appendChild(floorGrad);

    const floor = document.createElementNS(ns, 'rect');
    floor.setAttribute('x', '0');
    floor.setAttribute('y', H * 0.6);
    floor.setAttribute('width', W);
    floor.setAttribute('height', H * 0.4);
    floor.setAttribute('fill', 'url(#floorGrad)');
    bgGroup.appendChild(floor);

    // Ceiling hint
    const ceilGrad = document.createElementNS(ns, 'linearGradient');
    ceilGrad.id = 'ceilGrad';
    ceilGrad.setAttribute('x1', '0');
    ceilGrad.setAttribute('y1', '0');
    ceilGrad.setAttribute('x2', '0');
    ceilGrad.setAttribute('y2', '0.15');
    const cs1 = document.createElementNS(ns, 'stop');
    cs1.setAttribute('offset', '0');
    cs1.setAttribute('stop-color', '#0e0d14');
    const cs2 = document.createElementNS(ns, 'stop');
    cs2.setAttribute('offset', '1');
    cs2.setAttribute('stop-color', '#08070c');
    ceilGrad.appendChild(cs1);
    ceilGrad.appendChild(cs2);
    defs.appendChild(ceilGrad);

    const ceil = document.createElementNS(ns, 'rect');
    ceil.setAttribute('x', '0');
    ceil.setAttribute('y', '0');
    ceil.setAttribute('width', W);
    ceil.setAttribute('height', H * 0.15);
    ceil.setAttribute('fill', 'url(#ceilGrad)');
    bgGroup.appendChild(ceil);

    // Stone texture lines on floor
    for (let i = 0; i < 20; i++) {
      const y = H * 0.62 + i * (H * 0.38 / 20);
      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', '0');
      line.setAttribute('y1', y);
      line.setAttribute('x2', W);
      line.setAttribute('y2', y);
      line.setAttribute('stroke', '#1a1820');
      line.setAttribute('stroke-width', '0.5');
      line.setAttribute('opacity', 0.3 + (i / 20) * 0.3);
      bgGroup.appendChild(line);
    }
  }

  drawBackground();

  // Emit a sound and create a source
  function emitSource(x, y) {
    const ctx = ensureAudio();
    const freq = SCALE[Math.floor(Math.random() * SCALE.length)];
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 3);

    // Add harmonics
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2;
    gain2.gain.setValueAtTime(0.05, ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start();
    osc2.stop(ctx.currentTime + 2);

    // Third harmonic for richness
    const osc3 = ctx.createOscillator();
    const gain3 = ctx.createGain();
    osc3.type = 'sine';
    osc3.frequency.value = freq * 3;
    gain3.gain.setValueAtTime(0.02, ctx.currentTime);
    gain3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
    osc3.connect(gain3);
    gain3.connect(ctx.destination);
    osc3.start();
    osc3.stop(ctx.currentTime + 1.5);

    if (sources.length >= MAX_SOURCES) {
      sources.shift();
    }

    sources.push({
      x, y,
      freq,
      birth: time,
      life: 8 + Math.random() * 4,
      hue: (freq / 660) * 280 + 200,
      amplitude: 1.0
    });
  }

  // Auto-emit initial sources to build the space
  function autoEmit() {
    // Place sources at architectural positions — like pillars along a nave
    const positions = [
      [W * 0.15, H * 0.5], [W * 0.85, H * 0.5],
      [W * 0.25, H * 0.35], [W * 0.75, H * 0.35],
      [W * 0.5, H * 0.2],
    ];
    for (const [px, py] of positions) {
      emitSource(px, py);
    }
  }

  // Compute standing wave interference at a point
  function waveAt(px, py, t) {
    let val = 0;
    for (const src of sources) {
      const age = t - src.birth;
      if (age > src.life) continue;
      const decay = 1 - age / src.life;
      const dx = px - src.x;
      const dy = py - src.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const wavelength = 800 / (src.freq / 130);
      const phase = (dist / wavelength) * Math.PI * 2 - t * 0.5;
      val += Math.sin(phase) * decay * src.amplitude / (1 + dist * 0.003);
    }
    return val;
  }

  // Draw gothic arch between two points
  function drawArch(x1, y1, x2, y2, height, hue, opacity) {
    const mx = (x1 + x2) / 2;
    const span = Math.abs(x2 - x1);
    const archTop = Math.min(y1, y2) - height;

    const path = document.createElementNS(ns, 'path');
    // Gothic pointed arch
    const cp1x = x1 + span * 0.1;
    const cp1y = archTop - height * 0.3;
    const cp2x = mx - span * 0.05;
    const cp2y = archTop - height * 0.1;
    const cp3x = mx + span * 0.05;
    const cp3y = archTop - height * 0.1;
    const cp4x = x2 - span * 0.1;
    const cp4y = archTop - height * 0.3;

    const d = `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${mx} ${archTop} C ${cp3x} ${cp3y}, ${cp4x} ${cp4y}, ${x2} ${y2}`;
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', `hsla(${hue}, 40%, 50%, ${opacity})`);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('filter', 'url(#glow)');
    return path;
  }

  // Draw pillar at position
  function drawPillar(x, baseY, topY, hue, opacity) {
    const width = 4 + opacity * 8;
    const rect = document.createElementNS(ns, 'rect');
    rect.setAttribute('x', x - width / 2);
    rect.setAttribute('y', topY);
    rect.setAttribute('width', width);
    rect.setAttribute('height', baseY - topY);
    rect.setAttribute('fill', `hsla(${hue}, 30%, 25%, ${opacity * 0.6})`);
    rect.setAttribute('stroke', `hsla(${hue}, 40%, 45%, ${opacity * 0.4})`);
    rect.setAttribute('stroke-width', '0.5');
    return rect;
  }

  // Render the scene
  function render() {
    // Clear dynamic groups
    while (archGroup.firstChild) archGroup.removeChild(archGroup.firstChild);
    while (waveGroup.firstChild) waveGroup.removeChild(waveGroup.firstChild);
    while (fgGroup.firstChild) fgGroup.removeChild(fgGroup.firstChild);
    while (glowGroup.firstChild) glowGroup.removeChild(glowGroup.firstChild);

    // Remove dead sources
    for (let i = sources.length - 1; i >= 0; i--) {
      if (time - sources[i].birth > sources[i].life) {
        sources.splice(i, 1);
      }
    }

    // Draw interference pattern as wave contours
    const step = 8;
    for (let row = 0; row < Math.ceil(H / step); row++) {
      const py = row * step;
      let pathD = '';
      let hasData = false;

      for (let col = 0; col < Math.ceil(W / step); col++) {
        const px = col * step;
        const val = waveAt(px, py, time);
        const displaced = py + val * 6;

        if (col === 0) {
          pathD = `M ${px} ${displaced}`;
        } else {
          pathD += ` L ${px} ${displaced}`;
        }
        if (Math.abs(val) > 0.1) hasData = true;
      }

      if (hasData) {
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', pathD);
        path.setAttribute('fill', 'none');
        const intensity = Math.min(1, sources.length / 4);
        path.setAttribute('stroke', `hsla(260, 30%, 40%, ${0.03 * intensity})`);
        path.setAttribute('stroke-width', '0.5');
        waveGroup.appendChild(path);
      }
    }

    // Build architecture from active sources
    // Each pair of sources creates an arch between them
    for (let i = 0; i < sources.length; i++) {
      const s1 = sources[i];
      const age1 = time - s1.birth;
      const decay1 = Math.max(0, 1 - age1 / s1.life);

      // Draw pillar at each source
      const pillarH = decay1 * H * 0.5;
      const baseY = H * 0.6;
      const pillar = drawPillar(s1.x, baseY, baseY - pillarH, s1.hue, decay1);
      fgGroup.appendChild(pillar);

      // Glow at source point
      const glow = document.createElementNS(ns, 'circle');
      glow.setAttribute('cx', s1.x);
      glow.setAttribute('cy', s1.y);
      glow.setAttribute('r', 20 + Math.sin(time * 2 + i) * 5);
      glow.setAttribute('fill', `hsla(${s1.hue}, 50%, 60%, ${decay1 * 0.08})`);
      glow.setAttribute('filter', 'url(#softglow)');
      glowGroup.appendChild(glow);

      // Source emanation rings
      const ringAge = (age1 * 2) % 3;
      for (let r = 0; r < 3; r++) {
        const ringR = ((ringAge + r) / 3) * 200;
        const ringOpacity = (1 - ringR / 200) * decay1 * 0.1;
        if (ringOpacity > 0.005) {
          const ring = document.createElementNS(ns, 'circle');
          ring.setAttribute('cx', s1.x);
          ring.setAttribute('cy', s1.y);
          ring.setAttribute('r', ringR);
          ring.setAttribute('fill', 'none');
          ring.setAttribute('stroke', `hsla(${s1.hue}, 40%, 50%, ${ringOpacity})`);
          ring.setAttribute('stroke-width', '0.8');
          waveGroup.appendChild(ring);
        }
      }

      // Draw arches between nearby sources
      for (let j = i + 1; j < sources.length; j++) {
        const s2 = sources[j];
        const age2 = time - s2.birth;
        const decay2 = Math.max(0, 1 - age2 / s2.life);
        const dist = Math.sqrt((s1.x - s2.x) ** 2 + (s1.y - s2.y) ** 2);

        if (dist < W * 0.6 && dist > 50) {
          const archOpacity = Math.min(decay1, decay2) * (1 - dist / (W * 0.6));
          const hue = (s1.hue + s2.hue) / 2;
          const archHeight = Math.max(60, (1 - dist / (W * 0.6)) * 200);

          // Main arch
          const arch = drawArch(s1.x, s1.y, s2.x, s2.y, archHeight, hue, archOpacity * 0.5);
          archGroup.appendChild(arch);

          // Inner arch (slightly smaller, brighter)
          const innerArch = drawArch(
            s1.x + (s2.x - s1.x) * 0.05,
            s1.y + (s2.y - s1.y) * 0.05,
            s2.x - (s2.x - s1.x) * 0.05,
            s2.y - (s2.y - s1.y) * 0.05,
            archHeight * 0.85, hue + 20, archOpacity * 0.3
          );
          archGroup.appendChild(innerArch);

          // Interference node at midpoint
          const mx = (s1.x + s2.x) / 2;
          const my = (s1.y + s2.y) / 2;
          const interference = waveAt(mx, my, time);
          if (Math.abs(interference) > 0.5) {
            const node = document.createElementNS(ns, 'circle');
            node.setAttribute('cx', mx);
            node.setAttribute('cy', my - archHeight * 0.5);
            node.setAttribute('r', Math.abs(interference) * 4);
            node.setAttribute('fill', `hsla(${hue}, 50%, 60%, ${archOpacity * Math.abs(interference) * 0.3})`);
            node.setAttribute('filter', 'url(#glow)');
            archGroup.appendChild(node);
          }
        }
      }
    }

    // Rose window effect at top center when enough sources
    if (sources.length >= 3) {
      const totalDecay = sources.reduce((s, src) => s + Math.max(0, 1 - (time - src.birth) / src.life), 0) / sources.length;
      const cx = W / 2, cy = H * 0.12;
      const roseR = 60 + totalDecay * 40;
      const segments = Math.max(6, sources.length * 2);

      for (let i = 0; i < segments; i++) {
        const a1 = (i / segments) * Math.PI * 2;
        const a2 = ((i + 0.5) / segments) * Math.PI * 2;
        const a3 = ((i + 1) / segments) * Math.PI * 2;

        const r1 = roseR * (0.7 + Math.sin(time + i * 0.8) * 0.15);
        const r2 = roseR * 0.4;

        const x1 = cx + Math.cos(a1) * r1;
        const y1 = cy + Math.sin(a1) * r1;
        const x2 = cx + Math.cos(a2) * r2;
        const y2 = cy + Math.sin(a2) * r2;
        const x3 = cx + Math.cos(a3) * r1;
        const y3 = cy + Math.sin(a3) * r1;

        const petal = document.createElementNS(ns, 'path');
        petal.setAttribute('d', `M ${cx} ${cy} Q ${x1} ${y1} ${x2} ${y2} Q ${x3} ${y3} ${cx} ${cy}`);
        petal.setAttribute('fill', 'none');
        const hue = 240 + (i / segments) * 60;
        petal.setAttribute('stroke', `hsla(${hue}, 40%, 45%, ${totalDecay * 0.2})`);
        petal.setAttribute('stroke-width', '0.8');
        petal.setAttribute('filter', 'url(#glow)');
        archGroup.appendChild(petal);
      }

      // Rose window outline
      const roseOutline = document.createElementNS(ns, 'circle');
      roseOutline.setAttribute('cx', cx);
      roseOutline.setAttribute('cy', cy);
      roseOutline.setAttribute('r', roseR);
      roseOutline.setAttribute('fill', 'none');
      roseOutline.setAttribute('stroke', `hsla(260, 35%, 40%, ${totalDecay * 0.15})`);
      roseOutline.setAttribute('stroke-width', '1');
      roseOutline.setAttribute('filter', 'url(#glow)');
      archGroup.appendChild(roseOutline);
    }

    // Ambient dust motes
    for (let i = 0; i < 15; i++) {
      const seed = i * 7919;
      const dx = W * 0.5 + Math.sin(time * 0.3 + seed) * W * 0.4;
      const dy = H * 0.1 + Math.cos(time * 0.2 + seed * 1.3) * H * 0.4;
      const mote = document.createElementNS(ns, 'circle');
      mote.setAttribute('cx', dx);
      mote.setAttribute('cy', dy);
      mote.setAttribute('r', 1 + Math.sin(time + i) * 0.5);
      mote.setAttribute('fill', `hsla(40, 30%, 60%, ${0.1 + Math.sin(time * 0.5 + i * 2) * 0.05})`);
      fgGroup.appendChild(mote);
    }
  }

  // Auto-emit on start with a delay
  setTimeout(() => autoEmit(), 200);

  // Click to add sources
  svg.addEventListener('click', (e) => {
    emitSource(e.clientX, e.clientY);
  });

  // Periodic auto-emission to keep the space alive
  setInterval(() => {
    if (sources.length < 4) {
      const x = W * 0.15 + Math.random() * W * 0.7;
      const y = H * 0.2 + Math.random() * H * 0.4;
      emitSource(x, y);
    }
  }, 5000);

  function animate() {
    time += 0.016;
    frameCount++;
    render();
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  });

  animate();
})();
</script>
</body>
</html>
