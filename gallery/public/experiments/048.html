<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exp-048: Stigmata</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; cursor: crosshair; }
canvas { display: block; }
#info {
  position: fixed; bottom: 12px; left: 12px;
  color: rgba(255,255,255,0.4); font: 11px/1.4 monospace;
  pointer-events: none; z-index: 10;
}
#scars {
  position: fixed; top: 12px; right: 12px;
  color: rgba(255,100,100,0.6); font: 13px/1.4 monospace;
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<div id="info">touch to wound / release to heal</div>
<div id="scars"></div>
<canvas id="c"></canvas>
<script>
const W = 1280, H = 720;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

// --- Memory system (localStorage) ---
const STORAGE_KEY = 'stigmata_048_memory';
let memory = { visits: 0, totalWounds: 0, scars: [], firstVisit: null };
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) memory = JSON.parse(saved);
} catch(e) {}
memory.visits++;
if (!memory.firstVisit) memory.firstVisit = Date.now();
if (!memory.scars) memory.scars = [];

function saveMemory() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(memory)); } catch(e) {}
}

const scarsEl = document.getElementById('scars');
function updateScarsDisplay() {
  const age = Math.floor((Date.now() - memory.firstVisit) / 60000);
  scarsEl.textContent = `visit #${memory.visits} | ${memory.totalWounds} wounds remembered | ${memory.scars.length} permanent scars`;
}
updateScarsDisplay();

// --- Voronoi stained glass ---
const NUM_CELLS = 120;
const cells = [];
const PALETTES = [
  ['#e63946','#f1faee','#a8dadc','#457b9d','#1d3557'],
  ['#ff006e','#fb5607','#ffbe0b','#8338ec','#3a86ff'],
  ['#d4a373','#faedcd','#fefae0','#e9edc9','#ccd5ae'],
  ['#590d22','#800f2f','#a4133c','#c9184a','#ff4d6d'],
  ['#03045e','#0077b6','#00b4d8','#90e0ef','#caf0f8'],
];
const palette = PALETTES[memory.visits % PALETTES.length];

class Cell {
  constructor(x, y, i) {
    this.x = x; this.y = y;
    this.ox = x; this.oy = y; // original position
    this.vx = (Math.random() - 0.5) * 0.15;
    this.vy = (Math.random() - 0.5) * 0.15;
    this.color = palette[i % palette.length];
    this.health = 1.0; // 1 = pristine, 0 = shattered
    this.scarDepth = 0; // permanent damage from memory
    this.fractures = []; // active fracture lines
    this.glowPhase = Math.random() * Math.PI * 2;
  }
}

// Initialize cells
for (let i = 0; i < NUM_CELLS; i++) {
  cells.push(new Cell(
    40 + Math.random() * (W - 80),
    40 + Math.random() * (H - 80),
    i
  ));
}

// Apply remembered scars
for (const scar of memory.scars) {
  // Find nearest cell to scar position and apply permanent damage
  let minD = Infinity, nearest = null;
  for (const c of cells) {
    const d = (c.ox - scar.x) ** 2 + (c.oy - scar.y) ** 2;
    if (d < minD) { minD = d; nearest = c; }
  }
  if (nearest) {
    nearest.scarDepth = Math.min(0.7, nearest.scarDepth + scar.depth * 0.1);
  }
}

// --- Fracture system ---
class Fracture {
  constructor(x, y, angle, energy) {
    this.x = x; this.y = y;
    this.angle = angle;
    this.energy = energy;
    this.points = [{x, y}];
    this.age = 0;
    this.maxAge = 60 + Math.random() * 60;
    this.opacity = 1;
  }
  grow() {
    if (this.energy <= 0) return;
    this.age++;
    const speed = this.energy * 3;
    this.angle += (Math.random() - 0.5) * 0.4;
    const nx = this.x + Math.cos(this.angle) * speed;
    const ny = this.y + Math.sin(this.angle) * speed;
    this.x = nx; this.y = ny;
    this.points.push({x: nx, y: ny});
    this.energy *= 0.97;
    // Branch occasionally
    if (Math.random() < 0.03 && this.energy > 0.3) {
      return new Fracture(nx, ny, this.angle + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random()), this.energy * 0.6);
    }
    return null;
  }
}

let fractures = [];
let mouseDown = false;
let mouseX = W/2, mouseY = H/2;
let woundCount = 0;

canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  mouseX = e.offsetX * (W / canvas.offsetWidth);
  mouseY = e.offsetY * (H / canvas.offsetHeight);
});
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.offsetX * (W / canvas.offsetWidth);
  mouseY = e.offsetY * (H / canvas.offsetHeight);
});
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('mouseleave', () => { mouseDown = false; });

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault(); mouseDown = true;
  const t = e.touches[0];
  mouseX = t.clientX * (W / canvas.offsetWidth);
  mouseY = t.clientY * (H / canvas.offsetHeight);
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX * (W / canvas.offsetWidth);
  mouseY = t.clientY * (H / canvas.offsetHeight);
});
canvas.addEventListener('touchend', () => { mouseDown = false; });

// --- Voronoi computation (brute force for simplicity) ---
function nearestCell(px, py) {
  let minD = Infinity, idx = 0;
  for (let i = 0; i < cells.length; i++) {
    const dx = cells[i].x - px, dy = cells[i].y - py;
    const d = dx*dx + dy*dy;
    if (d < minD) { minD = d; idx = i; }
  }
  return { idx, dist: Math.sqrt(minD) };
}

function secondNearest(px, py, skipIdx) {
  let minD = Infinity;
  for (let i = 0; i < cells.length; i++) {
    if (i === skipIdx) continue;
    const dx = cells[i].x - px, dy = cells[i].y - py;
    const d = dx*dx + dy*dy;
    if (d < minD) { minD = d; }
  }
  return Math.sqrt(minD);
}

// --- Render using pixel-based Voronoi ---
const imageData = ctx.createImageData(W, H);
const buf32 = new Uint32Array(imageData.data.buffer);

function hexToRGB(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return {r, g, b};
}

let frame = 0;

function render() {
  frame++;

  // Update cell positions (gentle drift)
  for (const c of cells) {
    c.x += c.vx;
    c.y += c.vy;
    // Bounce off edges
    if (c.x < 20 || c.x > W-20) c.vx *= -1;
    if (c.y < 20 || c.y > H-20) c.vy *= -1;
    c.x = Math.max(20, Math.min(W-20, c.x));
    c.y = Math.max(20, Math.min(H-20, c.y));
    c.glowPhase += 0.02;
  }

  // Wound or heal
  if (mouseDown) {
    woundCount++;
    if (woundCount % 5 === 0) {
      // Spawn fractures from mouse
      const numFrac = 2 + Math.floor(Math.random() * 3);
      for (let i = 0; i < numFrac; i++) {
        fractures.push(new Fracture(mouseX, mouseY, Math.random() * Math.PI * 2, 1.5 + Math.random()));
      }
    }
    // Damage nearby cells
    for (const c of cells) {
      const dx = c.x - mouseX, dy = c.y - mouseY;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 200) {
        const impact = (1 - d / 200) * 0.05;
        c.health = Math.max(0, c.health - impact);
        // Push cells away from wound
        if (d > 1) {
          c.vx += (dx / d) * impact * 2;
          c.vy += (dy / d) * impact * 2;
        }
      }
    }
    // Record scar every 60 frames of pressing
    if (woundCount % 60 === 0) {
      memory.totalWounds++;
      memory.scars.push({ x: mouseX, y: mouseY, depth: 0.3 });
      if (memory.scars.length > 200) memory.scars.shift(); // cap memory
      saveMemory();
      updateScarsDisplay();
    }
  } else {
    woundCount = 0;
    // Heal: cells recover toward health=1, but scarDepth is the floor
    for (const c of cells) {
      const floor = c.scarDepth;
      if (c.health < 1 - floor) {
        c.health += 0.008;
      }
      // Dampen velocity
      c.vx *= 0.98;
      c.vy *= 0.98;
      // Drift back toward original position
      c.vx += (c.ox - c.x) * 0.0003;
      c.vy += (c.oy - c.y) * 0.0003;
    }
  }

  // Grow fractures
  const newFracs = [];
  for (const f of fractures) {
    const branch = f.grow();
    if (branch) newFracs.push(branch);
    if (!mouseDown) f.opacity -= 0.015;
  }
  fractures.push(...newFracs);
  fractures = fractures.filter(f => f.opacity > 0 && f.energy > 0.05);

  // Render Voronoi cells (sample every 2px for speed, fill 2x2)
  const step = 2;
  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      const { idx, dist } = nearestCell(x, y);
      const c = cells[idx];
      const d2 = secondNearest(x, y, idx);

      const edgeDist = d2 - dist;
      const rgb = hexToRGB(c.color);

      // Glass glow effect
      const glow = 0.85 + 0.15 * Math.sin(c.glowPhase + dist * 0.01);

      // Health affects brightness and saturation
      const healthFactor = 0.3 + 0.7 * c.health;

      // Scar darkness
      const scarDark = 1 - c.scarDepth * 0.5;

      let r = rgb.r * glow * healthFactor * scarDark;
      let g = rgb.g * glow * healthFactor * scarDark;
      let b = rgb.b * glow * healthFactor * scarDark;

      // Lead lines (cell borders) — dark with metallic highlight
      if (edgeDist < 4) {
        const t = edgeDist / 4;
        const lead = 20 + 15 * Math.sin(frame * 0.03 + x * 0.01);
        r = r * t + lead * (1-t);
        g = g * t + lead * (1-t);
        b = b * t + (lead + 10) * (1-t);
      }

      // Shattered cells get dark cracks
      if (c.health < 0.5) {
        const crackNoise = Math.sin(x * 0.3 + y * 0.7) * Math.sin(x * 0.7 - y * 0.3);
        if (crackNoise > 0.7 - (0.5 - c.health)) {
          r *= 0.2; g *= 0.2; b *= 0.2;
        }
      }

      // Inner light effect (stained glass backlit feel)
      const cx = W/2, cy = H/2;
      const fromCenter = Math.sqrt((x-cx)**2 + (y-cy)**2);
      const lightFalloff = Math.max(0, 1 - fromCenter / 500);
      r = Math.min(255, r + lightFalloff * 30 * healthFactor);
      g = Math.min(255, g + lightFalloff * 20 * healthFactor);
      b = Math.min(255, b + lightFalloff * 25 * healthFactor);

      const pixel = (0xFF << 24) | ((b & 0xFF) << 16) | ((g & 0xFF) << 8) | (r & 0xFF);
      for (let dy = 0; dy < step && y+dy < H; dy++) {
        for (let dx = 0; dx < step && x+dx < W; dx++) {
          buf32[(y+dy) * W + (x+dx)] = pixel;
        }
      }
    }
  }

  ctx.putImageData(imageData, 0, 0);

  // Draw fractures on top
  ctx.lineWidth = 1.5;
  for (const f of fractures) {
    if (f.points.length < 2) continue;
    ctx.strokeStyle = `rgba(255, 220, 200, ${f.opacity * 0.8})`;
    ctx.shadowColor = `rgba(255, 150, 100, ${f.opacity * 0.5})`;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(f.points[0].x, f.points[0].y);
    for (let i = 1; i < f.points.length; i++) {
      ctx.lineTo(f.points[i].x, f.points[i].y);
    }
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // Draw permanent scar marks (faint)
  ctx.globalAlpha = 0.15;
  for (const scar of memory.scars) {
    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.arc(scar.x, scar.y, 2 + scar.depth * 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Vignette
  const grad = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, W*0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
