<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>The Weight of Doors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a12; overflow: hidden; width: 1280px; height: 720px; font-family: 'Georgia', serif; cursor: default; }
canvas { display: block; }
#overlay {
  position: absolute; top: 0; left: 0; width: 1280px; height: 720px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 10;
}
#message {
  color: rgba(255,255,255,0.8); font-size: 18px; letter-spacing: 2px;
  text-align: center; line-height: 1.8; opacity: 0;
  transition: opacity 1.5s ease;
  text-shadow: 0 0 20px rgba(255,180,100,0.4);
}
#message.visible { opacity: 1; }
#depth-counter {
  position: absolute; top: 20px; right: 30px;
  color: rgba(255,255,255,0.3); font-size: 14px; letter-spacing: 3px;
  z-index: 10;
}
</style>
</head>
<body>
<canvas id="c" width="1280" height="720"></canvas>
<div id="overlay"><div id="message"></div></div>
<div id="depth-counter"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;
const msg = document.getElementById('message');
const depthEl = document.getElementById('depth-counter');

let depth = 0;
const maxDepth = 6;
let nodes = [];
let particles = [];
let shatterParticles = [];
let currentChoices = [];
let transitioning = false;
let gameOver = false;
let chosenPath = [];
let breathPhase = 0;
let ambientHue = 30;

const messages = [
  'Every path is open.\nClick one to begin.',
  'Something closed behind you.',
  'The echoes grow quieter.',
  'You can almost remember\nwhat you didn\'t choose.',
  'The world is smaller now.',
  'One door remains.',
  'This is what you chose.\nThis is all there is.'
];

class Node {
  constructor(x, y, radius, hue, depth, index, totalSiblings) {
    this.x = x; this.y = y; this.radius = radius; this.hue = hue;
    this.depth = depth; this.index = index; this.totalSiblings = totalSiblings;
    this.alive = true; this.chosen = false; this.dying = false;
    this.deathProgress = 0; this.birthProgress = 0;
    this.birthSpeed = 0.015 + Math.random() * 0.01;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.children = []; this.parent = null;
    this.glow = 0; this.targetGlow = 0;
  }
  update(t) {
    if (this.birthProgress < 1) {
      this.birthProgress += this.birthSpeed;
      if (this.birthProgress > 1) this.birthProgress = 1;
    }
    if (this.dying) {
      this.deathProgress += 0.012;
      if (this.deathProgress > 1) { this.deathProgress = 1; this.alive = false; }
    }
    this.pulsePhase += 0.03;
    this.glow += (this.targetGlow - this.glow) * 0.1;
  }
  draw(ctx, t) {
    if (!this.alive && this.deathProgress >= 1) { this.drawGhost(ctx, t); return; }
    const bp = easeOutCubic(this.birthProgress);
    const dp = this.dying ? easeInCubic(this.deathProgress) : 0;
    const scale = bp * (1 - dp * 0.7);
    const alpha = bp * (1 - dp);
    const pulse = Math.sin(this.pulsePhase) * 0.15 + 1;
    const r = this.radius * scale * pulse;
    const h = this.hue;
    // Outer glow
    const glowR = r * 4;
    const grad = ctx.createRadialGradient(this.x, this.y, r * 0.3, this.x, this.y, glowR);
    const glowAlpha = alpha * (0.2 + this.glow * 0.25);
    grad.addColorStop(0, `hsla(${h}, 80%, 60%, ${glowAlpha})`);
    grad.addColorStop(0.5, `hsla(${h}, 70%, 40%, ${glowAlpha * 0.3})`);
    grad.addColorStop(1, `hsla(${h}, 60%, 30%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2); ctx.fill();
    // Core
    const coreGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    coreGrad.addColorStop(0, `hsla(${h}, 90%, 85%, ${alpha})`);
    coreGrad.addColorStop(0.4, `hsla(${h}, 85%, 65%, ${alpha * 0.9})`);
    coreGrad.addColorStop(1, `hsla(${h}, 75%, 45%, ${alpha * 0.5})`);
    ctx.fillStyle = coreGrad;
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI * 2); ctx.fill();
    // Hover ring
    if (this.glow > 0.1 && !this.dying) {
      ctx.strokeStyle = `hsla(${h}, 80%, 70%, ${this.glow * alpha * 0.5})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 1.5 + Math.sin(t * 2 + this.pulsePhase) * 3, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Cracks when dying
    if (this.dying && this.deathProgress > 0.1) {
      const numCracks = 5;
      ctx.strokeStyle = `hsla(0, 0%, 10%, ${alpha * dp})`;
      ctx.lineWidth = 1.5;
      for (let i = 0; i < numCracks; i++) {
        const angle = (i / numCracks) * Math.PI * 2 + this.index;
        const len = r * dp * 1.5;
        ctx.beginPath(); ctx.moveTo(this.x, this.y);
        let cx = this.x, cy = this.y;
        for (let j = 0; j < 4; j++) {
          const jitter = (Math.sin(i * 73 + j * 37) * 0.5) * r * 0.3;
          cx += Math.cos(angle + jitter * 0.1) * len / 4;
          cy += Math.sin(angle + jitter * 0.1) * len / 4;
          ctx.lineTo(cx + jitter, cy + jitter);
        }
        ctx.stroke();
      }
    }
  }
  drawGhost(ctx, t) {
    const ghostAlpha = 0.06 + Math.sin(t * 0.5 + this.pulsePhase) * 0.02;
    const r = this.radius * 0.5;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 2);
    grad.addColorStop(0, `hsla(${this.hue}, 20%, 40%, ${ghostAlpha})`);
    grad.addColorStop(1, `hsla(${this.hue}, 10%, 20%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(this.x, this.y, r * 2, 0, Math.PI * 2); ctx.fill();
  }
  contains(mx, my) {
    const dx = mx - this.x, dy = my - this.y;
    return dx * dx + dy * dy < (this.radius * 2) * (this.radius * 2);
  }
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInCubic(t) { return t * t * t; }

function drawConnections(ctx, t) {
  for (const node of nodes) {
    if (!node.parent || node.birthProgress < 0.1) continue;
    const p = node.parent;
    const alpha = node.birthProgress * (node.dying ? (1 - node.deathProgress) : 1);
    const ghostAlpha = (!node.alive || node.deathProgress >= 1) ? 0.03 : alpha * 0.2;
    if (ghostAlpha < 0.005) continue;
    ctx.strokeStyle = `hsla(${(node.hue + p.hue) / 2}, 40%, 50%, ${ghostAlpha})`;
    ctx.lineWidth = node.alive ? 1.5 : 0.5;
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
    const mx = (p.x + node.x) / 2, my = (p.y + node.y) / 2 - 20;
    ctx.quadraticCurveTo(mx, my, node.x, node.y);
    ctx.stroke();
  }
}

function generateChoices(parentNode, depthLevel) {
  const numChoices = Math.max(2, 5 - depthLevel);
  const choices = [];
  const startX = parentNode ? parentNode.x : W / 2;
  const startY = parentNode ? parentNode.y : H * 0.18;
  const spreadX = Math.max(120, (W * 0.65) / Math.pow(1.3, depthLevel));
  const nextY = startY + 85;
  const hueBase = parentNode ? parentNode.hue : 30;
  const hueSpread = 360 / numChoices;
  for (let i = 0; i < numChoices; i++) {
    const t = numChoices === 1 ? 0.5 : i / (numChoices - 1);
    const x = startX + (t - 0.5) * spreadX;
    const y = nextY + (Math.sin(i * 2.7) * 10);
    const hue = (hueBase + i * hueSpread + Math.sin(i * 5) * 15) % 360;
    const radius = 24 - depthLevel * 2;
    const node = new Node(x, y, Math.max(8, radius), hue, depthLevel, i, numChoices);
    node.parent = parentNode;
    if (parentNode) parentNode.children.push(node);
    choices.push(node);
    nodes.push(node);
  }
  return choices;
}

function emitShatter(node) {
  const count = 15;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.sin(i * 3) * 0.5;
    const speed = 1 + Math.sin(i * 7) * 1.5 + 1.5;
    shatterParticles.push({
      x: node.x, y: node.y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1, decay: 0.008 + Math.sin(i * 11) * 0.004 + 0.004,
      hue: node.hue, size: 2 + Math.sin(i * 13) * 1.5 + 1.5
    });
  }
}

function spawnAmbient() {
  if (particles.length < 60) {
    const seed = performance.now() * 0.001;
    particles.push({
      x: (Math.sin(seed * 3.7) * 0.5 + 0.5) * W,
      y: H + 10,
      vx: Math.sin(seed * 7.3) * 0.3,
      vy: -0.2 - (Math.sin(seed * 11.1) * 0.25 + 0.25),
      life: 1,
      decay: 0.002 + (Math.sin(seed * 17.3) * 0.0015 + 0.0015),
      hue: ambientHue + Math.sin(seed * 23.7) * 30 + 30,
      size: 1 + (Math.sin(seed * 31.1) * 0.5 + 0.5) * 2
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx += Math.sin(p.y * 0.01 + p.x * 0.005) * 0.01;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = shatterParticles.length - 1; i >= 0; i--) {
    const p = shatterParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.03; p.vx *= 0.99;
    p.life -= p.decay;
    if (p.life <= 0) shatterParticles.splice(i, 1);
  }
}

function drawParticles(ctx) {
  for (const p of particles) {
    ctx.fillStyle = `hsla(${p.hue}, 50%, 60%, ${p.life * 0.15})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  }
  for (const p of shatterParticles) {
    ctx.fillStyle = `hsla(${p.hue}, 70%, 70%, ${p.life * 0.7})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  }
}

function drawVignette(ctx, t) {
  const intensity = depth / maxDepth;
  const breathe = Math.sin(breathPhase) * 0.03;
  const innerRadius = W * 0.5 * (1 - intensity * 0.5 + breathe);
  const outerRadius = W * 0.8;
  const grad = ctx.createRadialGradient(W/2, H/2, innerRadius, W/2, H/2, outerRadius);
  grad.addColorStop(0, 'rgba(5,5,10,0)');
  grad.addColorStop(0.5, `rgba(5,5,10,${0.3 + intensity * 0.4})`);
  grad.addColorStop(1, `rgba(5,5,10,${0.7 + intensity * 0.25})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function showMessage(text) {
  msg.textContent = '';
  msg.className = '';
  const lines = text.split('\n');
  lines.forEach((line, i) => {
    if (i > 0) msg.appendChild(document.createElement('br'));
    msg.appendChild(document.createTextNode(line));
  });
  requestAnimationFrame(() => msg.className = 'visible');
}

function choose(chosenNode) {
  if (transitioning || gameOver) return;
  transitioning = true;
  chosenNode.chosen = true;
  chosenPath.push(chosenNode);
  // Kill siblings
  for (const node of currentChoices) {
    if (node !== chosenNode) {
      node.dying = true;
      setTimeout(() => emitShatter(node), 300 + (node.index * 100));
    }
  }
  depth++;
  ambientHue = chosenNode.hue;
  depthEl.textContent = depth + ' of ' + maxDepth + ' choices made';
  // Fade old message and show new
  msg.className = '';
  setTimeout(() => showMessage(messages[depth] || ''), 800);
  setTimeout(() => {
    if (depth < maxDepth) {
      currentChoices = generateChoices(chosenNode, depth);
      transitioning = false;
    } else {
      gameOver = true;
      chosenNode.radius = 25;
      showMessage(messages[maxDepth]);
    }
  }, 1500);
}

// Mouse
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let hovering = false;
  for (const node of currentChoices) {
    if (node.alive && !node.dying) {
      const over = node.contains(mx, my);
      node.targetGlow = over ? 1 : 0;
      if (over) hovering = true;
    }
  }
  canvas.style.cursor = hovering ? 'pointer' : 'default';
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  for (const node of currentChoices) {
    if (node.alive && !node.dying && node.contains(mx, my)) {
      choose(node);
      break;
    }
  }
});

// Pre-fill ambient particles
for (let i = 0; i < 40; i++) {
  const seed = i * 7.31;
  particles.push({
    x: (Math.sin(seed * 3.7) * 0.5 + 0.5) * W,
    y: Math.sin(seed * 2.1) * 0.5 * H + H * 0.3,
    vx: Math.sin(seed * 7.3) * 0.3,
    vy: -0.2 - (Math.sin(seed * 11.1) * 0.25 + 0.25),
    life: Math.sin(seed * 1.7) * 0.3 + 0.5,
    decay: 0.002 + (Math.sin(seed * 17.3) * 0.0015 + 0.0015),
    hue: ambientHue + Math.sin(seed * 23.7) * 30 + 30,
    size: 1 + (Math.sin(seed * 31.1) * 0.5 + 0.5) * 2
  });
}
// Init
currentChoices = generateChoices(null, 0);
showMessage(messages[0]);
depthEl.textContent = '0 of ' + maxDepth + ' choices made';

let startTime = performance.now();
function animate() {
  const now = performance.now();
  const t = (now - startTime) / 1000;
  breathPhase += 0.015;
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);
  spawnAmbient();
  updateParticles();
  drawConnections(ctx, t);
  for (const node of nodes) { node.update(t); node.draw(ctx, t); }
  drawParticles(ctx);
  drawVignette(ctx, t);
  // Chosen path trace
  if (chosenPath.length > 1) {
    ctx.strokeStyle = `hsla(${ambientHue}, 60%, 60%, 0.08)`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(chosenPath[0].x, chosenPath[0].y);
    for (let i = 1; i < chosenPath.length; i++) ctx.lineTo(chosenPath[i].x, chosenPath[i].y);
    ctx.stroke();
  }
  // Final state glow
  if (gameOver && chosenPath.length > 0) {
    const last = chosenPath[chosenPath.length - 1];
    const breathR = 100 + Math.sin(t * 0.8) * 30;
    const grad = ctx.createRadialGradient(last.x, last.y, 0, last.x, last.y, breathR);
    grad.addColorStop(0, `hsla(${last.hue}, 70%, 50%, 0.05)`);
    grad.addColorStop(1, `hsla(${last.hue}, 50%, 30%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(last.x, last.y, breathR, 0, Math.PI * 2); ctx.fill();
  }
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
