<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exp-045 — Lithotext</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });

canvas.width = 1280;
canvas.height = 720;
gl.viewport(0, 0, canvas.width, canvas.height);

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function createProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compileShader(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

// Create text texture from canvas
const textCanvas = document.createElement('canvas');
textCanvas.width = 1024;
textCanvas.height = 1024;
const tctx = textCanvas.getContext('2d');

const STRATA_WORDS = [
  'GRANITE BASALT MAGMA CORE IRON MANTLE SILICATE OBSIDIAN',
  'TRILOBITE AMMONITE BRACHIOPOD CORAL CRINOID GRAPTOLITE',
  'FERN CYCAD CONIFER GINKGO MOSS LICHEN SPORE POLLEN SEED',
  'SAND CLAY SILT LOAM HUMUS PEAT CHALK MARL LOESS DRIFT',
  'RAIN WIND FROST THAW FLOOD DROUGHT STORM MIST DEW SNOW'
];

// Fill text texture — each vertical band is a stratum with its vocabulary
tctx.fillStyle = '#000';
tctx.fillRect(0, 0, 1024, 1024);
tctx.font = 'bold 11px monospace';
const strataColors = ['#c45522', '#a07850', '#48903a', '#9a8a70', '#6868aa'];

for (let band = 0; band < 5; band++) {
  const y0 = band * 204;
  const words = STRATA_WORDS[band].split(' ');
  tctx.fillStyle = strataColors[band];
  for (let row = 0; row < 15; row++) {
    for (let col = 0; col < 8; col++) {
      const word = words[(row * 3 + col) % words.length];
      tctx.fillText(word, col * 128 + 4, y0 + row * 14 + 10);
    }
  }
  // Boundary glow line
  tctx.fillStyle = strataColors[band].replace(')', ',0.4)').replace('rgb', 'rgba');
  tctx.fillRect(0, y0, 1024, 1);
}

// Upload text texture
const textTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, textTex);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, textCanvas);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

const quadVS = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const terrainFS = `
precision highp float;
varying vec2 v_uv;
uniform float u_time;
uniform vec2 u_resolution;
uniform sampler2D u_textTex;

vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v) {
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;
  i = mod289(i);
  vec4 p = permute(permute(permute(
    i.z + vec4(0.0, i1.z, i2.z, 1.0))
    + i.y + vec4(0.0, i1.y, i2.y, 1.0))
    + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 0.142857142857;
  vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ * ns.x + ns.yyyy;
  vec4 y = y_ * ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}

float fbm(vec3 p, int octaves) {
  float val = 0.0;
  float amp = 0.5;
  float freq = 1.0;
  for (int i = 0; i < 8; i++) {
    if (i >= octaves) break;
    val += amp * snoise(p * freq);
    freq *= 2.03;
    amp *= 0.49;
    p.xy += vec2(0.3, -0.7);
  }
  return val;
}

float terrain(vec2 p, float t) {
  float drift = t * 0.015;
  vec3 q = vec3(p, drift);
  float continental = fbm(q * 0.3, 4) * 1.8;
  vec2 warp = vec2(
    snoise(vec3(p * 0.5, drift * 0.7)),
    snoise(vec3(p * 0.5 + 5.2, drift * 0.7))
  );
  float ridges = fbm(vec3((p + warp * 0.8) * 0.7, drift * 0.5), 6);
  ridges = abs(ridges);
  ridges = pow(ridges, 1.5) * 2.0;
  float erosion = fbm(vec3(p * 2.0 + warp * 0.3, drift * 1.5), 7) * 0.15;
  float raw = continental + ridges - erosion;
  float eroded = raw - smoothstep(0.3, 1.5, raw) * 0.3;
  float rivers = snoise(vec3(p * 1.5 + warp * 1.2, drift * 0.3));
  rivers = 1.0 - smoothstep(0.0, 0.06, abs(rivers));
  eroded -= rivers * 0.15;
  return eroded;
}

vec3 calcNormal(vec2 p, float t) {
  float eps = 0.002;
  return normalize(vec3(
    terrain(p - vec2(eps, 0.0), t) - terrain(p + vec2(eps, 0.0), t),
    2.0 * eps,
    terrain(p - vec2(0.0, eps), t) - terrain(p + vec2(0.0, eps), t)
  ));
}

// Strata color with text texture sampling
vec3 strataColor(float h, float slope, float t, vec2 worldPos) {
  // Base geological colors
  vec3 deep = vec3(0.35, 0.13, 0.06);
  vec3 paleo = vec3(0.40, 0.30, 0.19);
  vec3 meso = vec3(0.18, 0.30, 0.12);
  vec3 ceno = vec3(0.42, 0.38, 0.30);
  vec3 holo = vec3(0.26, 0.26, 0.42);
  vec3 snow = vec3(0.90, 0.88, 0.84);

  float seaLevel = -0.1 + sin(t * 0.1) * 0.05;

  vec3 col = vec3(0.04, 0.06, 0.12);
  col = mix(col, deep, smoothstep(seaLevel - 0.05, seaLevel + 0.05, h));
  col = mix(col, paleo, smoothstep(seaLevel, seaLevel + 0.25, h));
  col = mix(col, meso, smoothstep(seaLevel + 0.15, seaLevel + 0.5, h));
  col = mix(col, ceno, smoothstep(0.4, 0.7, h));
  col = mix(col, holo, smoothstep(0.6, 1.0, h));
  col = mix(col, snow, smoothstep(1.0, 1.4, h));
  col = mix(col, ceno * 0.6, smoothstep(0.6, 0.9, slope));

  // Strata banding with text modulation
  float band = sin(h * 40.0 + snoise(vec3(h * 10.0, 0.0, t * 0.05)) * 3.0) * 0.5 + 0.5;

  // Sample text texture based on height (stratum band) and world position
  float strataIdx = clamp((h - seaLevel) / 1.5, 0.0, 1.0);
  vec2 textUV = vec2(
    fract(worldPos.x * 2.5 + t * 0.01),
    strataIdx
  );
  vec4 textSample = texture2D(u_textTex, textUV);
  float textBright = max(textSample.r, max(textSample.g, textSample.b));

  // Text is most visible on steep slopes (exposed strata faces) and near boundaries
  float exposure = smoothstep(0.2, 0.7, slope) + band * 0.3;
  float textVisibility = textBright * exposure * 0.65;

  // Glow color from text — warm amber for deep, cool blue for surface
  vec3 textGlow = mix(vec3(1.0, 0.5, 0.2), vec3(0.4, 0.5, 1.0), strataIdx);
  col = mix(col, col + textGlow * 0.5, textVisibility);

  // Strata boundary glow lines
  float boundaryGlow = 0.0;
  for (int i = 1; i < 5; i++) {
    float level = float(i) * 0.3 + seaLevel;
    boundaryGlow += smoothstep(0.02, 0.0, abs(h - level)) * 0.3;
  }
  col += textGlow * boundaryGlow * (0.3 + textBright * 0.4);

  return col;
}

void main() {
  vec2 uv = v_uv;
  float aspect = u_resolution.x / u_resolution.y;
  float t = u_time;

  float camAngle = t * 0.018 + 0.8;
  vec3 camPos = vec3(
    sin(camAngle) * 1.5,
    1.3 + sin(t * 0.04) * 0.2,
    cos(camAngle) * 1.5
  );
  vec3 camTarget = vec3(
    sin(camAngle + 0.3) * 4.0,
    0.35,
    cos(camAngle + 0.3) * 4.0
  );

  vec3 forward = normalize(camTarget - camPos);
  vec3 right = normalize(cross(forward, vec3(0.0, 1.0, 0.0)));
  vec3 up = cross(right, forward);

  vec2 screen = (uv - 0.5) * vec2(aspect, 1.0);
  vec3 rd = normalize(forward * 2.0 + right * screen.x + up * screen.y);

  vec3 col = vec3(0.0);
  float tRay = 0.0;
  bool hit = false;
  vec3 hitPos;

  for (int i = 0; i < 200; i++) {
    hitPos = camPos + rd * tRay;
    float h = terrain(hitPos.xz, t);
    float diff = hitPos.y - h;
    if (diff < 0.002) { hit = true; break; }
    tRay += max(diff * 0.5, 0.005);
    if (tRay > 12.0) break;
  }

  if (hit) {
    vec3 normal = calcNormal(hitPos.xz, t);
    float h = terrain(hitPos.xz, t);
    float slope = 1.0 - normal.y;

    float dayPhase = t * 0.1 + 1.2;
    vec3 sunDir = normalize(vec3(
      cos(dayPhase) * 0.7,
      0.45 + sin(dayPhase) * 0.35,
      sin(dayPhase) * 0.7
    ));

    float sunHeight = sunDir.y;
    vec3 sunCol = mix(vec3(1.4, 0.5, 0.2), vec3(1.1, 1.05, 1.0), smoothstep(0.0, 0.6, sunHeight));

    float diff = max(dot(normal, sunDir), 0.0);
    vec3 skyCol = mix(vec3(0.15, 0.12, 0.2), vec3(0.4, 0.5, 0.7), smoothstep(-0.1, 0.4, sunHeight));
    float amb = 0.2 + 0.15 * normal.y;

    float shadow = 1.0;
    vec2 shadowPos = hitPos.xz + sunDir.xz * 0.1;
    float shadowH = terrain(shadowPos, t);
    shadow = smoothstep(0.0, 0.08, h - shadowH + sunDir.y * 0.1);

    vec3 matCol = strataColor(h, slope, t, hitPos.xz);
    col = matCol * (diff * sunCol * shadow + amb * skyCol);

    // Water
    float seaLevel = -0.1 + sin(t * 0.1) * 0.05;
    if (h < seaLevel + 0.02) {
      vec3 refl = reflect(-sunDir, normal);
      float spec = pow(max(dot(refl, -rd), 0.0), 32.0);
      col += spec * sunCol * 0.5;
      float depth = max(seaLevel - h, 0.0);
      col = mix(col, vec3(0.05, 0.12, 0.2), smoothstep(0.0, 0.3, depth));
    }

    // Fog
    float dist = length(hitPos - camPos);
    vec3 fogCol = mix(skyCol, sunCol * 0.3, smoothstep(0.0, 0.5, sunHeight));
    float fog = 1.0 - exp(-dist * 0.15);
    col = mix(col, fogCol, fog);

    // Valley fog
    float valleyFog = exp(-max(h, 0.0) * 5.0) * 0.3;
    col = mix(col, fogCol * 0.8, valleyFog * (1.0 - fog));

    // Rain-like falling text particles — shimmer near exposed strata
    float rain = snoise(vec3(hitPos.xz * 8.0, t * 2.0));
    rain = smoothstep(0.85, 1.0, rain) * slope * 0.15;
    vec3 rainCol = mix(vec3(1.0, 0.6, 0.3), vec3(0.5, 0.6, 1.0), clamp((h - seaLevel) / 1.2, 0.0, 1.0));
    col += rainCol * rain;
  } else {
    float sunAngle = t * 0.1 + 1.2;
    vec3 sunDir = normalize(vec3(cos(sunAngle) * 0.7, 0.45 + sin(sunAngle) * 0.35, sin(sunAngle) * 0.7));
    float sunHeight = sunDir.y;
    vec3 skyTop = mix(vec3(0.08, 0.05, 0.15), vec3(0.3, 0.45, 0.75), smoothstep(-0.1, 0.4, sunHeight));
    vec3 skyHorizon = mix(vec3(0.25, 0.15, 0.1), vec3(0.6, 0.65, 0.7), smoothstep(-0.1, 0.3, sunHeight));
    col = mix(skyHorizon, skyTop, smoothstep(0.0, 0.5, rd.y));
    float sunDot = max(dot(rd, sunDir), 0.0);
    col += pow(sunDot, 256.0) * vec3(1.0, 0.9, 0.7) * 2.0;
    col += pow(sunDot, 8.0) * vec3(1.0, 0.6, 0.3) * 0.15;
  }

  // Tone mapping
  col *= 1.6;
  col = col / (col + 1.0);
  col = pow(col, vec3(0.75));

  float vig = 1.0 - 0.3 * dot(uv - 0.5, uv - 0.5) * 2.0;
  col *= vig;

  gl_FragColor = vec4(col, 1.0);
}`;

const prog = createProgram(quadVS, terrainFS);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes = gl.getUniformLocation(prog, 'u_resolution');
const uTextTex = gl.getUniformLocation(prog, 'u_textTex');

gl.uniform2f(uRes, canvas.width, canvas.height);
gl.activeTexture(gl.TEXTURE0);
gl.bindTexture(gl.TEXTURE_2D, textTex);
gl.uniform1i(uTextTex, 0);

const start = performance.now();

function render() {
  const t = (performance.now() - start) / 1000.0;
  gl.uniform1f(uTime, t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
