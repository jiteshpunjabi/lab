<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>exp-039 — Tidal Memory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 1280, H = 720;
  canvas.width = W;
  canvas.height = H;

  const COLS = 320;
  const ROWS = 180;
  const CW = W / COLS;
  const CH = H / ROWS;
  const terrain = new Float32Array(COLS * ROWS);
  const sediment = new Float32Array(COLS * ROWS);
  const water = new Float32Array(COLS * ROWS);
  const moisture = new Float32Array(COLS * ROWS);

  // Layered sinusoidal noise
  function noise(x, y, seed) {
    let v = 0;
    v += Math.sin(x * 0.019 + seed) * Math.cos(y * 0.027 + seed * 0.7) * 0.5;
    v += Math.sin(x * 0.053 + y * 0.041 + seed * 1.3) * 0.3;
    v += Math.sin(x * 0.107 - y * 0.083 + seed * 2.1) * 0.15;
    v += Math.sin(x * 0.229 + y * 0.193 + seed * 3.7) * 0.05;
    return v;
  }

  // Initialize terrain - archipelago shape
  function initTerrain() {
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const i = y * COLS + x;
        const nx = x / COLS - 0.5;
        const ny = y / ROWS - 0.5;
        // Multiple island centers
        const d1 = Math.sqrt((nx + 0.05) * (nx + 0.05) * 1.5 + ny * ny * 2.5);
        const d2 = Math.sqrt((nx - 0.25) * (nx - 0.25) * 2 + (ny + 0.1) * (ny + 0.1) * 3);
        const d3 = Math.sqrt((nx + 0.2) * (nx + 0.2) * 3 + (ny - 0.15) * (ny - 0.15) * 2);
        const d = Math.min(d1 * 0.9, d2 * 1.3, d3 * 1.5);
        let h = noise(x, y, 42) + noise(x * 2, y * 2, 17) * 0.5;
        h = h * 0.55 + 0.35 - d * 2.0;
        h += noise(x * 3, y * 3, 99) * 0.12;
        // Add ridge-like features
        h += Math.abs(noise(x * 1.5, y * 1.5, 137)) * 0.08;
        terrain[i] = h;
        sediment[i] = Math.max(0, h * 0.05);
        water[i] = 0;
        moisture[i] = 0;
      }
    }
  }

  initTerrain();

  let seaLevel = -0.05;
  let tidePhase = 0;
  let mouseX = W / 2, mouseY = H / 2;
  let mouseInfluence = 0;

  canvas.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    mouseInfluence = 1.0;
  });

  canvas.addEventListener('mouseleave', () => {
    mouseInfluence *= 0.95;
  });

  // Hydraulic erosion
  function erode() {
    const erosionRate = 0.001;
    const depositionRate = 0.0005;
    const evapRate = 0.004;

    for (let y = 1; y < ROWS - 1; y++) {
      for (let x = 1; x < COLS - 1; x++) {
        const i = y * COLS + x;
        const totalH = terrain[i] + water[i];
        let lowestH = totalH;
        let lowestIdx = -1;
        const neighbors = [
          (y - 1) * COLS + x,
          (y + 1) * COLS + x,
          y * COLS + (x - 1),
          y * COLS + (x + 1)
        ];

        for (const ni of neighbors) {
          const nh = terrain[ni] + water[ni];
          if (nh < lowestH) {
            lowestH = nh;
            lowestIdx = ni;
          }
        }

        if (lowestIdx >= 0 && water[i] > 0.001) {
          const diff = totalH - lowestH;
          const flow = Math.min(water[i], diff * 0.25);
          water[i] -= flow;
          water[lowestIdx] += flow * 0.94;
          const eroded = flow * erosionRate * (1 + Math.max(0, terrain[i]) * 2);
          terrain[i] -= eroded;
          sediment[i] += eroded;
          const transported = sediment[i] * flow * 0.12;
          sediment[i] -= transported;
          sediment[lowestIdx] += transported;
        }

        if (water[i] > 0 && sediment[i] > 0) {
          const dep = sediment[i] * depositionRate;
          terrain[i] += dep;
          sediment[i] -= dep;
        }

        water[i] *= (1 - evapRate);
        moisture[i] = moisture[i] * 0.99 + water[i] * 0.008;
      }
    }
  }

  // Tide influenced by mouse position
  function applyTide(t) {
    const mx = mouseX / W;
    const my = mouseY / H;
    const tideDir = Math.atan2(my - 0.5, mx - 0.5);

    tidePhase += 0.007;
    seaLevel = -0.04 + Math.sin(tidePhase) * 0.07 + Math.sin(tidePhase * 2.7) * 0.025 + Math.sin(tidePhase * 0.3) * 0.015;

    const surgeAmount = mouseInfluence * 0.055;

    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const i = y * COLS + x;
        const h = terrain[i];
        const dx = x / COLS - 0.5;
        const dy = y / ROWS - 0.5;
        const angle = Math.atan2(dy, dx);
        const alignment = Math.cos(angle - tideDir) * 0.5 + 0.5;
        const localSea = seaLevel + surgeAmount * alignment;

        if (h < localSea && h > localSea - 0.3) {
          const waveStrength = Math.sin(t * 0.025 + x * 0.14 + y * 0.09) * 0.5 + 0.5;
          water[i] += (localSea - h) * 0.018 * waveStrength;
        }

        if (h < localSea - 0.3) {
          water[i] = Math.max(water[i], localSea - h);
        }
      }
    }

    mouseInfluence *= 0.997;
  }

  // Color mapping
  function getColor(h, w, m, sed, px, py, t) {
    // Deep ocean
    if (h < seaLevel - 0.25) {
      const depth = Math.min(1, (seaLevel - h) * 2);
      const wave = Math.sin(t * 0.015 + px * 0.06 + py * 0.045) * 0.03;
      const caustic = (Math.sin(px * 0.12 + t * 0.02) * Math.cos(py * 0.09 - t * 0.015) + 1) * 0.5;
      const cBoost = caustic > 0.8 ? (caustic - 0.8) * 0.15 * (1 - depth * 0.7) : 0;
      return [
        8 + depth * 3 + cBoost * 40,
        18 + (1 - depth) * 45 + wave * 15 + cBoost * 60,
        55 + (1 - depth) * 85 + wave * 25 + cBoost * 40
      ];
    }

    // Shallow water / tidal zone
    if (w > 0.02 || h < seaLevel) {
      const depth = Math.min(1, w * 4.5);
      const foam1 = Math.sin(t * 0.04 + px * 0.21 + py * 0.13);
      const foam2 = Math.sin(t * 0.067 + px * 0.37 - py * 0.29);
      const foam3 = Math.sin(t * 0.031 - px * 0.11 + py * 0.43);
      const foam = (foam1 * foam2 + foam3) * 0.5;
      const foamBright = foam > 0.35 ? (foam - 0.35) * 1.0 * (1 - depth * 0.8) : 0;
      const murk = Math.min(1, sed * 8);
      return [
        25 + depth * 12 + murk * 55 + foamBright * 160,
        65 + (1 - depth) * 75 + murk * 25 + foamBright * 140,
        125 + (1 - depth) * 55 - murk * 35 + foamBright * 90
      ];
    }

    // Wet sand
    if (h < seaLevel + 0.05 && m > 0.001) {
      const wetness = Math.min(1, m * 15);
      return [155 - wetness * 55 + sed * 35, 135 - wetness * 45 + sed * 18, 85 - wetness * 35];
    }

    // Beach
    if (h < seaLevel + 0.12) {
      const beachH = (h - seaLevel) / 0.12;
      return [175 + beachH * 25 + sed * 25, 155 + beachH * 18 + sed * 12, 95 + beachH * 12];
    }

    // Low vegetation
    if (h < seaLevel + 0.22) {
      const vegH = (h - seaLevel - 0.12) / 0.1;
      return [35 + vegH * 20, 90 + (1 - vegH) * 50 + m * 2000, 25 + vegH * 15];
    }

    // Dense vegetation
    if (h < seaLevel + 0.35) {
      const vegH = (h - seaLevel - 0.22) / 0.13;
      return [25 + vegH * 25, 70 + (1 - vegH) * 35, 20 + vegH * 12];
    }

    // Rocky highlands
    const rockH = Math.min(1, (h - seaLevel - 0.35) * 3);
    const rockNoise = Math.sin(px * 0.4 + py * 0.6) * 0.08;
    return [
      75 + rockH * 55 + rockNoise * 25,
      70 + rockH * 45 + rockNoise * 18,
      65 + rockH * 38 + rockNoise * 12
    ];
  }

  const imgData = ctx.createImageData(W, H);
  const pixels = imgData.data;

  function render(t) {
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const i = row * COLS + col;
        const h = terrain[i];
        const w = water[i];
        const m = moisture[i];
        const s = sediment[i];
        const [r, g, b] = getColor(h, w, m, s, col * CW, row * CH, t);
        const px0 = Math.floor(col * CW);
        const py0 = Math.floor(row * CH);
        const px1 = Math.floor((col + 1) * CW);
        const py1 = Math.floor((row + 1) * CH);

        for (let py = py0; py < py1; py++) {
          for (let px = px0; px < px1; px++) {
            const pi = (py * W + px) * 4;
            pixels[pi] = r;
            pixels[pi + 1] = g;
            pixels[pi + 2] = b;
            pixels[pi + 3] = 255;
          }
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);

    // Coastline foam drawn as soft strokes
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    for (let row = 2; row < ROWS - 2; row++) {
      for (let col = 2; col < COLS - 2; col++) {
        const i = row * COLS + col;
        const h = terrain[i];
        if (Math.abs(h - seaLevel) < 0.05 && water[i] > 0.005) {
          const hasLand = terrain[(row-1)*COLS+col] > seaLevel || terrain[(row+1)*COLS+col] > seaLevel ||
                          terrain[row*COLS+col-1] > seaLevel || terrain[row*COLS+col+1] > seaLevel;
          if (!hasLand) continue;
          const wave = Math.sin(t * 0.045 + col * 0.22 + row * 0.15) *
                       Math.cos(t * 0.03 + col * 0.11 - row * 0.19);
          if (wave > 0.25) {
            const alpha = (wave - 0.25) * 0.5;
            ctx.strokeStyle = 'rgba(230, 245, 255,' + alpha + ')';
            ctx.beginPath();
            const cx = col * CW + CW * 0.5;
            const cy = row * CH + CH * 0.5;
            const r = CW * 0.6 + wave * CW * 0.5;
            const startAngle = noise(col, row, 7) * Math.PI;
            ctx.arc(cx, cy, r, startAngle, startAngle + Math.PI * 0.5);
            ctx.stroke();
          }
        }
      }
    }

    // Sediment plumes in water near coast
    ctx.globalAlpha = 0.06;
    for (let row = 1; row < ROWS - 1; row++) {
      for (let col = 1; col < COLS - 1; col++) {
        const i = row * COLS + col;
        if (sediment[i] > 0.005 && water[i] > 0.05) {
          const intensity = Math.min(1, sediment[i] * 20);
          ctx.fillStyle = 'rgba(180, 150, 90,' + intensity + ')';
          ctx.fillRect(col * CW - 1, row * CH - 1, CW + 2, CH + 2);
        }
      }
    }
    ctx.globalAlpha = 1.0;
  }

  let frame = 0;

  function step() {
    frame++;
    applyTide(frame);
    for (let i = 0; i < 3; i++) erode();
    render(frame);
    requestAnimationFrame(step);
  }

  step();
})();
</script>
</body>
</html>
