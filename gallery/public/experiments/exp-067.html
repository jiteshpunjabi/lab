<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>Frequency Illusion</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #060612;
  font-family: 'Georgia', serif;
  cursor: crosshair;
}
svg { width: 1280px; height: 720px; display: block; }
#info {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.4); font-size: 13px; font-family: sans-serif;
  pointer-events: none; letter-spacing: 0.5px;
}
</style>
</head>
<body>
<svg id="canvas" viewBox="0 0 1280 720"></svg>
<div id="info">hover a word to trigger the frequency illusion</div>
<script>
const SVG_NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById('canvas');
const W = 1280, H = 720;

// Procedural word generation from phoneme rules
const onsets = ['b','br','cl','cr','d','dr','f','fl','fr','g','gl','gr','h','j','k','kl','kr','l','m','n','p','pl','pr','r','s','sc','sk','sl','sm','sn','sp','st','str','sw','t','tr','v','w','z','zh','sh','ch','th'];
const nuclei = ['a','e','i','o','u','ae','ai','au','ea','ei','ia','io','ou','oa','ue','oi'];
const codas = ['','b','ck','d','ft','g','k','l','ld','lf','lk','lt','m','mp','n','nd','ng','nk','nt','p','r','rd','rk','rm','rn','rs','rt','s','sh','sk','sp','st','t','th','x','z'];

function rng(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

let globalSeed = 42;
const rand = rng(globalSeed);

function pick(arr) { return arr[Math.floor(rand() * arr.length)]; }

function generateWord() {
  const syllables = 1 + Math.floor(rand() * 3);
  let word = '';
  for (let i = 0; i < syllables; i++) {
    word += pick(onsets) + pick(nuclei);
    if (i === syllables - 1 || rand() < 0.3) word += pick(codas);
  }
  return word;
}

// Generate vocabulary
const VOCAB_SIZE = 80;
const vocabulary = [];
for (let i = 0; i < VOCAB_SIZE; i++) {
  vocabulary.push(generateWord());
}

// Word slot system
const SLOT_COUNT = 120;
const slots = [];
const frequency = {}; // word -> bias multiplier
let focusedWord = null;
let focusIntensity = 0;
let hoverTimer = 0;

// Color palettes
const baseHues = [210, 220, 230, 240]; // cool blues/purples for unfocused
const hotHues = [0, 20, 40, 50, 330, 350]; // warm reds/oranges/magentas for focused

function createSlot(i) {
  const x = rand() * W;
  const y = rand() * H;
  const word = vocabulary[Math.floor(rand() * vocabulary.length)];
  const baseSize = 14 + rand() * 18;
  const vx = (rand() - 0.5) * 0.4;
  const vy = (rand() - 0.5) * 0.3 + 0.1;
  const phase = rand() * Math.PI * 2;
  const hue = baseHues[Math.floor(rand() * baseHues.length)] + (rand() - 0.5) * 40;

  const el = document.createElementNS(SVG_NS, 'text');
  el.setAttribute('x', x);
  el.setAttribute('y', y);
  el.setAttribute('font-size', baseSize);
  el.setAttribute('fill', `hsla(${hue}, 55%, 65%, 0.55)`);
  el.setAttribute('font-family', 'Georgia, serif');
  el.setAttribute('text-anchor', 'middle');
  el.setAttribute('dominant-baseline', 'middle');
  el.textContent = word;
  svg.appendChild(el);

  el.addEventListener('mouseenter', () => onWordHover(word));

  return { el, x, y, word, baseSize, vx, vy, phase, hue, born: performance.now(), opacity: 0.35, targetOpacity: 0.35, size: baseSize, targetSize: baseSize };
}

function onWordHover(word) {
  if (focusedWord === word) return;
  focusedWord = word;
  focusIntensity = 0;
  hoverTimer = performance.now();
  frequency[word] = (frequency[word] || 1) + 0.5;
}

// Initialize slots
for (let i = 0; i < SLOT_COUNT; i++) {
  slots.push(createSlot(i));
}

// Respawn a slot with a new word (biased toward focused word)
function respawnSlot(slot) {
  let word;
  const bias = focusedWord ? Math.min(focusIntensity * 0.7, 0.85) : 0;

  if (focusedWord && Math.random() < bias) {
    word = focusedWord;
  } else {
    word = vocabulary[Math.floor(Math.random() * vocabulary.length)];
  }

  // Enter from edges
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if (edge === 0) { x = -50; y = Math.random() * H; }
  else if (edge === 1) { x = W + 50; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = -30; }
  else { x = Math.random() * W; y = H + 30; }

  slot.x = x;
  slot.y = y;
  slot.word = word;
  slot.vx = (Math.random() - 0.5) * 0.5;
  slot.vy = (Math.random() - 0.5) * 0.4;
  slot.phase = Math.random() * Math.PI * 2;
  slot.born = performance.now();
  slot.opacity = 0;
  slot.targetOpacity = 0.35;
  slot.el.textContent = word;
}

// Glow filter
const defs = document.createElementNS(SVG_NS, 'defs');
const filter = document.createElementNS(SVG_NS, 'filter');
filter.setAttribute('id', 'glow');
filter.setAttribute('x', '-50%');
filter.setAttribute('y', '-50%');
filter.setAttribute('width', '200%');
filter.setAttribute('height', '200%');
const blur = document.createElementNS(SVG_NS, 'feGaussianBlur');
blur.setAttribute('stdDeviation', '3');
blur.setAttribute('result', 'blur');
const merge = document.createElementNS(SVG_NS, 'feMerge');
const mn1 = document.createElementNS(SVG_NS, 'feMergeNode');
mn1.setAttribute('in', 'blur');
const mn2 = document.createElementNS(SVG_NS, 'feMergeNode');
mn2.setAttribute('in', 'SourceGraphic');
merge.appendChild(mn1);
merge.appendChild(mn2);
filter.appendChild(blur);
filter.appendChild(merge);
defs.appendChild(filter);
svg.insertBefore(defs, svg.firstChild);

// Title text
const titleEl = document.createElementNS(SVG_NS, 'text');
titleEl.setAttribute('x', W / 2);
titleEl.setAttribute('y', 40);
titleEl.setAttribute('font-size', '18');
titleEl.setAttribute('fill', 'rgba(255,255,255,0.15)');
titleEl.setAttribute('font-family', 'sans-serif');
titleEl.setAttribute('text-anchor', 'middle');
titleEl.setAttribute('letter-spacing', '8');
titleEl.textContent = 'FREQUENCY ILLUSION';
svg.appendChild(titleEl);

// Counter display
const counterEl = document.createElementNS(SVG_NS, 'text');
counterEl.setAttribute('x', W / 2);
counterEl.setAttribute('y', H - 50);
counterEl.setAttribute('font-size', '14');
counterEl.setAttribute('fill', 'rgba(255,255,255,0)');
counterEl.setAttribute('font-family', 'sans-serif');
counterEl.setAttribute('text-anchor', 'middle');
svg.appendChild(counterEl);

let frame = 0;

function animate(now) {
  frame++;

  // Grow focus intensity over time
  if (focusedWord) {
    const elapsed = (now - hoverTimer) / 1000;
    focusIntensity = Math.min(elapsed * 0.25, 1.0);
  }

  // Count focused words visible
  let focusCount = 0;
  let totalCount = 0;

  for (const slot of slots) {
    const t = now * 0.001;
    const wobbleX = Math.sin(t + slot.phase) * 0.3;
    const wobbleY = Math.cos(t * 0.7 + slot.phase) * 0.2;

    slot.x += slot.vx + wobbleX;
    slot.y += slot.vy + wobbleY;

    // Wrap / respawn when off-screen
    if (slot.x < -80 || slot.x > W + 80 || slot.y < -50 || slot.y > H + 50) {
      respawnSlot(slot);
    }

    const isFocused = focusedWord && slot.word === focusedWord;

    if (isFocused) {
      focusCount++;
      const pulse = 0.85 + 0.15 * Math.sin(t * 3 + slot.phase);
      const hotHue = hotHues[Math.floor((slot.phase * 10) % hotHues.length)];
      const intensity = Math.min(focusIntensity * 1.5, 1);
      slot.targetSize = slot.baseSize * (1.2 + focusIntensity * 1.8);
      slot.targetOpacity = 0.5 + intensity * 0.5;

      const sat = 60 + intensity * 30;
      const light = 55 + intensity * 20;
      slot.el.setAttribute('fill', `hsla(${hotHue}, ${sat}%, ${light}%, ${slot.opacity * pulse})`);
      slot.el.setAttribute('font-weight', 'bold');
      if (focusIntensity > 0.3) {
        slot.el.setAttribute('filter', 'url(#glow)');
      }
    } else {
      // Non-focused words fade as illusion intensifies
      const fadeout = focusedWord ? Math.max(0.08, 0.35 - focusIntensity * 0.25) : 0.35;
      slot.targetSize = slot.baseSize * (focusedWord ? Math.max(0.6, 1 - focusIntensity * 0.4) : 1);
      slot.targetOpacity = fadeout;
      const hue = 210 + Math.sin(slot.phase) * 40;
      slot.el.setAttribute('fill', `hsla(${hue}, 50%, 60%, ${slot.opacity})`);
      slot.el.setAttribute('font-weight', 'normal');
      slot.el.removeAttribute('filter');
    }

    // Smooth interpolation
    slot.size += (slot.targetSize - slot.size) * 0.05;
    slot.opacity += (slot.targetOpacity - slot.opacity) * 0.05;

    slot.el.setAttribute('x', slot.x);
    slot.el.setAttribute('y', slot.y);
    slot.el.setAttribute('font-size', slot.size);

    totalCount++;
  }

  // Update counter
  if (focusedWord && focusIntensity > 0.1) {
    const pct = ((focusCount / totalCount) * 100).toFixed(0);
    counterEl.textContent = `"${focusedWord}" — ${focusCount} of ${totalCount} visible (${pct}%)`;
    counterEl.setAttribute('fill', `rgba(255,180,100,${Math.min(focusIntensity, 0.6)})`);
  }

  // Periodically respawn some slots to increase churn
  if (frame % 10 === 0) {
    const toRespawn = Math.floor(Math.random() * 4) + 2;
    for (let i = 0; i < toRespawn; i++) {
      const idx = Math.floor(Math.random() * slots.length);
      if (slots[idx].x > 50 && slots[idx].x < W - 50) {
        respawnSlot(slots[idx]);
      }
    }
  }

  requestAnimationFrame(animate);
}

// Auto-trigger a focus after 500ms for visual interest
setTimeout(() => {
  const autoWord = vocabulary[Math.floor(Math.random() * vocabulary.length)];
  onWordHover(autoWord);
}, 500);

requestAnimationFrame(animate);
</script>
</body>
</html>
