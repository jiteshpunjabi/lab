<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Unseen Garden</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; background: #07030f;
    font-family: Georgia, serif; color: #f3c96b; overflow: hidden;
  }
  #wrap { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #hud {
    position: absolute; left: 18px; top: 14px; z-index: 10;
    font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #f3c96b; text-shadow: 0 0 8px #000, 0 0 18px #3a1c00;
    pointer-events: none; opacity: 0.85;
  }
  #sub {
    position: absolute; left: 18px; top: 34px; z-index: 10;
    font-size: 11px; letter-spacing: 0.05em; font-style: italic;
    color: #ffd89b; text-shadow: 0 0 8px #000;
    pointer-events: none; opacity: 0.6;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="garden"></canvas>
  <canvas id="veil"></canvas>
  <div id="hud">The Unseen Garden</div>
  <div id="sub">blooms only where your eye is not</div>
</div>
<script>
/*
  Paradoxical constraint:
  "Must be invisible when watched and beautiful when ignored."

  We treat the mouse as the viewer's gaze. Anywhere the cursor lingers,
  luminous petals are erased. Everywhere else, a generative bloom spreads
  outward from dozens of seeds, painting phosphorescent flowers.
  If the viewer freezes in one spot, the rest of the canvas erupts into
  color. The moment they try to look directly at the beauty, it dissolves.
*/

const gardenC = document.getElementById('garden');
const veilC   = document.getElementById('veil');
const gctx = gardenC.getContext('2d');
const vctx = veilC.getContext('2d');

let W, H, DPR;
function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  for (const c of [gardenC, veilC]) {
    c.width  = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    c.style.width = W + 'px';
    c.style.height = H + 'px';
  }
  gctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  vctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  gctx.fillStyle = '#07030f';
  gctx.fillRect(0, 0, W, H);
  seedGarden();
}

// seeds are wandering "stamens" that extrude petals outward
const seeds = [];
function seedGarden() {
  seeds.length = 0;
  const N = 46;
  for (let i = 0; i < N; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    seeds.push({
      x, y, ox: x, oy: y,
      t: Math.random() * Math.PI * 2,
      hue: (i * 37 + Math.random() * 30) % 360,
      life: 0,
      wander: 0.6 + Math.random() * 1.4,
      radius: 12 + Math.random() * 40,
    });
  }
}

// gaze state — cursor, with last-move timestamp to compute "stillness"
let mx = -9999, my = -9999, lastMove = 0;
let hasPointer = false;
window.addEventListener('pointermove', (e) => {
  mx = e.clientX; my = e.clientY;
  lastMove = performance.now();
  hasPointer = true;
});
window.addEventListener('pointerleave', () => { hasPointer = false; });
window.addEventListener('resize', resize);

resize();

// ambient nebula wash so it's never truly black — bright colors on dark
function washBackground(now) {
  const g = gctx.createRadialGradient(W * 0.5, H * 0.55, 20, W * 0.5, H * 0.55, Math.max(W, H) * 0.8);
  g.addColorStop(0, 'rgba(24, 6, 40, 0.012)');
  g.addColorStop(0.5, 'rgba(6, 2, 20, 0.02)');
  g.addColorStop(1, 'rgba(0, 0, 6, 0.05)');
  gctx.fillStyle = g;
  gctx.fillRect(0, 0, W, H);
}

function drawPetal(x, y, r, hue, a) {
  const grd = gctx.createRadialGradient(x, y, 0, x, y, r);
  grd.addColorStop(0, `hsla(${hue}, 100%, 75%, ${a})`);
  grd.addColorStop(0.35, `hsla(${(hue + 20) % 360}, 95%, 58%, ${a * 0.7})`);
  grd.addColorStop(0.75, `hsla(${(hue + 60) % 360}, 90%, 42%, ${a * 0.25})`);
  grd.addColorStop(1, `hsla(${(hue + 90) % 360}, 90%, 30%, 0)`);
  gctx.globalCompositeOperation = 'lighter';
  gctx.fillStyle = grd;
  gctx.beginPath();
  gctx.arc(x, y, r, 0, Math.PI * 2);
  gctx.fill();
  gctx.globalCompositeOperation = 'source-over';
}

function step(now) {
  washBackground(now);

  // how long since the cursor moved — "stillness" drives bloom intensity
  const still = Math.min(1, (now - lastMove) / 2000);
  const bloomBoost = 1 + still * 2.2;

  // grow each seed
  for (const s of seeds) {
    s.t += 0.012 + Math.random() * 0.01;
    s.life += 1;
    // organic wander around origin
    s.x = s.ox + Math.cos(s.t) * 30 * s.wander + Math.sin(s.t * 0.7) * 18;
    s.y = s.oy + Math.sin(s.t * 1.3) * 28 * s.wander + Math.cos(s.t * 0.5) * 14;

    // spawn several petals per frame near the stamen
    const petals = 3;
    for (let i = 0; i < petals; i++) {
      const ang = Math.random() * Math.PI * 2;
      const d = Math.random() * s.radius * 1.4;
      const px = s.x + Math.cos(ang) * d;
      const py = s.y + Math.sin(ang) * d;
      const pr = (4 + Math.random() * 10) * bloomBoost;
      const hue = (s.hue + Math.sin(s.t + i) * 40 + 360) % 360;
      drawPetal(px, py, pr, hue, 0.08 * bloomBoost);
    }

    // filament trail connecting stamens in a soft web
    if (s.life % 6 === 0) {
      const j = seeds[(seeds.indexOf(s) + 7) % seeds.length];
      gctx.strokeStyle = `hsla(${s.hue}, 80%, 70%, 0.04)`;
      gctx.lineWidth = 1;
      gctx.beginPath();
      gctx.moveTo(s.x, s.y);
      gctx.quadraticCurveTo((s.x + j.x) / 2 + Math.sin(now * 0.001) * 20,
                            (s.y + j.y) / 2 + Math.cos(now * 0.001) * 20,
                            j.x, j.y);
      gctx.stroke();
    }
  }

  // THE GAZE ERASER — wherever the cursor is, the garden dies.
  // Big soft disk repeatedly painted with the background color over the
  // garden canvas. The longer you hold the cursor still, the wider the
  // erased hole becomes, so the very act of looking enlarges the darkness.
  if (hasPointer) {
    const eraseR = 70 + still * 260;
    const holes = 4;
    for (let i = 0; i < holes; i++) {
      const jitter = 6;
      const jx = mx + (Math.random() - 0.5) * jitter;
      const jy = my + (Math.random() - 0.5) * jitter;
      const eg = gctx.createRadialGradient(jx, jy, 0, jx, jy, eraseR);
      eg.addColorStop(0, 'rgba(7, 3, 15, 0.55)');
      eg.addColorStop(0.5, 'rgba(7, 3, 15, 0.25)');
      eg.addColorStop(1, 'rgba(7, 3, 15, 0)');
      gctx.fillStyle = eg;
      gctx.beginPath();
      gctx.arc(jx, jy, eraseR, 0, Math.PI * 2);
      gctx.fill();
    }
  }

  // draw the veil pass — a faint iris that marks where the gaze is,
  // so the viewer can *see* what they are destroying
  vctx.clearRect(0, 0, W, H);
  if (hasPointer) {
    const eraseR = 70 + still * 260;
    const rim = vctx.createRadialGradient(mx, my, eraseR * 0.6, mx, my, eraseR);
    rim.addColorStop(0, 'rgba(255, 230, 160, 0)');
    rim.addColorStop(0.85, 'rgba(255, 220, 140, 0.08)');
    rim.addColorStop(1, 'rgba(255, 220, 140, 0)');
    vctx.fillStyle = rim;
    vctx.beginPath();
    vctx.arc(mx, my, eraseR, 0, Math.PI * 2);
    vctx.fill();

    vctx.strokeStyle = `rgba(255, 220, 140, ${0.25 + still * 0.35})`;
    vctx.lineWidth = 1.2;
    vctx.beginPath();
    vctx.arc(mx, my, eraseR, 0, Math.PI * 2);
    vctx.stroke();
  }

  requestAnimationFrame(step);
}

// begin with a simulated look-away so the thumbnail captures the bloom
lastMove = -9999;
hasPointer = false;
requestAnimationFrame(step);
</script>
</body>
</html>
